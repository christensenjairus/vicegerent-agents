---
apiVersion: batch/v1
kind: Job
metadata:
  name: ghostunnel-ca-sync
  namespace: agentgateway-system
  annotations:
    secret.reloader.stakater.com/reload: ghostunnel-ca-source
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: ghostunnel-ca-sync
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: sync
          image: alpine/k8s:latest
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            - name: HOME
              value: /tmp
          command:
            - /bin/bash
            - -c
            - |-
              set -euo pipefail
              CA_FILE=/ca/ca.cert
              NAMESPACE=agentgateway-system
              CONFIGMAP=ghostunnel-ca
              CONFIGMAP_KEY=ca.crt
              if [[ ! -s "$CA_FILE" ]]; then
                echo "no CA at $CA_FILE; nothing to sync" >&2
                exit 1
              fi
              kubectl create configmap "$CONFIGMAP" \
                --namespace "$NAMESPACE" \
                --from-file="${CONFIGMAP_KEY}=${CA_FILE}" \
                --dry-run=client -o yaml \
                | kubectl apply --namespace "$NAMESPACE" -f -
          volumeMounts:
            - name: ca-source
              mountPath: /ca
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: ca-source
          secret:
            secretName: ghostunnel-ca-source
            items:
              - key: ca.cert
                path: ca.cert
        - name: tmp
          emptyDir: {}
