---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: haiku
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /haiku
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: haiku
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
