---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: sonnet
  namespace: agentgateway-system
spec:
  parentRefs:
    - name: agentgateway-proxy
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /sonnet
      backendRefs:
        - name: sonnet
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
