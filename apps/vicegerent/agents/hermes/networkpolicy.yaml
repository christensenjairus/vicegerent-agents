---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: hermes-egress
  namespace: agent-sandbox
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: UDP
          rules:
            dns:
              - matchPattern: '*'
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: agentgateway-system
            gateway.networking.k8s.io/gateway-name: agentgateway-proxy
      toPorts:
        - ports:
            - port: '80'
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: searxng
            app.kubernetes.io/name: searxng
      toPorts:
        - ports:
            - port: '8080'
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: egress-proxy
            app.kubernetes.io/name: egress-proxy
      toPorts:
        - ports:
            - port: '8080'
              protocol: TCP
    # Slack uses Socket Mode (WSS) and POST-based Web API — bypass the GET-only proxy.
    - toFQDNs:
        - matchName: slack.com
        - matchPattern: '*.slack.com'
      toPorts:
        - ports:
            - port: '443'
              protocol: TCP
    # SSH bypasses the HTTP proxy — direct egress for git push/pull over SSH.
    - toFQDNs:
        - matchName: gitlab.hahomelabs.com
        - matchName: github.com
      toPorts:
        - ports:
            - port: '22'
              protocol: TCP
