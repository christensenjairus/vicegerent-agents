---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: hermes-egress
  namespace: agent-sandbox
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: UDP
          rules:
            dns:
              - matchPattern: '*'
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: agentgateway-system
            gateway.networking.k8s.io/gateway-name: agentgateway-proxy
      toPorts:
        - ports:
            - port: '80'
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: searxng
            app.kubernetes.io/name: searxng
      toPorts:
        - ports:
            - port: '8080'
              protocol: TCP
    - toFQDNs:
        - matchName: slack.com
        - matchPattern: '*.slack.com'
        # Added for pre-commit hooks, among other things.
        - matchName: github.com
        - matchName: raw.githubusercontent.com
        - matchName: objects.githubusercontent.com
        - matchName: pypi.org
      toPorts:
        - ports:
            - port: '443'
              protocol: TCP
    - toFQDNs:
        - matchName: gitlab.hahomelabs.com
        - matchName: github.com
      toPorts:
        - ports:
            - port: '22'
              protocol: TCP
