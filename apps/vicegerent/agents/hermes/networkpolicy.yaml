---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: hermes-egress
  namespace: agent-sandbox
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: UDP
          rules:
            dns:
              - matchPattern: '*'
    # All HTTP(S) traffic — to internet, agentgateway, and searxng — routes through
    # the scrubbing proxy. Secrets are redacted before reaching any destination.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: egress-proxy
            app.kubernetes.io/name: egress-proxy
      toPorts:
        - ports:
            - port: '8080'
              protocol: TCP
    # Slack uses Socket Mode (WSS) + POST Web API — bypass the GET-only proxy.
    # Restricted to exactly the FQDNs slack-bolt needs; wildcard *.slack.com removed.
    #
    # slack.com          — Web API (slack.com/api/*): auth.test, chat.postMessage,
    #                      apps.connections.open, reactions.*, files.*, users.info, etc.
    # wss-primary.slack.com — Socket Mode WebSocket endpoint (primary)
    # wss-backup.slack.com  — Socket Mode WebSocket endpoint (failover)
    # files.slack.com    — File/image downloads when hermes reads attachments
    #
    # NOTE: if Slack rotates the WSS hostname (rare but possible), Socket Mode will
    # fail to reconnect and you'll see apps.connections.open succeed but the WSS
    # connection refused. Add the new hostname here and to no_proxy in sandbox.yaml.
    - toFQDNs:
        - matchName: slack.com
        - matchName: wss-primary.slack.com
        - matchName: wss-backup.slack.com
        - matchName: files.slack.com
      toPorts:
        - ports:
            - port: '443'
              protocol: TCP
    # SSH bypasses the HTTP proxy — direct egress for git push/pull.
    - toFQDNs:
        - matchName: gitlab.hahomelabs.com
        - matchName: github.com
      toPorts:
        - ports:
            - port: '22'
              protocol: TCP
