---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: hermes-egress
  namespace: agent-sandbox
spec:
  endpointSelector: {}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: UDP
          rules:
            dns:
              - matchPattern: '*'
    # All HTTP(S) traffic — to internet, agentgateway, and searxng — routes through
    # the scrubbing proxy. Secrets are redacted before reaching any destination.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: egress-proxy
            app.kubernetes.io/name: egress-proxy
      toPorts:
        - ports:
            - port: '8080'
              protocol: TCP
    # Slack uses Socket Mode (WSS) + POST Web API — bypass the GET-only proxy.
    - toFQDNs:
        - matchName: slack.com
        - matchPattern: '*.slack.com'
      toPorts:
        - ports:
            - port: '443'
              protocol: TCP
    # SSH bypasses the HTTP proxy — direct egress for git push/pull.
    - toFQDNs:
        - matchName: gitlab.hahomelabs.com
        - matchName: github.com
      toPorts:
        - ports:
            - port: '22'
              protocol: TCP
