---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coding-agents-config
  namespace: agent-sandbox
data:
  config.toml: |-
    model = "gpt-5.5"
    model_provider = "vicegerent"
    [model_providers.vicegerent]
    name = "Vicegerent agentgateway"
    base_url = "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/gpt-5-5/v1"
    env_key = "OPENAI_API_KEY"
    wire_api = "responses"
    [mcp_servers.mnemosyne]
    command = "/opt/hermes/.venv/bin/mnemosyne"
    args = ["mcp"]
  settings.json: |-
    {
      "env": {
        "ANTHROPIC_BASE_URL": "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/opus",
        "ANTHROPIC_AUTH_TOKEN": "hermes"
      },
      "model": "claude-opus-4-8",
      "enableAllProjectMcpServers": true,
      "permissions": {
        "allow": ["mcp__mnemosyne"]
      }
    }
