---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: agent-sandbox
resources:
  - namespace.yaml
  - config.yaml
  - secrets.yaml
  - sandbox.yaml
  - networkpolicy.yaml
secretGenerator:
  - name: hermes-agentgateway-api-key
    literals: [api-key=hermes]
generatorOptions:
  disableNameSuffixHash: true
