---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: agent-sandbox
resources:
  - namespace.yaml
  - config.yaml
  - soul.yaml
  - codex-config.yaml
  - claude-config.yaml
  - approval-policy.yaml
  - secrets.yaml
  - egress-proxy-ca.yaml
  - sandbox.yaml
  - dashboard.yaml
  - dashboard-ingress.yaml
  - networkpolicy.yaml
  - restart-rbac.yaml
  - restart-job.yaml
  - restart-networkpolicy.yaml
configMapGenerator:
  - name: hermes-sandbox-spec
    files: [sandbox.yaml]
generatorOptions:
  disableNameSuffixHash: true
