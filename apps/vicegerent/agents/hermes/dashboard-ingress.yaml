---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: hermes-dashboard-ingress
  namespace: agent-sandbox
spec:
  endpointSelector:
    matchLabels:
      vicegerent.io/dashboard-tunnel: hermes
  ingress:
    # Only the mTLS tunnel port (8443) is reachable, and only from off-cluster
    # (the host laptop dials nodeIP:30119; that external traffic carries the
    # `world` identity, not `host`) plus node-local probes. ghostunnel enforces
    # mTLS (--allow-cn=dashboard-client) on 8443, so the cert is the real gate;
    # this rule is the network layer in front of it. The dashboard (9119) and
    # gateway API (8642) bind 0.0.0.0 inside the pod but are NOT listed here, so
    # no peer can reach them on the pod IP. In-cluster pods carry pod identities
    # (never `world`), so other agents gain nothing from this rule.
    - fromEntities: [world, host, remote-node]
      toPorts:
        - ports:
            - port: '8443'
              protocol: TCP
