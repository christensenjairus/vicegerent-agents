---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: hermes-dashboard-ingress
  namespace: agent-sandbox
spec:
  endpointSelector:
    matchLabels:
      vicegerent.io/dashboard: hermes
  ingress:
    # Only the dashboard port (9119) is reachable, and only from off-cluster
    # (the host laptop dials nodeIP:30119; that external traffic carries the
    # `world` identity, not `host`) plus node-local probes. The dashboard's
    # own basic-auth login gates access at the app layer. The gateway API
    # (8642) binds 0.0.0.0 inside the pod but is NOT listed here, so no peer —
    # including other agent pods — can reach it on the pod IP. In-cluster pods
    # carry pod identities (never `world`), so other agents gain nothing here.
    - fromEntities: [world, host, remote-node]
      toPorts:
        - ports:
            - port: '9119'
              protocol: TCP
