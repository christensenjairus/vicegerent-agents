---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: agent-sandbox
data:
  config.yaml: |-
    model:
      provider: sonnet
      default: claude-sonnet-4-6
      base_url: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/sonnet
      key_env: ANTHROPIC_API_KEY
      api_mode: anthropic_messages
    providers:
      opus:
        name: Opus
        api: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/opus
        key_env: ANTHROPIC_API_KEY
        transport: anthropic_messages
        default_model: claude-opus-4-8
        models:
          claude-opus-4-8:
            context_length: 1000000
      sonnet:
        name: Sonnet
        api: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/sonnet
        key_env: ANTHROPIC_API_KEY
        transport: anthropic_messages
        default_model: claude-sonnet-4-6
        models:
          claude-sonnet-4-6:
            context_length: 1000000
      haiku:
        name: Haiku
        api: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/haiku
        key_env: ANTHROPIC_API_KEY
        transport: anthropic_messages
        default_model: claude-haiku-4-5
        models:
          claude-haiku-4-5:
            context_length: 200000
      gpt-5.5:
        name: GPT-5.5
        api: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/gpt-5-5
        key_env: OPENAI_API_KEY
        transport: responses
        default_model: gpt-5.5
        models:
          gpt-5.5:
            context_length: 1050000
      gpt-4.1:
        name: GPT-4.1
        api: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/gpt-4-1
        key_env: OPENAI_API_KEY
        transport: chat_completions
        default_model: gpt-4.1
        models:
          gpt-4.1:
            context_length: 1047576
      gpt-4o-mini:
        name: GPT-4o-mini
        api: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/gpt-4o-mini
        key_env: OPENAI_API_KEY
        transport: chat_completions
        default_model: gpt-4o-mini
        models:
          gpt-4o-mini:
            context_length: 128000
    prompt_caching:
      cache_ttl: 1h
    mcp_servers:
      agentburn:
        command: /opt/hermes/.venv/bin/agentburn
        args: [mcp]
        env:
          HERMES_HOME: /opt/data
      kmcp:
        url: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/kmcp
        timeout: 30
        connect_timeout: 5
      host:
        url: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/host
        timeout: 30
        connect_timeout: 5
    agent:
      max_turns: 150
      gateway_timeout: 900
      system_prompt: You are a technical expert. Provide detailed, accurate technical information.
    toolsets:
      - kanban
    kanban:
      dispatch_in_gateway: false
    delegation:
      provider: haiku
      model: claude-haiku-4-5
    auxiliary:
      vision:
        provider: haiku
        model: claude-haiku-4-5
      title_generation:
        provider: haiku
        model: claude-haiku-4-5
      approval:
        provider: haiku
        model: claude-haiku-4-5
      compression:
        provider: haiku
        model: claude-haiku-4-5
      web_extract:
        provider: haiku
        model: claude-haiku-4-5
      triage_specifier:
        provider: haiku
        model: claude-haiku-4-5
      kanban_decomposer:
        provider: haiku
        model: claude-haiku-4-5
      curator:
        provider: haiku
        model: claude-haiku-4-5
      monitor:
        provider: haiku
        model: claude-haiku-4-5
    tool_loop_guardrails:
      hard_stop_enabled: true
    display:
      tool_progress: verbose
      platforms:
        slack:
          tool_progress: false
    approvals:
      mode: smart
    command_allowlist:
      # General patterns (fnmatch globs) — avoids per-command approval noise.
      # Destructive git ops
      - "git reset --hard *"
      - "git clean -fd*"
      - "git clean -dfx*"
      - "git push * --force*"
      - "git push *-f *"
      # Script execution via heredoc (python3 - <<'EOF' pattern used heavily)
      - "python3 - <<*"
      - "python3 -c *"
      - "python3 -m *"
      # Shell -c invocations (used by pre-commit, build tools, etc.)
      - "bash -c *"
      - "sh -c *"
      # find -exec rm (used for cleanup tasks like chmod fixing)
      - "find * -exec chmod *"
      - "find * -exec rm *"
      # rm in repo workspace (destructive but scoped to /workspace)
      - "rm -rf /workspace/*"
      - "rm -rf /tmp/*"
      # Recursive delete of build/cache artifacts
      - "rm -rf /opt/data/tmp/*"
    checkpoints:
      enabled: true
    timezone: America/Denver
    terminal:
      cwd: /workspace
      persistent_shell: true
    web:
      search_backend: searxng
    memory:
      provider: mnemosyne
      mnemosyne:
        auto_sleep: true
    context:
      engine: lcm
    lsp:
      enabled: true
      install_strategy: manual
    slack:
      require_mention: true
      strict_mention: true
    plugins:
      enabled:
        - disk-cleanup
        - rtk-rewrite
        - security-guidance
      disabled:
        - google_meet
        - spotify
        - teams_pipeline
        - raft-platform
        - web/exa
        - web/parallel
        - web/brave_free
        - web/tavily
        - web/firecrawl
        - web/ddgs
        - web/xai
        - image_gen/fal
        - image_gen/krea
        - image_gen/openai
        - image_gen/openai-codex
        - image_gen/xai
        - video_gen/fal
        - video_gen/xai
        - browser/browser_use
        - browser/browserbase
        - browser/firecrawl
