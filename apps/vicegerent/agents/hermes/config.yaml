---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: agent-sandbox
data:
  config.yaml: |-
    model:
      provider: opus
      default: claude-opus-4-8
      base_url: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/opus
      key_env: ANTHROPIC_API_KEY
      api_mode: anthropic_messages
    providers:
      opus:
        name: Opus
        api: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/opus
        key_env: ANTHROPIC_API_KEY
        transport: anthropic_messages
        default_model: claude-opus-4-8
        models:
          claude-opus-4-8:
            context_length: 1000000
      sonnet:
        name: Sonnet
        api: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/sonnet
        key_env: ANTHROPIC_API_KEY
        transport: anthropic_messages
        default_model: claude-sonnet-4-6
        models:
          claude-sonnet-4-6:
            context_length: 1000000
      haiku:
        name: Haiku
        api: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/haiku
        key_env: ANTHROPIC_API_KEY
        transport: anthropic_messages
        default_model: claude-haiku-4-5
        models:
          claude-haiku-4-5:
            context_length: 200000
      gpt-5.5:
        name: GPT-5.5
        api: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/gpt-5-5
        key_env: OPENAI_API_KEY
        transport: responses
        default_model: gpt-5.5
        models:
          gpt-5.5:
            context_length: 1050000
      gpt-4.1:
        name: GPT-4.1
        api: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/gpt-4-1
        key_env: OPENAI_API_KEY
        transport: chat_completions
        default_model: gpt-4.1
        models:
          gpt-4.1:
            context_length: 1047576
      gpt-4o-mini:
        name: GPT-4o-mini
        api: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/gpt-4o-mini
        key_env: OPENAI_API_KEY
        transport: chat_completions
        default_model: gpt-4o-mini
        models:
          gpt-4o-mini:
            context_length: 128000
    mcp_servers:
      kubernetes:
        url: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/kubernetes
        timeout: 120
        connect_timeout: 60
    agent:
      max_turns: 150
      system_prompt: You are a technical expert. Provide detailed, accurate technical information.
    auxiliary:
      vision:
        provider: haiku
        model: claude-haiku-4-5
      title_generation:
        provider: haiku
        model: claude-haiku-4-5
      approval:
        provider: haiku
        model: claude-haiku-4-5
    compression:
      threshold: 0.75
    display:
      personality: technical
      tool_progress: verbose
    approvals:
      mode: smart
    checkpoints:
      enabled: true
    timezone: America/Denver
    terminal:
      cwd: /workspace
      persistent_shell: true
    web:
      search_backend: searxng
    memory:
      provider: mnemosyne
    context:
      engine: lcm
    lsp:
      enabled: true
      install_strategy: manual
    plugins:
      enabled:
        - disk-cleanup
