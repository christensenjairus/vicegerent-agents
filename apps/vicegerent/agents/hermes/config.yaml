---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-config
  namespace: agent-sandbox
data:
  config.yaml: |-
    model:
      provider: anthropic
      default: claude-sonnet-5
      base_url: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/anthropic
      key_env: ANTHROPIC_API_KEY
      api_mode: anthropic_messages
    providers:
      anthropic:
        name: Agentgateway-Anthropic
        api: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/anthropic
        key_env: ANTHROPIC_API_KEY
        transport: anthropic_messages
        default_model: claude-sonnet-5
      openai:
        name: Agentgateway-OpenAI
        api: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/openai
        key_env: OPENAI_API_KEY
        transport: responses
        default_model: gpt-5.5
    prompt_caching:
      cache_ttl: 1h
    mcp_servers:
      agentburn:
        command: /opt/hermes/.venv/bin/agentburn
        args: [mcp]
        env:
          HERMES_HOME: /opt/data
      kmcp:
        url: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/kmcp
        timeout: 30
        connect_timeout: 5
      host:
        url: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/host
        timeout: 30
        connect_timeout: 5
    agent:
      max_turns: 150
      gateway_timeout: 900
      reasoning_effort: high
      system_prompt: You are a technical expert. Provide detailed, accurate technical information.
      disabled_toolsets:
        - computer_use
        - tts
        - memory
    platform_toolsets:
      slack:
        - hermes-slack
        - kanban
        - moa
    kanban:
      dispatch_in_gateway: false
    delegation:
      provider: anthropic
      model: claude-haiku-4-5
    auxiliary:
      vision:
        provider: anthropic
        model: claude-haiku-4-5
      title_generation:
        provider: anthropic
        model: claude-haiku-4-5
      approval:
        provider: anthropic
        model: claude-haiku-4-5
      compression:
        provider: anthropic
        model: claude-haiku-4-5
      web_extract:
        provider: anthropic
        model: claude-haiku-4-5
      triage_specifier:
        provider: anthropic
        model: claude-haiku-4-5
      kanban_decomposer:
        provider: anthropic
        model: claude-haiku-4-5
      curator:
        provider: anthropic
        model: claude-haiku-4-5
      monitor:
        provider: anthropic
        model: claude-haiku-4-5
    tool_loop_guardrails:
      hard_stop_enabled: true
    display:
      tool_progress: verbose
      platforms:
        slack:
          tool_progress: false
    approvals:
      mode: smart
    command_allowlist: []
    checkpoints:
      enabled: true
    timezone: America/Denver
    terminal:
      cwd: /workspace
      persistent_shell: true
    web:
      search_backend: searxng
    memory:
      provider: mnemosyne
      memory_enabled: false
      user_profile_enabled: false
      mnemosyne:
        auto_sleep: true
    context:
      engine: lcm
    lsp:
      enabled: true
      install_strategy: manual
    slack:
      require_mention: true
      strict_mention: true
    plugins:
      enabled:
        - disk-cleanup
        - rtk-rewrite
        - security-guidance
      disabled:
        - google_meet
        - spotify
        - teams_pipeline
        - raft-platform
        - web/exa
        - web/parallel
        - web/brave_free
        - web/tavily
        - web/firecrawl
        - web/ddgs
        - web/xai
        - image_gen/fal
        - image_gen/krea
        - image_gen/openai
        - image_gen/openai-codex
        - image_gen/xai
        - video_gen/fal
        - video_gen/xai
        - browser/browser_use
        - browser/browserbase
        - browser/firecrawl
