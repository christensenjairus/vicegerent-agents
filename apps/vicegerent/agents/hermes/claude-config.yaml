---
apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-config
  namespace: agent-sandbox
data:
  settings.json: |-
    {
      "env": {
        "ANTHROPIC_BASE_URL": "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/opus",
        "ANTHROPIC_AUTH_TOKEN": "hermes"
      },
      "model": "claude-opus-4-8",
      "enableAllProjectMcpServers": true,
      "permissions": {
        "allow": ["mcp__mnemosyne"]
      }
    }
  claude.json: |-
    {
      "mcpServers": {
        "mnemosyne": {
          "type": "stdio",
          "command": "/opt/hermes/.venv/bin/mnemosyne",
          "args": ["mcp"]
        }
      },
      "projects": {
        "/workspace": {
          "hasTrustDialogAccepted": true
        },
        "/workspace/vicegerent-agents": {
          "hasTrustDialogAccepted": true
        },
        "/opt/hermes": {
          "hasTrustDialogAccepted": true
        }
      }
    }
