---
apiVersion: v1
kind: Service
metadata:
  name: hermes-dashboard
  namespace: agent-sandbox
spec:
  type: NodePort
  selector:
    vicegerent.io/dashboard: hermes
  ports:
    - name: dashboard
      port: 9119
      targetPort: dashboard
      nodePort: 30119
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: hermes-dashboard-auth
  namespace: agent-sandbox
spec:
  itemPath: vaults/Vicegerent/items/Dashboard Auth - hermes
