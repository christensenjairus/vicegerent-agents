---
apiVersion: v1
kind: ConfigMap
metadata:
  name: codex-config
  namespace: agent-sandbox
data:
  config.toml: |-
    model = "gpt-5.5"
    model_provider = "vicegerent"
    [model_providers.vicegerent]
    name = "Vicegerent agentgateway"
    base_url = "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/gpt-5-5/v1"
    env_key = "OPENAI_API_KEY"
    wire_api = "responses"
    [mcp_servers.mnemosyne]
    command = "/opt/hermes/.venv/bin/mnemosyne"
    args = ["mcp"]
    # Pre-trust PVC-seeded workdirs so codex never blocks on directory trust.
    [projects."/workspace"]
    trust_level = "trusted"
    [projects."/workspace/vicegerent-agents"]
    trust_level = "trusted"
    [projects."/opt/hermes"]
    trust_level = "trusted"
