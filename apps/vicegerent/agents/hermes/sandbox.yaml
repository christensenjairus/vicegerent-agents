---
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: hermes
  namespace: agent-sandbox
  annotations:
    kustomize.toolkit.fluxcd.io/force: Disabled
spec:
  podTemplate:
    spec:
      runtimeClassName: gvisor
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-run
          image: harbor.hahomelabs.com/vicegerent/hermes-agent:v2026.6.19
          imagePullPolicy: Always
          command: [sh, -c]
          args: ["set -eu\nchown 10000:10000 /run\n"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          volumeMounts:
            - name: runtime
              mountPath: /run
            - name: data
              mountPath: /opt/data
        - name: seed-data
          image: harbor.hahomelabs.com/vicegerent/hermes-agent:v2026.6.19
          imagePullPolicy: Always
          command: [bash, -c]
          args:
            - |-
              set -euo pipefail
              dest="/opt/data/.hermes"
              mkdir -p "${dest}/mnemosyne/models" "${dest}/cache/fastembed" /opt/data/plugins
              cp -an /opt/hermes/mnemosyne-seed/mnemosyne/models/. "${dest}/mnemosyne/models/"
              cp -an /opt/hermes/mnemosyne-seed/cache/fastembed/. "${dest}/cache/fastembed/"
              pkg="$(/opt/hermes/.venv/bin/python -c 'import mnemosyne_hermes, os; print(os.path.dirname(mnemosyne_hermes.__file__))')"
              ln -sfn "${pkg}" /opt/data/plugins/mnemosyne
              # Coding-agent config homes live on the PVC (CODEX_HOME / CLAUDE_CONFIG_DIR
              # point here) so they stay writable under the main container's
              # readOnlyRootFilesystem. The two ConfigMaps are the source of truth and
              # are mounted here read-only; seed them onto the PVC each boot. Overwrite
              # the config files (image/ConfigMap owns config + pre-trust) while leaving
              # agent-written runtime state (history, sessions, sqlite, transcripts —
              # different filenames in the same dirs) untouched.
              mkdir -p /opt/data/.codex /opt/data/.claude
              cp -f /reload/codex-config/config.toml /opt/data/.codex/config.toml
              cp -f /reload/claude-config/settings.json /opt/data/.claude/settings.json
              cp -f /reload/claude-config/claude.json /opt/data/.claude/.claude.json
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: '1'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: codex-config
              mountPath: /reload/codex-config
              readOnly: true
            - name: claude-config
              mountPath: /reload/claude-config
              readOnly: true
      containers:
        - name: hermes
          image: harbor.hahomelabs.com/vicegerent/hermes-agent:v2026.6.19
          imagePullPolicy: Always
          args: [gateway]
          env:
            - name: HERMES_DASHBOARD
              value: '1'
            - name: HERMES_DASHBOARD_HOST
              value: 127.0.0.1
            - name: SEARXNG_URL
              value: http://searxng.searxng.svc.cluster.local:8080
            # Coding-agent config homes on the PVC (seeded by seed-data) so they
            # stay writable under readOnlyRootFilesystem.
            - name: CODEX_HOME
              value: /opt/data/.codex
            - name: CLAUDE_CONFIG_DIR
              value: /opt/data/.claude
            # Redirect transient writes off the now read-only rootfs.
            - name: TMPDIR
              value: /tmp
            - name: PYTHONDONTWRITEBYTECODE
              value: '1'
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-agentgateway-api-key
                  key: api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-agentgateway-api-key
                  key: api-key
          envFrom:
            - secretRef:
                name: vicegerent-secrets
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: runtime
              mountPath: /run
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /opt/data
            - name: gitrepos
              mountPath: /workspace
            - name: hermes-config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
            - name: hermes-soul
              mountPath: /opt/data/SOUL.md
              subPath: SOUL.md
      volumes:
        - name: runtime
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: hermes-config
          configMap:
            name: hermes-config
        - name: hermes-soul
          configMap:
            name: hermes-soul
        - name: codex-config
          configMap:
            name: codex-config
        - name: claude-config
          configMap:
            name: claude-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: gitrepos
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 50Gi
