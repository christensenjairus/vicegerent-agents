---
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: hermes
  namespace: agent-sandbox
  annotations:
    kustomize.toolkit.fluxcd.io/force: Disabled
spec:
  podTemplate:
    spec:
      runtimeClassName: gvisor
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-run
          image: harbor.hahomelabs.com/vicegerent/hermes-agent:v2026.6.19
          imagePullPolicy: Always
          command: [sh, -c]
          args: [chown 10000:10000 /run]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          volumeMounts:
            - name: runtime
              mountPath: /run
        - name: seed-mnemosyne
          image: harbor.hahomelabs.com/vicegerent/hermes-agent:v2026.6.19
          imagePullPolicy: Always
          command: [bash, -c]
          args:
            - |-
              set -euo pipefail
              dest="/opt/data/.hermes"
              mkdir -p "${dest}/mnemosyne/models" "${dest}/cache/fastembed" /opt/data/plugins
              cp -an /opt/hermes/mnemosyne-seed/mnemosyne/models/. "${dest}/mnemosyne/models/"
              cp -an /opt/hermes/mnemosyne-seed/cache/fastembed/. "${dest}/cache/fastembed/"
              pkg="$(/opt/hermes/.venv/bin/python -c 'import mnemosyne_hermes, os; print(os.path.dirname(mnemosyne_hermes.__file__))')"
              ln -sfn "${pkg}" /opt/data/plugins/mnemosyne
              # Pre-create .codex as uid 10000 so the kubelet's config.toml
              # subPath mount finds the dir present and leaves ownership alone;
              # otherwise it makes it root:root and codex can't write its state
              # db. Drop a stale root-owned dir from an earlier boot first so
              # this also repairs an existing PVC (.codex is empty on the PVC;
              # config.toml is an overlay mount only present in the main container).
              if [ -d /opt/data/.codex ] && [ ! -O /opt/data/.codex ]; then
                rmdir /opt/data/.codex
              fi
              mkdir -p /opt/data/.codex
              # claude-code reads MCP servers only from the stateful ~/.claude.json
              # (user scope), never from settings.json. Seed it once; claude then
              # owns the file, so don't clobber on later boots.
              claudejson=/opt/data/.claude.json
              if [ ! -f "${claudejson}" ]; then
                printf '%s\n' '{"mcpServers":{"mnemosyne":{"type":"stdio","command":"/opt/hermes/.venv/bin/mnemosyne","args":["mcp"]}}}' > "${claudejson}"
              fi
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: '1'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /opt/data
      containers:
        - name: hermes
          image: harbor.hahomelabs.com/vicegerent/hermes-agent:v2026.6.19
          imagePullPolicy: Always
          args: [gateway]
          env:
            - name: HERMES_DASHBOARD
              value: '1'
            - name: HERMES_DASHBOARD_HOST
              value: 127.0.0.1
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-agentgateway-api-key
                  key: api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-agentgateway-api-key
                  key: api-key
          envFrom:
            - secretRef:
                name: vicegerent-secrets
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: runtime
              mountPath: /run
            - name: data
              mountPath: /opt/data
            - name: gitrepos
              mountPath: /workspace
            - name: hermes-config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
            - name: hermes-soul
              mountPath: /opt/data/SOUL.md
              subPath: SOUL.md
            - name: coding-agents-config
              mountPath: /opt/data/.claude/settings.json
              subPath: settings.json
            - name: coding-agents-config
              mountPath: /opt/data/.codex/config.toml
              subPath: config.toml
      volumes:
        - name: runtime
          emptyDir: {}
        - name: hermes-config
          configMap:
            name: hermes-config
        - name: hermes-soul
          configMap:
            name: hermes-soul
        - name: coding-agents-config
          configMap:
            name: coding-agents-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: gitrepos
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 50Gi
