---
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: hermes
  namespace: agent-sandbox
  annotations:
    kustomize.toolkit.fluxcd.io/force: Disabled
spec:
  podTemplate:
    metadata:
      labels:
        vicegerent.io/dashboard: hermes
    spec:
      runtimeClassName: gvisor
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-run
          image: harbor.hahomelabs.com/vicegerent/hermes-agent:v2026.6.19
          imagePullPolicy: Always
          command: [sh, -c]
          args:
            - |
              set -eu
              chown 10000:10000 /run
              # chown -R: stale uid-0 dirs from old subPath design cause EPERM on reseed; idempotent on fresh PVCs.
              mkdir -p /opt/data/.codex /opt/data/.claude
              chown -R 10000:10000 /opt/data/.codex /opt/data/.claude
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          volumeMounts:
            - name: runtime
              mountPath: /run
            - name: data
              mountPath: /opt/data
        - name: seed-data
          image: harbor.hahomelabs.com/vicegerent/hermes-agent:v2026.6.19
          imagePullPolicy: Always
          command: [bash, -c]
          args:
            - |-
              set -euo pipefail
              dest="/opt/data/.hermes"
              mkdir -p "${dest}/mnemosyne/models" "${dest}/cache/fastembed" /opt/data/plugins
              # digest-gated reseed: only re-copy when image digest changes; rm-first so stale weights don't linger.
              seed="/opt/hermes/mnemosyne-seed"
              marker="${dest}/.mnemosyne-seed.sha256"
              want="$(cat "${seed}.sha256")"
              if [ "$(cat "${marker}" 2>/dev/null || true)" != "${want}" ]; then
                rm -rf "${dest}/mnemosyne/models" "${dest}/cache/fastembed"
                mkdir -p "${dest}/mnemosyne/models" "${dest}/cache/fastembed"
                cp -a "${seed}/mnemosyne/models/." "${dest}/mnemosyne/models/"
                cp -a "${seed}/cache/fastembed/." "${dest}/cache/fastembed/"
                printf '%s\n' "${want}" > "${marker}"
              fi
              pkg="$(/opt/hermes/.venv/bin/python -c 'import mnemosyne_hermes, os; print(os.path.dirname(mnemosyne_hermes.__file__))')"
              ln -sfn "${pkg}" /opt/data/plugins/mnemosyne
              # Seed ConfigMap-owned config files; agent runtime state uses different files in the same dirs.
              mkdir -p /opt/data/.codex /opt/data/.claude
              cp -f /reload/codex-config/config.toml /opt/data/.codex/config.toml
              cp -f /reload/claude-config/settings.json /opt/data/.claude/settings.json
              cp -f /reload/claude-config/claude.json /opt/data/.claude/.claude.json
              # kanban init: pre-create SQLite schema on PVC; || true because self-inits on first call anyway.
              mkdir -p /opt/data/tmp
              HERMES_HOME=/opt/data TMPDIR=/opt/data/tmp \
                /opt/hermes/.venv/bin/hermes kanban init || true
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: '1'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: codex-config
              mountPath: /reload/codex-config
              readOnly: true
            - name: claude-config
              mountPath: /reload/claude-config
              readOnly: true
      containers:
        - name: hermes
          image: harbor.hahomelabs.com/vicegerent/hermes-agent:v2026.6.19
          imagePullPolicy: Always
          args: [gateway]
          env:
            - name: HERMES_DASHBOARD
              value: '1'
            - name: HERMES_DASHBOARD_HOST
              value: 0.0.0.0
            - name: HERMES_DASHBOARD_PORT
              value: '9119'
            - name: HERMES_DASHBOARD_BASIC_AUTH_USERNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-dashboard-auth
                  key: password
                  optional: false
            - name: HERMES_DASHBOARD_BASIC_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: hermes-dashboard-auth
                  key: signing-secret
                  optional: false
            - name: SANDBOX_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            # config.yaml is read-only; model/provider binding must come from env.
            - name: HERMES_MODEL
              value: claude-sonnet-4-6
            - name: HERMES_TUI_PROVIDER
              value: sonnet
            - name: SEARXNG_URL
              value: http://searxng.searxng.svc.cluster.local:8080
            # Config homes on PVC (seeded by seed-data) to stay writable under readOnlyRootFilesystem.
            - name: CODEX_HOME
              value: /opt/data/.codex
            - name: CLAUDE_CONFIG_DIR
              value: /opt/data/.claude
            - name: TMPDIR
              value: /tmp
            - name: PYTHONDONTWRITEBYTECODE
              value: '1'
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-agentgateway-api-key
                  key: api-key
                  optional: false
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-agentgateway-api-key
                  key: api-key
                  optional: false
            # Langfuse plugin: pod name as environment so each sandbox is
            # identifiable in Langfuse; base URL points to in-cluster Langfuse.
            - name: HERMES_LANGFUSE_ENV
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: HERMES_LANGFUSE_BASE_URL
              value: http://langfuse-web.langfuse.svc.cluster.local:3000
            # Langfuse SDK keys from the dedicated observability secret
            # (Langfuse 1Password item — NOT Runtime, which is shared with agentgateway).
            - name: HERMES_LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-observability-secrets
                  key: init-project-public-key
                  optional: false
            - name: HERMES_LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-observability-secrets
                  key: init-project-secret-key
                  optional: false
          envFrom:
            # Optional: bot-platform credentials (Slack tokens etc.).
            # Populate 1Password item "Hermes Bot Secrets" to activate Slack.
            - secretRef:
                name: hermes-bot-secrets
                optional: true
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: runtime
              mountPath: /run
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /opt/data
            - name: gitrepos
              mountPath: /workspace
            - name: hermes-config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
            - name: hermes-soul
              mountPath: /opt/data/SOUL.md
              subPath: SOUL.md
      volumes:
        - name: runtime
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: hermes-config
          configMap:
            name: hermes-config
        - name: hermes-soul
          configMap:
            name: hermes-soul
        - name: codex-config
          configMap:
            name: codex-config
        - name: claude-config
          configMap:
            name: claude-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: gitrepos
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 50Gi
