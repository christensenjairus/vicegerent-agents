---
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: hermes
  namespace: agent-sandbox
  annotations:
    kustomize.toolkit.fluxcd.io/force: Disabled
spec:
  podTemplate:
    metadata:
      labels:
        vicegerent.io/dashboard: hermes
    spec:
      runtimeClassName: gvisor
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 10000
        runAsGroup: 10000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-run
          image: harbor.hahomelabs.com/vicegerent/hermes-agent:v2026.6.19
          imagePullPolicy: Always
          command: [sh, -c]
          args:
            - |
              set -eu
              chown 10000:10000 /run
              # Reclaim the coding-agent config homes for the non-root agent.
              # Stale root-owned files persist on the PVC from the previous
              # design (ConfigMap subPath mounts created /opt/data/.claude and
              # .codex as uid 0), which makes the uid-10000 seed-data cp fail
              # with EPERM. chown -R is idempotent and harmless on fresh PVCs.
              mkdir -p /opt/data/.codex /opt/data/.claude
              chown -R 10000:10000 /opt/data/.codex /opt/data/.claude
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            runAsNonRoot: false
          volumeMounts:
            - name: runtime
              mountPath: /run
            - name: data
              mountPath: /opt/data
        - name: seed-data
          image: harbor.hahomelabs.com/vicegerent/hermes-agent:v2026.6.19
          imagePullPolicy: Always
          command: [bash, -c]
          args:
            - |-
              set -euo pipefail
              dest="/opt/data/.hermes"
              mkdir -p "${dest}/mnemosyne/models" "${dest}/cache/fastembed" /opt/data/plugins
              # The mnemosyne LLM + fastembed ONNX cache are large and content-stable,
              # so they are seeded once and skipped on later boots. To let a rebuilt
              # image with upgraded weights actually replace the PVC copy, gate the copy
              # on the seed's content digest (baked at build, see images/hermes/Dockerfile):
              # re-seed only when the image digest differs from the marker last written to
              # the PVC. Unchanged boots compare one small file and skip the ~720MB walk.
              # rm-first so renamed/removed weights don't linger; cp -a preserves the
              # HuggingFace symlink cache layout. The rm is scoped to these two seed-only
              # subdirs (mnemosyne/models, cache/fastembed) and never touches ${dest}
              # itself or ${dest}/mnemosyne/ — so agent-written state (the mnemosyne DB,
              # plugins symlink, codex/claude homes) is untouched.
              seed="/opt/hermes/mnemosyne-seed"
              marker="${dest}/.mnemosyne-seed.sha256"
              want="$(cat "${seed}.sha256")"
              if [ "$(cat "${marker}" 2>/dev/null || true)" != "${want}" ]; then
                rm -rf "${dest}/mnemosyne/models" "${dest}/cache/fastembed"
                mkdir -p "${dest}/mnemosyne/models" "${dest}/cache/fastembed"
                cp -a "${seed}/mnemosyne/models/." "${dest}/mnemosyne/models/"
                cp -a "${seed}/cache/fastembed/." "${dest}/cache/fastembed/"
                printf '%s\n' "${want}" > "${marker}"
              fi
              pkg="$(/opt/hermes/.venv/bin/python -c 'import mnemosyne_hermes, os; print(os.path.dirname(mnemosyne_hermes.__file__))')"
              ln -sfn "${pkg}" /opt/data/plugins/mnemosyne
              # Coding-agent config homes live on the PVC (CODEX_HOME / CLAUDE_CONFIG_DIR
              # point here) so they stay writable under the main container's
              # readOnlyRootFilesystem. The two ConfigMaps are the source of truth and
              # are mounted here read-only; seed them onto the PVC each boot. Overwrite
              # the config files (image/ConfigMap owns config + pre-trust) while leaving
              # agent-written runtime state (history, sessions, sqlite, transcripts —
              # different filenames in the same dirs) untouched.
              mkdir -p /opt/data/.codex /opt/data/.claude
              cp -f /reload/codex-config/config.toml /opt/data/.codex/config.toml
              cp -f /reload/claude-config/settings.json /opt/data/.claude/settings.json
              cp -f /reload/claude-config/claude.json /opt/data/.claude/.claude.json
              # Initialize the kanban board so its SQLite schema exists at
              # $HERMES_HOME/kanban.db (the PVC) before first use; PVC-resident, so
              # the board survives pod restarts. This container is readOnlyRootFilesystem
              # with no /tmp mount, so point TMPDIR at the PVC. Non-fatal (|| true): the
              # board also self-inits on the agent's first kanban call, so a CLI hiccup
              # here must not crash pod boot.
              mkdir -p /opt/data/tmp
              HERMES_HOME=/opt/data TMPDIR=/opt/data/tmp \
                /opt/hermes/.venv/bin/hermes kanban init || true
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: '1'
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: codex-config
              mountPath: /reload/codex-config
              readOnly: true
            - name: claude-config
              mountPath: /reload/claude-config
              readOnly: true
      containers:
        - name: hermes
          image: harbor.hahomelabs.com/vicegerent/hermes-agent:v2026.6.19
          imagePullPolicy: Always
          args: [gateway]
          env:
            - name: HERMES_DASHBOARD
              value: '1'
            - name: HERMES_DASHBOARD_HOST
              value: 0.0.0.0
            - name: HERMES_DASHBOARD_PORT
              value: '9119'
            - name: HERMES_DASHBOARD_BASIC_AUTH_USERNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-dashboard-auth
                  key: password
            - name: HERMES_DASHBOARD_BASIC_AUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: hermes-dashboard-auth
                  key: signing-secret
            - name: SANDBOX_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SEARXNG_URL
              value: http://searxng.searxng.svc.cluster.local:8080
            # Coding-agent config homes on the PVC (seeded by seed-data) so they
            # stay writable under readOnlyRootFilesystem.
            - name: CODEX_HOME
              value: /opt/data/.codex
            - name: CLAUDE_CONFIG_DIR
              value: /opt/data/.claude
            # Redirect transient writes off the now read-only rootfs.
            - name: TMPDIR
              value: /tmp
            - name: PYTHONDONTWRITEBYTECODE
              value: '1'
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-agentgateway-api-key
                  key: api-key
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-agentgateway-api-key
                  key: api-key
          envFrom:
            - secretRef:
                name: vicegerent-secrets
          ports:
            - containerPort: 8642
              name: api
            - containerPort: 9119
              name: dashboard
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: runtime
              mountPath: /run
            - name: tmp
              mountPath: /tmp
            - name: data
              mountPath: /opt/data
            - name: gitrepos
              mountPath: /workspace
            - name: hermes-config
              mountPath: /opt/data/config.yaml
              subPath: config.yaml
            - name: hermes-soul
              mountPath: /opt/data/SOUL.md
              subPath: SOUL.md
      volumes:
        - name: runtime
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: hermes-config
          configMap:
            name: hermes-config
        - name: hermes-soul
          configMap:
            name: hermes-soul
        - name: codex-config
          configMap:
            name: codex-config
        - name: claude-config
          configMap:
            name: claude-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: gitrepos
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 50Gi
