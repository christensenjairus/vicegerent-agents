---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: graphiti-mcp
  namespace: graphiti
  labels:
    app.kubernetes.io/name: graphiti-mcp
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: graphiti-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: graphiti-mcp
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: graphiti-mcp
          image: docker.io/zepai/knowledge-graph-mcp:1.0.2-graphiti-0.28.2-standalone
          # invoke venv python directly; /root/.local/bin (uv) is unreachable by non-root UID.
          command: [/app/mcp/.venv/bin/python, main.py]
          workingDir: /app/mcp
          env:
            # PYTHONPATH: sitecustomize shim for graphiti#1205 Host fix.
            - name: PYTHONPATH
              value: /opt/patch
            - name: HOME
              value: /tmp
            - name: XDG_CACHE_HOME
              value: /tmp
            - name: CONFIG_PATH
              value: /app/mcp/config/config-docker-falkordb.yaml
            - name: FALKORDB_URI
              value: redis://falkordb.graphiti.svc.cluster.local:6379
            - name: FALKORDB_DATABASE
              value: default_db
            - name: FALKORDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: graphiti-falkordb
                  key: password
            # Gateway serves embeddings + chat completions; virtual key must be non-empty.
            - name: OPENAI_API_URL
              value: http://agentgateway-proxy.agentgateway-system.svc.cluster.local/graphiti-openai/v1
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: graphiti-gateway-key
                  key: api-key
            - name: GRAPHITI_GROUP_ID
              value: tribal
            - name: GRAPHITI_TELEMETRY_ENABLED
              value: 'false'
            - name: SEMAPHORE_LIMIT
              value: '10'
          ports:
            - containerPort: 8000
              name: mcp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: mcp
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            httpGet:
              path: /health
              port: mcp
            initialDelaySeconds: 20
            periodSeconds: 30
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: patch
              mountPath: /opt/patch
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: patch
          configMap:
            name: graphiti-mcp-patch
