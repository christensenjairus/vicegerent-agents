---
# Virtual API key Graphiti presents to agentgateway for embeddings. Non-empty
# token only (the OpenAI SDK rejects an empty key at client construction); the
# gateway swaps in the real OpenAI credential. Field `api-key`.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: graphiti-gateway-key
  namespace: graphiti
spec:
  itemPath: vaults/Vicegerent/items/GraphitiGatewayKey
