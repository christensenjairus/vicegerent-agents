---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: falkordb
  namespace: graphiti
  labels:
    app.kubernetes.io/name: falkordb
spec:
  serviceName: falkordb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: falkordb
  template:
    metadata:
      labels:
        app.kubernetes.io/name: falkordb
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 999
        runAsGroup: 999
        runAsNonRoot: true
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: falkordb
          image: docker.io/falkordb/falkordb:v4.18.10-alpine
          imagePullPolicy: IfNotPresent
          command: [redis-server]
          args:
            - --loadmodule
            - /var/lib/falkordb/bin/falkordb.so
            - --requirepass
            - $(FALKORDB_PASSWORD)
            - --dir
            - /data
          env:
            - name: FALKORDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: graphiti-falkordb
                  key: password
          ports:
            - containerPort: 6379
              name: redis
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 5Gi
