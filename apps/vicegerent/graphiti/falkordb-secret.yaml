---
# FalkorDB auth password + the agentgateway virtual key Graphiti presents for
# embeddings. Both are internal-generated values (not external provider creds);
# kept in the Vicegerent vault so they are not committed. The real OpenAI key is
# NOT here — it lives in the gateway's vicegerent-openai-secrets and is swapped
# in by the embeddings backend.
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: graphiti-falkordb
  namespace: graphiti
spec:
  itemPath: vaults/Vicegerent/items/GraphitiFalkorDB
