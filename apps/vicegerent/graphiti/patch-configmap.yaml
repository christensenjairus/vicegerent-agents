---
apiVersion: v1
kind: ConfigMap
metadata:
  name: graphiti-mcp-patch
  namespace: graphiti
data:
  # Auto-imported by CPython at interpreter startup (it lives on PYTHONPATH),
  # before main.py constructs FastMCP. Works around getzep/graphiti#1205: the
  # server builds FastMCP() with no host arg, so the MCP SDK (>=1.23) auto-locks
  # DNS-rebinding protection to localhost-only Host headers and the later
  # mcp.settings.host="0.0.0.0" never rebuilds that allowlist. agentgateway
  # connects with Host: graphiti-mcp.graphiti.svc.cluster.local -> 421.
  # We keep protection ENABLED and trust exactly the in-cluster Service FQDN
  # (matches backend.yaml's target host), nothing more.
  sitecustomize.py: |-
    try:
        import mcp.server.fastmcp.server as _fm
        from mcp.server.transport_security import TransportSecuritySettings
        _HOST = "graphiti-mcp.graphiti.svc.cluster.local"
        _orig_init = _fm.FastMCP.__init__
        def _patched_init(self, *args, **kwargs):
            if kwargs.get("transport_security") is None:
                kwargs["transport_security"] = TransportSecuritySettings(
                    enable_dns_rebinding_protection=True,
                    allowed_hosts=[_HOST, _HOST + ":*", "127.0.0.1:*", "localhost:*"],
                    allowed_origins=[],
                )
            return _orig_init(self, *args, **kwargs)
        _fm.FastMCP.__init__ = _patched_init
    except Exception:
        # Never let the shim break interpreter startup.
        pass
