kind: AgentgatewayBackend
metadata:
  name: graphiti
  namespace: agentgateway-system
spec:
  mcp:
    targets:
      - name: graphiti
        static:
          host: graphiti-mcp.graphiti.svc.cluster.local
          port: 8000
          path: /mcp
          protocol: StreamableHTTP
