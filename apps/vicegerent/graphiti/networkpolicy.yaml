---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: graphiti-mcp
  namespace: graphiti
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: graphiti-mcp
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: agentgateway-system
            gateway.networking.k8s.io/gateway-name: agentgateway-proxy
      toPorts:
        - ports:
            - port: '8000'
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: UDP
          rules:
            dns:
              - matchPattern: '*'
    # LLM/embeddings via agentgateway only; no direct world egress.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: agentgateway-system
            gateway.networking.k8s.io/gateway-name: agentgateway-proxy
      toPorts:
        - ports:
            - port: '80'
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: graphiti
            app.kubernetes.io/name: falkordb
      toPorts:
        - ports:
            - port: '6379'
              protocol: TCP
