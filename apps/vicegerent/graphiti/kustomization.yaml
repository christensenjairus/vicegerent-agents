---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - falkordb-secret.yaml
  - falkordb.yaml
  - falkordb-service.yaml
  - falkordb-networkpolicy.yaml
  - deployment.yaml
  - patch-configmap.yaml
  - service.yaml
  - networkpolicy.yaml
  - openai-backend.yaml
  - openai-route.yaml
  - backend.yaml
  - route.yaml
  - policy.yaml
secretGenerator:
  # Virtual key: non-secret placeholder; gateway replaces with real credential.
  - name: graphiti-gateway-key
    namespace: graphiti
    literals: [api-key=graphiti]
generatorOptions:
  disableNameSuffixHash: true
commonAnnotations:
  kustomize.toolkit.fluxcd.io/force: Enabled
