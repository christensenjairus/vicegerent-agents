---
apiVersion: v1
kind: ConfigMap
metadata:
  name: langfuse-model-seed
  namespace: langfuse
data:
  seed.py: |-
    """Seed Langfuse model definitions from models.json with live pricing from LiteLLM."""
    import base64, json, time, urllib.request, urllib.error, os, sys
    LITELLM_PRICES_URL = (
        "https://raw.githubusercontent.com/BerriAI/litellm/main/"
        "model_prices_and_context_window.json"
    )
    CONFIG_PATH = "/config/models.json"
    pk = os.environ["LANGFUSE_PUBLIC_KEY"]
    sk = os.environ["LANGFUSE_SECRET_KEY"]
    base_url = os.environ.get(
        "LANGFUSE_URL", "http://langfuse-web.langfuse.svc.cluster.local:3000"
    )
    auth = base64.b64encode(f"{pk}:{sk}".encode()).decode()
    headers = {"Authorization": f"Basic {auth}", "Content-Type": "application/json"}

    # Wait for Langfuse to be ready.
    print("waiting for Langfuse...", flush=True)
    for i in range(120):
        try:
            urllib.request.urlopen(base_url + "/api/public/health", timeout=3)
            print("Langfuse ready", flush=True)
            break
        except Exception as e:
            if i % 12 == 0:
                print(f"  still waiting ({i * 5}s): {e}", flush=True)
            time.sleep(5)
    else:
        raise SystemExit("Langfuse did not become ready after 10 minutes")

    # Fetch live prices from LiteLLM.
    litellm = {}
    try:
        resp = urllib.request.urlopen(LITELLM_PRICES_URL, timeout=15)
        litellm = json.loads(resp.read())
        print(f"fetched LiteLLM price catalog ({len(litellm)} entries)", flush=True)
    except Exception as e:
        print(f"WARNING: could not fetch LiteLLM prices, using fallbacks: {e}", flush=True)
    with open(CONFIG_PATH) as f:
        models = json.load(f)
    for m in models:
        entry = litellm.get(m["litellm_key"], {})
        # LiteLLM stores prices per token already (not per million).
        input_price = entry.get("input_cost_per_token", m["fallback_input_price"])
        output_price = entry.get("output_cost_per_token", m["fallback_output_price"])
        source = "litellm" if m["litellm_key"] in litellm else "fallback"
        print(
            f"  {m['name']}: in=${input_price:.2e} out=${output_price:.2e} ({source})",
            flush=True,
        )
        body = json.dumps({
            "modelName": m["name"],
            "matchPattern": m["match_pattern"],
            "unit": "TOKENS",
            "inputPrice": input_price,
            "outputPrice": output_price,
        }).encode()
        req = urllib.request.Request(
            base_url + "/api/public/models", data=body, headers=headers, method="POST"
        )
        try:
            urllib.request.urlopen(req, timeout=30)
            print(f"  -> created", flush=True)
        except urllib.error.HTTPError as e:
            if e.code == 409:
                print(f"  -> already exists", flush=True)
            else:
                raise RuntimeError(
                    f"{m['name']}: {e.code} {e.read().decode()!r}"
                )
    print("done", flush=True)
