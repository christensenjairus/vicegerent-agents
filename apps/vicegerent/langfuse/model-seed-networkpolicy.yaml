---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: langfuse-model-seed
  namespace: langfuse
spec:
  # Applies to the model-seed Job pods.
  endpointSelector:
    matchLabels:
      batch.kubernetes.io/job-name: langfuse-model-seed
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: UDP
          rules:
            dns:
              - matchPattern: '*'
    # Langfuse web (health + API)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: langfuse
            app.kubernetes.io/name: langfuse
      toPorts:
        - ports:
            - port: '3000'
              protocol: TCP
    # LiteLLM price catalog on raw.githubusercontent.com
    - toFQDNs:
        - matchName: raw.githubusercontent.com
      toPorts:
        - ports:
            - port: '443'
              protocol: TCP
