---
apiVersion: batch/v1
kind: Job
metadata:
  name: langfuse-model-seed
  namespace: langfuse
  annotations:
    # Re-runs whenever this Job manifest changes (Flux reconciles deletions/recreations).
    kustomize.toolkit.fluxcd.io/force: Enabled
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: seed
          image: python:3.13-alpine
          command: [python, /scripts/seed.py]
          env:
            - name: LANGFUSE_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: init-project-public-key
            - name: LANGFUSE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: init-project-secret-key
          volumeMounts:
            - name: seed-script
              mountPath: /scripts
              readOnly: true
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
      volumes:
        - name: seed-script
          configMap:
            name: langfuse-model-seed
