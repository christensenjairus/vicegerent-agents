---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: agentgateway-ingress-from-agent-sandbox
  namespace: agentgateway-system
spec:
  endpointSelector:
    matchLabels:
      gateway.networking.k8s.io/gateway-name: agentgateway-proxy
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: agent-sandbox
      toPorts:
        - ports:
            - port: '80'
              protocol: TCP
