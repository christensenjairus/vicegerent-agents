---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-proxy
  namespace: agentgateway-system
spec:
  gatewayClassName: agentgateway
  listeners:
    - protocol: HTTP
      port: 80
      name: http
      allowedRoutes:
        namespaces:
          from: Same
  infrastructure:
    parametersRef:
      name: agentgateway-config
      group: agentgateway.dev
      kind: AgentgatewayParameters
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: agentgateway-config
  namespace: agentgateway-system
spec:
  image:
    registry: harbor.hahomelabs.com/vicegerent
    repository: agentgateway
    tag: v1.3.1
  deployment:
    spec:
      replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  service:
    spec:
      ports:
        - name: listener-80
          port: 80
          targetPort: 80
        - name: metrics
          port: 15020
          targetPort: 15020
  rawConfig:
    # Override proxy backend pool defaults to prevent MCP session drops.
    # Default poolIdleTimeout (1m30s) and keepalives.time (3m0s) cause the
    # upstream connection to ghostunnel to be recycled every ~180s, which
    # kills MCP sessions at exactly poolIdleTimeout + requestTimeout (210s).
    # Hermes pings every ~60s so 10m is well beyond any expected idle period.
    backend:
      poolIdleTimeout: 10m
      keepalives:
        enabled: true
        time: 10m
        interval: 30s
        retries: 9
