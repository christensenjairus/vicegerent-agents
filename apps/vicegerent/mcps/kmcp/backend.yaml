---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: kmcp
  namespace: agentgateway-system
spec:
  mcp:
    targets:
      - name: tavily
        static:
          host: tavily.kmcp.svc.cluster.local
          port: 3000
          path: /mcp
          protocol: StreamableHTTP
      - name: firecrawl
        static:
          host: firecrawl.kmcp.svc.cluster.local
          port: 3000
          path: /mcp
          protocol: StreamableHTTP
  policies:
    tcp:
      connectTimeout: 5s
      keepalive:
        # Hermes pings every ~60s; keep TCP connections alive well beyond that.
        # Default 180s causes sessions to die every ~3.5 minutes.
        time: 10m
        interval: 30s
    http:
      requestTimeout: 30s
