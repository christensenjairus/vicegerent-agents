---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: kmcp-mcp-tools
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: kmcp
  backend:
    mcp:
      authorization:
        action: Allow
        policy:
          matchExpressions:
            - >-
              mcp.tool.name in ["tavily_search", "tavily_extract",
              "tavily_map", "tavily_crawl", "firecrawl_scrape",
              "firecrawl_search", "firecrawl_map", "firecrawl_extract",
              "firecrawl_crawl", "firecrawl_check_crawl_status"] ||
              mcp.tool.name.startsWith("gitlab_")
