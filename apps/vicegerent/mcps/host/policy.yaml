---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: host-mcp-tools
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
      name: host
  backend:
    tls:
      mtlsCertificateRef:
        - name: vicegerent-secrets
      caCertificateRefs:
        - name: ghostunnel-ca
    mcp:
      authorization:
        action: Allow
        policy:
          matchExpressions:
            - >-
              mcp.tool.name.startsWith("notion__") ||
              mcp.tool.name.startsWith("linear__") ||
              mcp.tool.name in [
                "kubernetes__configuration_contexts_list",
                "kubernetes__events_list",
                "kubernetes__namespaces_list",
                "kubernetes__nodes_log",
                "kubernetes__nodes_stats_summary",
                "kubernetes__nodes_top",
                "kubernetes__pods_get",
                "kubernetes__pods_list",
                "kubernetes__pods_list_in_namespace",
                "kubernetes__pods_log",
                "kubernetes__pods_top",
                "kubernetes__resources_get",
                "kubernetes__resources_list"
              ]
      guardrails:
        processors:
          - methods:
              tools/call: Request
            remote:
              backendRef:
                name: mcp-cerbos-shim
                namespace: cerbos
                port: 4445
              failureMode: FailClosed
