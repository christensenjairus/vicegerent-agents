---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: host
  namespace: agentgateway-system
spec:
  mcp:
    targets:
      - name: host
        static:
          host: host.minikube.internal
          port: 8453
          path: /mcp
          protocol: StreamableHTTP
  policies:
    tcp:
      connectTimeout: 5s
      keepalive:
        # Hermes pings every ~60s; keep TCP connections alive well beyond that.
        # Default 180s causes sessions to die every ~3.5 minutes.
        time: 10m
        interval: 30s
    http:
      requestTimeout: 30s
