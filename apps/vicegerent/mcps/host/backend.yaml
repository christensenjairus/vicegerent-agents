---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: host
  namespace: agentgateway-system
spec:
  mcp:
    targets:
      - name: host
        static:
          host: host.minikube.internal
          port: 8453
          path: /mcp
          protocol: StreamableHTTP
  policies:
    tcp:
      connectTimeout: 5s
    http:
      # Backstop above the Hermes client timeout (30s) so the gateway never
      # severs an in-flight request the client still considers live.
      requestTimeout: 60s
