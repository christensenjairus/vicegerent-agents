---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: firecrawl
  namespace: kmcp
spec:
  deployment:
    image: docker.io/node:24-alpine3.21
    cmd: npx
    args: [-y, firecrawl-mcp@3.22.1]
    port: 3000
    env:
      HOME: /home/node
      # firecrawl handles larger payloads (scraped HTML) so heap is higher than tavily
      # --max-old-space-size: hard V8 old-gen ceiling (MiB); must be < memory limit
      # --max-semi-space-size: nursery kept small to avoid holding large scrape results
      NODE_OPTIONS: --max-old-space-size=400 --max-semi-space-size=8
      # Redirect npm cache to /tmp so it doesn't persist/bloat the node home dir
      NPM_CONFIG_CACHE: /tmp/npm-cache
    secretRefs:
      - name: firecrawl-api-key
    serviceAccountName: firecrawl
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    resources:
      requests:
        cpu: 50m
        memory: 450Mi
      limits:
        memory: 600Mi
  stdioTransport: {}
  transportType: stdio
  timeout: 60s
