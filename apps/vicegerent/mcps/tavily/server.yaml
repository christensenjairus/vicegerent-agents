---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: tavily
  namespace: kmcp
spec:
  deployment:
    image: docker.io/node:24-alpine3.21
    cmd: npx
    args: [-y, tavily-mcp@0.2.20]
    port: 3000
    env:
      HOME: /home/node
      # --max-old-space-size: hard V8 old-gen ceiling (MiB); must be < memory limit for OOM headroom
      # --max-semi-space-size: new-gen nursery — smaller = more frequent minor GCs, less live set
      # --gc-interval: trigger idle GC roughly every N allocations (reduces long-term retention)
      NODE_OPTIONS: --max-old-space-size=150 --max-semi-space-size=8 --gc-interval=100
      # Redirect npm cache to /tmp so it doesn't bloat the node home dir across runs
      NPM_CONFIG_CACHE: /tmp/npm-cache
    secretRefs:
      - name: tavily-api-key
    serviceAccountName: tavily
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    resources:
      requests:
        cpu: 50m
        memory: 192Mi
      limits:
        memory: 256Mi
  stdioTransport: {}
  transportType: stdio
  timeout: 60s
