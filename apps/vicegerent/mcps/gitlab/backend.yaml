---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: gitlab
  namespace: agentgateway-system
spec:
  mcp:
    targets:
      - name: gitlab
        static:
          host: gitlab.kmcp.svc.cluster.local
          port: 3000
          path: /mcp
          protocol: StreamableHTTP
  policies:
    tcp:
      connectTimeout: 5s
    http:
      # Backstop above the Hermes client timeout (30s) so the gateway never
      # severs an in-flight request the client still considers live.
      requestTimeout: 60s
