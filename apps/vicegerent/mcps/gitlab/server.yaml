---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: gitlab
  namespace: kmcp
spec:
  deployment:
    image: docker.io/node:24-alpine3.21
    cmd: npx
    args:
      - -y
      - '@zereight/mcp-gitlab@2.1.8'
      - --api-url=https://gitlab.hahomelabs.com/api/v4
    port: 3002
    env:
      STREAMABLE_HTTP: 'true'
      HOST: 0.0.0.0
      GITLAB_MCP_OAUTH: 'false'
      REMOTE_AUTHORIZATION: 'false'
      USE_PIPELINE: 'true'
    secretRefs:
      - name: gitlab-credentials
    serviceAccountName: gitlab
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    resources:
      requests:
        cpu: 50m
        memory: 192Mi
  httpTransport:
    targetPort: 3002
  transportType: http
  timeout: 60s
---
apiVersion: onepassword.com/v1
kind: OnePasswordItem
metadata:
  name: gitlab-credentials
  namespace: kmcp
spec:
  itemPath: vaults/Vicegerent/items/MCP - GitLab
