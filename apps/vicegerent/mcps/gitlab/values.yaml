---
name: gitlab
command:
  cmd: npx
  args:
    - -y
    - '@zereight/mcp-gitlab@2.1.8'
    - --api-url=https://gitlab.hahomelabs.com/api/v4
port: 3002
transportType: http
env:
  STREAMABLE_HTTP: 'true'
  HOST: 0.0.0.0
  GITLAB_MCP_OAUTH: 'false'
  REMOTE_AUTHORIZATION: 'false'
  USE_PIPELINE: 'true'
resources:
  requests:
    cpu: 50m
    memory: 192Mi
secrets:
  - name: gitlab-credentials
    itemPath: vaults/Vicegerent/items/MCP - GitLab
networkPolicy:
  toFQDNs: [registry.npmjs.org, gitlab.hahomelabs.com]
gateway:
  enabled: true
  allowedTools:
    - get_merge_request_approval_state
    - get_merge_request_conflicts
    - search_repositories
    - create_merge_request
    - create_branch
    - get_merge_request
    - get_merge_request_diffs
    - list_merge_request_changed_files
    - list_merge_request_diffs
    - get_merge_request_file_diff
    - list_merge_request_versions
    - get_merge_request_version
    - update_merge_request
    - get_branch_diffs
    - get_project
    - list_projects
    - list_merge_requests
    - list_commits
    - get_commit
    - get_commit_diff
    - discover_tools
    - list_pipelines
    - get_pipeline
    - list_pipeline_jobs
    - list_pipeline_trigger_jobs
    - get_pipeline_job
    - get_pipeline_job_output
