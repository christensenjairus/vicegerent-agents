---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: searxng
  namespace: searxng
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: searxng
  ingress:
    # Hermes reaches searxng via the egress-proxy (scrubbed), not directly.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: egress-proxy
      toPorts:
        - ports:
            - port: '8080'
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: UDP
          rules:
            dns:
              - matchPattern: '*'
    # SearXNG makes direct outbound requests to search engines — no proxy needed here
    # since it holds no sandbox secrets. The sandbox secrets scrubbing happens upstream
    # in the egress-proxy before requests reach searxng.
    - toEntities: [world]
      toPorts:
        - ports:
            - port: '443'
              protocol: TCP
            - port: '80'
              protocol: TCP
