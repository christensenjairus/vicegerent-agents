---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: egress-proxy
  namespace: egress-proxy
  labels:
    app.kubernetes.io/name: egress-proxy
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: egress-proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: egress-proxy
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Build the combined mitmproxy-ca.pem (key+cert) that mitmproxy reads from confdir.
        # mitmproxy expects a single file named mitmproxy-ca.pem (key then cert, both PEM).
        # The Secret files are mode 0444 so uid 1000 can read them without fsGroup.
        - name: stage-ca
          # renovate: datasource=docker depName=mitmproxy/mitmproxy
          image: docker.io/mitmproxy/mitmproxy:11.1.3
          command: [sh, -c]
          args:
            - |
              set -eu
              if [ ! -s /ca-secret/ca.key ] || [ ! -s /ca-secret/ca.crt ]; then
                echo "ERROR: ca.key or ca.crt missing from egress-proxy-ca Secret." >&2
                echo "Run setup-secrets.sh to generate and store the egress proxy CA in 1Password." >&2
                exit 1
              fi
              cat /ca-secret/ca.key /ca-secret/ca.crt > /mitmproxy-ca/mitmproxy-ca.pem
              chmod 600 /mitmproxy-ca/mitmproxy-ca.pem
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: ca-secret
              mountPath: /ca-secret
              readOnly: true
            - name: mitmproxy-ca
              mountPath: /mitmproxy-ca
      containers:
        - name: mitmproxy
          # renovate: datasource=docker depName=mitmproxy/mitmproxy
          image: docker.io/mitmproxy/mitmproxy:11.1.3
          command: [mitmdump]
          args:
            - --listen-port=8080
            - --mode=regular
            - --set=confdir=/mitmproxy-ca
            - --set=verbosity=info
            - --scripts=/addon/scrub.py
          ports:
            - containerPort: 8080
              name: proxy
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
          livenessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: mitmproxy-ca
              mountPath: /mitmproxy-ca
            - name: addon
              mountPath: /addon
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: ca-secret
          secret:
            secretName: egress-proxy-ca  # pragma: allowlist secret
            defaultMode: 0444
        - name: mitmproxy-ca
          emptyDir: {}
        - name: addon
          configMap:
            name: egress-proxy-addon
        - name: tmp
          emptyDir: {}
