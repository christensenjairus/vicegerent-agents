---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-proxy
  namespace: agentgateway-system
spec:
  gatewayClassName: agentgateway
  listeners:
    - protocol: HTTP
      port: 80
      name: http
      allowedRoutes:
        namespaces:
          from: Same
  infrastructure:
    parametersRef:
      name: agentgateway-config
      group: agentgateway.dev
      kind: AgentgatewayParameters
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayParameters
metadata:
  name: agentgateway-config
  namespace: agentgateway-system
spec:
  image:
    registry: harbor.hahomelabs.com/vicegerent
    repository: agentgateway
    tag: v1.3.1
    # Always re-pull on pod (re)start, mirroring hermes-agent's convention: this image
    # is our own carried-patch build (images/agentgateway-proxy/), not a stock upstream
    # tag, so a rebuilt image with the same tag is common (patch-only changes) and
    # should not require a tag bump to actually deploy. Always still requires a pod
    # restart/rollout to take effect -- it does not hot-swap a running pod's image.
    pullPolicy: Always
  logging:
    format: json
  deployment:
    spec:
      replicas: 1
      strategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 1
          maxUnavailable: 0
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
  service:
    spec:
      ports:
        - name: listener-80
          port: 80
          targetPort: 80
        - name: metrics
          port: 15020
          targetPort: 15020
