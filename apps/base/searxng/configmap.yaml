---
apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-settings
  namespace: searxng
data:
  settings.yml: |-
    use_default_settings: true
    general:
      instance_name: "vicegerent-searxng"
      enable_metrics: false
    server:
      bind_address: "0.0.0.0"
      port: 8080
      limiter: false
      public_instance: false
      image_proxy: false
      method: "GET"
    search:
      safe_search: 0
      formats:
        - html
        - json
