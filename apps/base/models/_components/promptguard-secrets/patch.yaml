---
# Shared promptGuard secret+PII scrubbing for all three AI backends (anthropic/openai/haiku-oai) — the single source to edit.
# Pattern set mirrors egress-proxy REDACT_PATTERNS (charts/egress-proxy/templates/addon-configmap.yaml) / the Go shim registry; no gitleaks layer here. The cross-language mirror stays manual.
#
# PII is expressed as custom regex, NOT the `builtins: [Ssn, CreditCard, PhoneNumber]`
# shorthand agentgateway ships. Read agentgateway v1.3.1 source
# (crates/agentgateway/src/llm/policy/pii/{us_ssn,credit_card,phone}_recognizer.rs):
# those recognizers include unscored "very weak" patterns — notably a bare
# \b[0-9]{9}\b for SSN — and `apply_prompt_guard_regex` (llm/policy/mod.rs) rejects
# on ANY match regardless of confidence score, no threshold gate exists. That matched
# ordinary numeric content (tool-call IDs, timestamps, schema fields) in every real
# request and self-rejected the whole backend — see MR !426 (reverted twice) and
# the live logs (egress-proxy showing REDACTED count=69-148 on ordinary traffic).
# The 5 patterns below are the exact same tight, formatted patterns egress-proxy/
# mcp-cerbos-shim use (dash-delimited SSN excluding invalid ranges, IIN-prefixed
# credit cards, separator-required phone numbers) — same shape across the whole
# redaction stack, and none of them fire on a bare unformatted digit run.
#
# action is Mask (not Reject): the agentgateway-proxy 0002 patch
# (images/agentgateway-proxy/patches/) shipped and was verified live first; see that
# patch and MR !503 for why Mask was unsafe before it.
#
# streaming is omitted deliberately, NOT an oversight: the promptGuard.streaming
# field's CRD schema is a single-value enum (['Enabled']) -- it's presence-as-bool,
# there is no 'Disabled' value; omitting it is how you disable it (schema default).
# It stays omitted because agentgateway v1.3.1's streaming response path
# (evaluate_streaming_response_window -> TextResponse in llm/policy/mod.rs) has no
# mask_text_content override and no code path to rewrite bytes mid-stream
# (StreamingGuardrailOutcome only has a Blocked variant) -- a response-side Mask
# action against a streamed response would be a silent no-op with no log/metric/
# error. Request-side masking (this patch's actual target bug) is unaffected by
# this setting since requests are always fully buffered before the guard runs.
# Non-streaming responses are also unaffected and mask correctly.
# Only set `streaming: Enabled` once upstream/local patch adds real streaming
# masking (or the response action is changed to Reject, which does support
# blocking mid-stream via the Blocked outcome).
- op: add
  path: /spec/ai/groups/0/providers/0/policies/ai/promptGuard
  value:
    request:
      - regex:
          matches:
            - >-
              -----BEGIN (?:RSA |EC |OPENSSH |DSA |ED25519
              |ENCRYPTED )?PRIVATE KEY-----[\s\S]+?-----END (?:RSA
              |EC |OPENSSH |DSA |ED25519 |ENCRYPTED )?PRIVATE
              KEY-----
            - xox[bpraescd]-[A-Za-z0-9\-_]+
            - xapp-[A-Za-z0-9\-_]+
            - (?i)\bBearer\s+[A-Za-z0-9\-._~+/]+=*
            - (?i)\bBasic\s+[A-Za-z0-9+/]+=*
            - \b(?:AKIA|ASIA|AROA|AIDA)[A-Z0-9]{16}\b
            - \bgh[pousr]_[A-Za-z0-9]{36,255}\b
            - \bglpat-[A-Za-z0-9_\-]{20,}\b
            - \bAIza[A-Za-z0-9_\-]{35}\b
            - \bsk-(?:proj-)?[A-Za-z0-9_\-]{20,}\b
            - \bsk-ant-[A-Za-z0-9_\-]{20,}\b
            - \b(?:sk|rk)_(?:live|test)_[A-Za-z0-9]{16,}\b
            - \bntn_[A-Za-z0-9]{20,}\b
            - \bSK[a-f0-9]{32}\b
            - \bnpm_[A-Za-z0-9]{36}\b
            - \beyJ[A-Za-z0-9_\-]+\.eyJ[A-Za-z0-9_\-]+\.[A-Za-z0-9_\-]+\b
            - >-
              \b(?:0(?:0[1-9]|[1-9][0-9])|[1-5][0-9]{2}|6(?:[0-5][0-9]|6[0-57-9]|[7-9][0-9])|[78][0-9]{2})-(?:0[1-9]|[1-9][0-9])-(?:000[1-9]|00[1-9][0-9]|0[1-9][0-9]{2}|[1-9][0-9]{3})\b
            - \b4(?:[0-9]{12}|[0-9]{15}|[0-9]{18})\b
            - >-
              \b(?:5[1-5][0-9]{14}|(?:222[1-9]|22[3-9][0-9]|2[3-6][0-9]{2}|27[01][0-9]|2720)[0-9]{12})\b
            - \b3[47][0-9]{13}\b
            - >-
              \b(?:6011[0-9]{12}|65[0-9]{14}|64[4-9][0-9]{13}|622(?:12[6-9]|1[3-9][0-9]|[2-8][0-9]{2}|9(?:[01][0-9]|2[0-5]))[0-9]{10})\b
            - (?:\+?1[-.\s]?)?(?:\([0-9]{3}\)[-.\s]?|[0-9]{3}[-.\s])[0-9]{3}[-.\s][0-9]{4}\b
          action: Mask
        response:
          message: Outbound content matched a secret or PII guard pattern; matched
            spans were masked before forwarding.
    response:
      - regex:
          matches:
            - >-
              -----BEGIN (?:RSA |EC |OPENSSH |DSA |ED25519
              |ENCRYPTED )?PRIVATE KEY-----[\s\S]+?-----END (?:RSA
              |EC |OPENSSH |DSA |ED25519 |ENCRYPTED )?PRIVATE
              KEY-----
            - xox[bpraescd]-[A-Za-z0-9\-_]+
            - xapp-[A-Za-z0-9\-_]+
            - (?i)\bBearer\s+[A-Za-z0-9\-._~+/]+=*
            - (?i)\bBasic\s+[A-Za-z0-9+/]+=*
            - \b(?:AKIA|ASIA|AROA|AIDA)[A-Z0-9]{16}\b
            - \bgh[pousr]_[A-Za-z0-9]{36,255}\b
            - \bglpat-[A-Za-z0-9_\-]{20,}\b
            - \bAIza[A-Za-z0-9_\-]{35}\b
            - \bsk-(?:proj-)?[A-Za-z0-9_\-]{20,}\b
            - \bsk-ant-[A-Za-z0-9_\-]{20,}\b
            - \b(?:sk|rk)_(?:live|test)_[A-Za-z0-9]{16,}\b
            - \bntn_[A-Za-z0-9]{20,}\b
            - \bSK[a-f0-9]{32}\b
            - \bnpm_[A-Za-z0-9]{36}\b
            - \beyJ[A-Za-z0-9_\-]+\.eyJ[A-Za-z0-9_\-]+\.[A-Za-z0-9_\-]+\b
            - >-
              \b(?:0(?:0[1-9]|[1-9][0-9])|[1-5][0-9]{2}|6(?:[0-5][0-9]|6[0-57-9]|[7-9][0-9])|[78][0-9]{2})-(?:0[1-9]|[1-9][0-9])-(?:000[1-9]|00[1-9][0-9]|0[1-9][0-9]{2}|[1-9][0-9]{3})\b
            - \b4(?:[0-9]{12}|[0-9]{15}|[0-9]{18})\b
            - >-
              \b(?:5[1-5][0-9]{14}|(?:222[1-9]|22[3-9][0-9]|2[3-6][0-9]{2}|27[01][0-9]|2720)[0-9]{12})\b
            - \b3[47][0-9]{13}\b
            - >-
              \b(?:6011[0-9]{12}|65[0-9]{14}|64[4-9][0-9]{13}|622(?:12[6-9]|1[3-9][0-9]|[2-8][0-9]{2}|9(?:[01][0-9]|2[0-5]))[0-9]{10})\b
            - (?:\+?1[-.\s]?)?(?:\([0-9]{3}\)[-.\s]?|[0-9]{3}[-.\s])[0-9]{3}[-.\s][0-9]{4}\b
          action: Mask
        response:
          message: Inbound content matched a secret or PII guard pattern; matched
            spans were masked before returning.
