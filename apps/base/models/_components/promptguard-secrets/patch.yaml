---
# Shared promptGuard secret+PII scrubbing for all three AI backends (anthropic/openai/haiku-oai) — the single source to edit.
# Pattern set mirrors egress-proxy REDACT_PATTERNS (charts/egress-proxy/templates/addon-configmap.yaml) / the Go shim registry; no gitleaks layer here. The cross-language mirror stays manual.
- op: add
  path: /spec/ai/groups/0/providers/0/policies/ai/promptGuard
  value:
    streaming: Enabled
    request:
      - regex:
          matches:
            - >-
              -----BEGIN (?:RSA |EC |OPENSSH |DSA |ED25519
              |ENCRYPTED )?PRIVATE KEY-----[\s\S]+?-----END (?:RSA
              |EC |OPENSSH |DSA |ED25519 |ENCRYPTED )?PRIVATE
              KEY-----
            - xox[bpraescd]-[A-Za-z0-9\-_]+
            - xapp-[A-Za-z0-9\-_]+
            - (?i)\bBearer\s+[A-Za-z0-9\-._~+/]+=*
            - (?i)\bBasic\s+[A-Za-z0-9+/]+=*
            - \b(?:AKIA|ASIA|AROA|AIDA)[A-Z0-9]{16}\b
            - \bgh[pousr]_[A-Za-z0-9]{36,255}\b
            - \bglpat-[A-Za-z0-9_\-]{20,}\b
            - \bAIza[A-Za-z0-9_\-]{35}\b
            - \bsk-(?:proj-)?[A-Za-z0-9_\-]{20,}\b
            - \bsk-ant-[A-Za-z0-9_\-]{20,}\b
            - \b(?:sk|rk)_(?:live|test)_[A-Za-z0-9]{16,}\b
            - \bntn_[A-Za-z0-9]{20,}\b
            - \bSK[a-f0-9]{32}\b
            - \bnpm_[A-Za-z0-9]{36}\b
            - \beyJ[A-Za-z0-9_\-]+\.eyJ[A-Za-z0-9_\-]+\.[A-Za-z0-9_\-]+\b
          builtins: [Ssn, CreditCard, PhoneNumber]
          action: Reject
        response:
          message: 'Request rejected: outbound content matched a secret or PII guard
            pattern.'
    response:
      - regex:
          matches:
            - >-
              -----BEGIN (?:RSA |EC |OPENSSH |DSA |ED25519
              |ENCRYPTED )?PRIVATE KEY-----[\s\S]+?-----END (?:RSA
              |EC |OPENSSH |DSA |ED25519 |ENCRYPTED )?PRIVATE
              KEY-----
            - xox[bpraescd]-[A-Za-z0-9\-_]+
            - xapp-[A-Za-z0-9\-_]+
            - (?i)\bBearer\s+[A-Za-z0-9\-._~+/]+=*
            - (?i)\bBasic\s+[A-Za-z0-9+/]+=*
            - \b(?:AKIA|ASIA|AROA|AIDA)[A-Z0-9]{16}\b
            - \bgh[pousr]_[A-Za-z0-9]{36,255}\b
            - \bglpat-[A-Za-z0-9_\-]{20,}\b
            - \bAIza[A-Za-z0-9_\-]{35}\b
            - \bsk-(?:proj-)?[A-Za-z0-9_\-]{20,}\b
            - \bsk-ant-[A-Za-z0-9_\-]{20,}\b
            - \b(?:sk|rk)_(?:live|test)_[A-Za-z0-9]{16,}\b
            - \bntn_[A-Za-z0-9]{20,}\b
            - \bSK[a-f0-9]{32}\b
            - \bnpm_[A-Za-z0-9]{36}\b
            - \beyJ[A-Za-z0-9_\-]+\.eyJ[A-Za-z0-9_\-]+\.[A-Za-z0-9_\-]+\b
          builtins: [Ssn, CreditCard, PhoneNumber]
          action: Reject
