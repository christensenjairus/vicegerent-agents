---
# mitmproxy scrubbing + enforcement addon.
#
# ALL sandbox outbound traffic (internal cluster services + internet) flows through
# this proxy. Secrets in headers, bodies, and URL path/query are scrubbed before
# forwarding. Pattern-based scrubbing does NOT cover encoded forms (base64, hex) —
# the FQDN allowlist is the primary external control.
#
# Scrubbing (applied to every request, headers + body):
#   - SSH private keys  — PEM PRIVATE KEY blocks (any algorithm, including ENCRYPTED)
#   - Slack tokens      — xox[bpraescd]-... (bot, app-level, user, refresh, socket, client)
#                         xapp-...          (app-configuration tokens)
#   - Bearer tokens     — Authorization: Bearer <value> stripped from external requests;
#                         internal services (agentgateway) legitimately use Bearer auth
#                         and are not scrubbed (they are in-cluster and trusted)
#
# Method enforcement (GET/HEAD only) applies to EXTERNAL destinations only.
# Internal cluster services (*.svc.cluster.local) need POST and are passed through
# after scrubbing. One exception: git's smart-HTTP git-upload-pack (clone/fetch).
#
# Response scrubbing: applied to text responses to guard against echo attacks
# (a malicious service echoing back request content including secrets).
#
# WebSocket upgrades are blocked everywhere. Add host to no_proxy in sandbox.yaml
# for trusted WS endpoints (e.g. Slack, which bypasses this proxy entirely).
#
# Accepted risk:
#   - Slack (*.slack.com) bypasses proxy entirely — POST + WebSocket required for
#     Socket Mode. The agent communicates via Slack by design; this is a trusted channel.
#   - SSH (port 22) bypasses proxy — SSH is not HTTP. Content in git pushes (commits,
#     files) is not inspected. The agent's deploy key scope limits blast radius.
apiVersion: v1
kind: ConfigMap
metadata:
  name: egress-proxy-addon
  namespace: egress-proxy
data:
  scrub.py: |-
    import ipaddress
    import logging
    import re
    from mitmproxy import http
    log = logging.getLogger("egress-proxy")
    ALLOWED_METHODS = {"GET", "HEAD"}
    # URL length limit — blocks naive base64/hex query-string exfiltration.
    # 2048 chars is generous for all legitimate API/search use cases.
    MAX_URL_LENGTH = 2048

    # In-cluster service hostnames — POST allowed, Bearer auth NOT scrubbed (legitimate).
    INTERNAL_SUFFIXES = (".cluster.local", ".svc")
    EXTERNAL_FQDN_ALLOWLIST = {
        "pypi.org",
        "github.com",
        "githubusercontent.com",
        "huggingface.co",
        "httpbin.io",  # echo service — used by the redaction test suite only.
    }
    EXTERNAL_FQDN_WILDCARD_SUFFIXES = (
        ".github.com",
        ".githubusercontent.com",
        ".aws.cdn.hf.co",  # Hugging Face Xet CDN — large-file download redirects.
    )

    # Secrets patterns — redacted from request headers and body before forwarding.
    REDACT_PATTERNS = [
        # SSH private keys — all PEM formats including PKCS#8 encrypted variant.
        re.compile(
            r"-----BEGIN (?:RSA |EC |OPENSSH |DSA |ED25519 |ENCRYPTED )?PRIVATE KEY-----"
            r"[\s\S]+?"
            r"-----END (?:RSA |EC |OPENSSH |DSA |ED25519 |ENCRYPTED )?PRIVATE KEY-----",
            re.MULTILINE,
        ),
        # Slack tokens — xox* family (bot, app-level, user, refresh, socket, client)
        # and xapp-* (app-configuration tokens). Underscore is valid in token values.
        re.compile(r"xox[bpraescd]-[A-Za-z0-9\-_]+", re.ASCII),
        re.compile(r"xapp-[A-Za-z0-9\-_]+", re.ASCII),
    ]

    # Authorization Bearer scrubbing — external destinations only.
    # Internal services (agentgateway) use Bearer auth legitimately; do not scrub them.
    # Match Bearer token permissively — strip everything after "Bearer " regardless of
    # trailing content (avoids header variants like "Bearer token; extra=data" leaking).
    BEARER_PATTERN = re.compile(r"(?i)^(Bearer\s+)\S+")

    # RFC1918, link-local, loopback, CGNAT, and IPv6 private ranges — SSRF protection.
    PRIVATE_NETWORKS = [
        ipaddress.ip_network("10.0.0.0/8"),
        ipaddress.ip_network("172.16.0.0/12"),
        ipaddress.ip_network("192.168.0.0/16"),
        ipaddress.ip_network("169.254.0.0/16"),
        ipaddress.ip_network("127.0.0.0/8"),
        ipaddress.ip_network("100.64.0.0/10"),
        ipaddress.ip_network("::1/128"),
        ipaddress.ip_network("fc00::/7"),
        ipaddress.ip_network("fe80::/10"),
    ]

    # git smart-HTTP clone/fetch content-type — read-only, push (git-receive-pack)
    # goes over SSH instead and is not matched here.
    GIT_UPLOAD_PACK_CONTENT_TYPE = "application/x-git-upload-pack-request"

    # Content types safe to scrub as text; skip binary (images, archives, protobuf, etc.).
    TEXT_CONTENT_TYPES = (
        "text/",
        "application/json",
        "application/xml",
        "application/x-www-form-urlencoded",
        "application/graphql",
        "application/ld+json",
    )
    def _is_internal(host: str) -> bool:
        return any(host.endswith(s) for s in INTERNAL_SUFFIXES)
    def _is_private(host: str) -> bool:
        try:
            addr = ipaddress.ip_address(host)
            return any(addr in net for net in PRIVATE_NETWORKS)
        except ValueError:
            return False  # hostname — Cilium enforces destination boundary
    def _is_text(content_type: str) -> bool:
        ct = content_type.split(";")[0].strip().lower()
        return any(ct.startswith(t) for t in TEXT_CONTENT_TYPES)
    def _is_git_upload_pack(flow: http.HTTPFlow) -> bool:
        if flow.request.method != "POST" or not flow.request.path.endswith("/git-upload-pack"):
            return False
        ct = flow.request.headers.get("content-type", "").split(";")[0].strip().lower()
        return ct == GIT_UPLOAD_PACK_CONTENT_TYPE
    def _redact(text: str) -> tuple[str, int]:
        total = 0
        for pat in REDACT_PATTERNS:
            text, n = pat.subn("[REDACTED]", text)
            total += n
        return text, total
    def request(flow: http.HTTPFlow) -> None:
        host = flow.request.pretty_host
        method = flow.request.method
        url = flow.request.pretty_url
        internal = _is_internal(host)

        # SSRF protection — external destinations only.
        if not internal and _is_private(host):
            log.warning("BLOCKED private-dest method=%s url=%s", method, url)
            flow.response = http.Response.make(
                403,
                f"[egress-proxy] {host} is a private address — blocked",
                {"Content-Type": "text/plain"},
            )
            return

        # Block WebSocket upgrades everywhere.
        if flow.request.headers.get("upgrade", "").lower() == "websocket":
            log.warning("BLOCKED websocket-upgrade method=%s url=%s", method, url)
            flow.response = http.Response.make(
                403,
                "[egress-proxy] WebSocket upgrade blocked — add host to no_proxy",
                {"Content-Type": "text/plain"},
            )
            return

        # URL length limit on external requests — caps naive query-string exfiltration.
        # Legitimate API/search URLs are well under 2048 chars.
        if not internal and len(url) > MAX_URL_LENGTH:
            log.warning("BLOCKED url-too-long len=%d method=%s url=%.120s…", len(url), method, url)
            flow.response = http.Response.make(
                403,
                f"[egress-proxy] URL too long ({len(url)} > {MAX_URL_LENGTH})",
                {"Content-Type": "text/plain"},
            )
            return

        # Scrub secrets from request URL path + query string on external requests.
        # Headers and body are scrubbed later; the URL is the only remaining data channel
        # for GET requests (bodies blocked below), so it must also be scrubbed.
        # NOTE: scrubbing is pattern-based — encoding (base64, hex) evades it; the FQDN
        # allowlist is the primary external control, not this scrub.
        if not internal:
            raw_path = flow.request.path
            new_path, n = _redact(raw_path)
            if n:
                flow.request.path = new_path
                log.warning("REDACTED-URL count=%d method=%s url=%s", n, method, url)

        # Block GET/HEAD request bodies on external requests — no legitimate use,
        # potential exfiltration channel. Checked before scrubbing so we avoid
        # unnecessary work and the log ordering stays semantically correct
        # (BLOCKED fires before any REDACTED line for the same flow).
        if not internal and method in ALLOWED_METHODS and flow.request.content:
            log.warning("BLOCKED get-body method=%s url=%s", method, url)
            flow.response = http.Response.make(
                403,
                "[egress-proxy] GET/HEAD request bodies are not permitted",
                {"Content-Type": "text/plain"},
            )
            return

        # Scrub Bearer tokens from Authorization header on external requests.
        # Internal services (agentgateway) legitimately use Bearer auth — skip them.
        redacted = 0
        if not internal:
            auth = flow.request.headers.get("authorization", "")
            m = BEARER_PATTERN.match(auth) if auth else None
            if m:
                flow.request.headers["authorization"] = m.group(1) + "[REDACTED]"
                redacted += 1

        # Scrub additional auth header schemes on external requests.
        # Basic auth credentials and API key headers carry secrets in plaintext.
        if not internal:
            auth = flow.request.headers.get("authorization", "")
            if auth.lower().startswith("basic "):
                flow.request.headers["authorization"] = "Basic [REDACTED]"
                redacted += 1
            for hdr in ("x-api-key", "api-key"):
                if flow.request.headers.get(hdr):
                    flow.request.headers[hdr] = "[REDACTED]"
                    redacted += 1

        # Scrub secrets from all request headers.
        for name, value in list(flow.request.headers.items()):
            if name.lower() == "authorization":
                continue  # already handled above
            new_value, n = _redact(value)
            if n:
                flow.request.headers[name] = new_value
                redacted += n

        # Scrub secrets from request body (text content only; skip binary).
        if flow.request.content:
            ct = flow.request.headers.get("content-type", "")
            if not ct or _is_text(ct):
                try:
                    body = flow.request.get_text(strict=False)
                    new_body, n = _redact(body)
                    if n:
                        flow.request.set_text(new_body)
                        redacted += n
                except Exception:
                    pass
        if redacted:
            log.warning("REDACTED count=%d method=%s url=%s", redacted, method, url)

        # Method enforcement — external destinations only. Exception: git-upload-pack
        # (smart-HTTP clone/fetch, read-only) — needed for pre-commit hook installs.
        if not internal and method not in ALLOWED_METHODS and not _is_git_upload_pack(flow):
            log.warning("BLOCKED method=%s url=%s", method, url)
            flow.response = http.Response.make(
                403,
                f"[egress-proxy] {method} blocked — GET/HEAD only for external destinations",
                {"Content-Type": "text/plain"},
            )
            return
        if not internal:
            allowed = (
                host in EXTERNAL_FQDN_ALLOWLIST
                or any(host.endswith(s) for s in EXTERNAL_FQDN_WILDCARD_SUFFIXES)
            )
            if not allowed:
                log.warning("BLOCKED fqdn-not-allowlisted method=%s url=%s", method, url)
                flow.response = http.Response.make(
                    403,
                    (
                        f"[egress-proxy] {host} is not on the FQDN allowlist and will be"
                        " dropped by the network policy. Use an MCP tool instead"
                        " (web_search, firecrawl, tavily, gitlab, kubernetes, etc.)."
                    ),
                    {"Content-Type": "text/plain"},
                )
                return
        log.info("ALLOW internal=%s method=%s url=%s", internal, method, url)
    def response(flow: http.HTTPFlow) -> None:
        status = flow.response.status_code if flow.response else "-"

        # Scrub secrets from response body — guards against echo attacks.
        # Skip streaming responses (SSE / chunked transfer) to avoid buffering issues.
        scrubbed = 0
        if flow.response and flow.response.content:
            te = flow.response.headers.get("transfer-encoding", "").lower()
            ct = flow.response.headers.get("content-type", "")
            is_sse = "text/event-stream" in ct
            is_chunked = "chunked" in te
            if not is_sse and not is_chunked and _is_text(ct):
                try:
                    body = flow.response.get_text(strict=False)
                    new_body, n = _redact(body)
                    if n:
                        flow.response.set_text(new_body)
                        scrubbed += n
                except Exception:
                    pass
        if scrubbed:
            log.warning(
                "RESPONSE-REDACTED count=%d method=%s status=%s url=%s",
                scrubbed,
                flow.request.method,
                status,
                flow.request.pretty_url,
            )
        else:
            log.info(
                "RESPONSE method=%s status=%s url=%s",
                flow.request.method,
                status,
                flow.request.pretty_url,
            )
    def http_connect(flow: http.HTTPFlow) -> None:
        host = flow.request.host
        allowed = (
            host in EXTERNAL_FQDN_ALLOWLIST
            or any(host.endswith(s) for s in EXTERNAL_FQDN_WILDCARD_SUFFIXES)
        )
        if not allowed:
            log.warning("BLOCKED connect-fqdn-not-allowlisted host=%s", host)
            flow.response = http.Response.make(
                403,
                f"[egress-proxy] {host} is not on the FQDN allowlist",
                {"Content-Type": "text/plain"},
            )
    def websocket_start(flow: http.HTTPFlow) -> None:
        # Belt-and-suspenders: kill any WS that slipped past the request hook.
        log.warning("BLOCKED websocket-start host=%s", flow.request.pretty_host)
        flow.kill()
