---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: vmcp
  namespace: agentgateway-system
spec:
  mcp:
    targets:
      - name: vmcp
        static:
          host: host.docker.internal
          port: 8453
          path: /mcp
          protocol: StreamableHTTP
  policies:
    tcp:
      connectTimeout: 5s
    http:
      # Backstop above the Hermes/Claude/Codex client tool-call timeout (90s)
      # so the gateway never severs an in-flight request the client still
      # considers live.
      requestTimeout: 120s
