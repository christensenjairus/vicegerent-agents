---
# id/attr/attrFrom are CEL; vars: tool, args, backend, method.
# Only kind-bearing tools are mapped; unmapped tools pass (defaultAction: allow).
# canonicalK8s normalizes Secret spellings so Cerbos can deny them.
# Tool keys are the gateway-exposed names; `action` is the Cerbos action.
backends:
  vmcp:
    defaultAction: allow
    helpers: [canonicalK8s]
    tools:
      kubernetes_resources_get:
        resourceType: k8s_resource
        action: getResource
        id: get(args,'name','')
        attrFrom: canonicalK8s(args)
      kubernetes_resources_list:
        resourceType: k8s_resource
        action: listResources
        id: "''"
        attrFrom: canonicalK8s(args)
