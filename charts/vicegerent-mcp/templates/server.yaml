---
apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: {{ include "vicegerent-mcp.name" . }}
  namespace: {{ include "vicegerent-mcp.namespace" . }}
spec:
  deployment:
    image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
    cmd: {{ .Values.command.cmd }}
    args: {{ .Values.command.args | toJson }}
    port: {{ .Values.port }}
    {{- if .Values.env }}
    env:
      {{- toYaml .Values.env | nindent 6 }}
    {{- end }}
    {{- if .Values.secrets }}
    secretRefs:
      {{- range .Values.secrets }}
      - name: {{ .name }}
      {{- end }}
    {{- end }}
    serviceAccountName: {{ include "vicegerent-mcp.name" . }}
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 1000
      runAsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop: [ALL]
    resources:
      {{- toYaml .Values.resources | nindent 6 }}
  {{- if eq .Values.transportType "http" }}
  httpTransport:
    targetPort: {{ .Values.port }}
  {{- else }}
  stdioTransport: {}
  {{- end }}
  transportType: {{ .Values.transportType }}
  timeout: {{ .Values.timeout }}
