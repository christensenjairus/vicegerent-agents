---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: egress-proxy
  namespace: egress-proxy
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: egress-proxy
  ingress:
    # Only the sandbox pod routes through this proxy.
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: agent-sandbox
      toPorts:
        - ports:
            - port: '8080'
              protocol: TCP
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: UDP
          rules:
            dns:
              - matchPattern: '*'
    # Forward to agentgateway (LLM + MCP calls from hermes).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: agentgateway-system
            gateway.networking.k8s.io/gateway-name: agentgateway-proxy
      toPorts:
        - ports:
            - port: '80'
              protocol: TCP
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: victoria-logs
            app.kubernetes.io/name: victoria-logs
            app: server
      toPorts:
        - ports:
            - port: '9428'
              protocol: TCP
          rules:
            http:
              - method: GET
                path: "/select/.*"
              - method: POST
                path: "/select/.*"
    # Forward to searxng (web search from hermes).
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: searxng
            app.kubernetes.io/name: searxng
      toPorts:
        - ports:
            - port: '8080'
              protocol: TCP
    # Public-internet allowlist — set apexWildcardDomains/exactOnlyDomains in cluster-vars.yaml
    # (drives scrub.py from the same source). httpbin.io is hardcoded: redaction-test target only.
    - toFQDNs:
        {{- range (splitList "," .Values.apexWildcardDomains) }}
        {{- if . }}
        - matchName: {{ . }}
        - matchPattern: '*.{{ . }}'
        {{- end }}
        {{- end }}
        {{- range (splitList "," .Values.exactOnlyDomains) }}
        {{- if . }}
        - matchName: {{ . }}
        {{- end }}
        {{- end }}
        - matchName: httpbin.io
      toPorts:
        - ports:
            - port: '443'
              protocol: TCP
        - ports:
            - port: '80'
              protocol: TCP
          rules:
            http:
              - method: GET
  # Explicit deny for private/link-local/loopback/CGNAT — defence-in-depth.
  # egressDeny takes precedence over egress allows, guarding against DNS rebinding
  # and future accidental CIDR additions. internalAllowlistCIDRs (cluster-vars.yaml)
  # carves a machine-scoped except out of 10.0.0.0/8 below; empty by default.
  egressDeny:
    - toCIDRSet:
        - cidr: 10.0.0.0/8
          {{- if .Values.internalAllowlistCIDRs }}
          except:
            {{- range (splitList "," .Values.internalAllowlistCIDRs) }}
            {{- if . }}
            - {{ . }}
            {{- end }}
            {{- end }}
          {{- end }}
        - cidr: 172.16.0.0/12
        - cidr: 192.168.0.0/16
        - cidr: 169.254.0.0/16
        - cidr: 127.0.0.0/8
        - cidr: 100.64.0.0/10
        - cidr: ::1/128
        - cidr: fc00::/7
        - cidr: fe80::/10
