---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: egress-proxy
  namespace: egress-proxy
  labels:
    app.kubernetes.io/name: egress-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: egress-proxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: egress-proxy
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Build the combined mitmproxy-ca.pem (key+cert) that mitmproxy reads from confdir.
        # mitmproxy expects a single file named mitmproxy-ca.pem (key then cert, both PEM).
        # The Secret files are mode 0444 so uid 1000 can read them without fsGroup.
        - name: stage-ca
          # renovate: datasource=docker depName=mitmproxy/mitmproxy
          image: docker.io/mitmproxy/mitmproxy:12.2.3
          command: [sh, -c]
          args:
            - |
              set -eu
              if [ ! -s /ca-secret/ca.key ] || [ ! -s /ca-secret/ca.crt ]; then
                echo "ERROR: ca.key or ca.crt missing from egress-proxy-ca Secret." >&2
                echo "Run setup-secrets-platform.sh to generate the egress proxy CA and apply the Secret." >&2
                exit 1
              fi
              cat /ca-secret/ca.key /ca-secret/ca.crt > /mitmproxy-ca/mitmproxy-ca.pem
              chmod 600 /mitmproxy-ca/mitmproxy-ca.pem
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: ca-secret
              mountPath: /ca-secret
              readOnly: true
            - name: mitmproxy-ca
              mountPath: /mitmproxy-ca
      containers:
        - name: mitmproxy
          # renovate: datasource=docker depName=mitmproxy/mitmproxy
          image: docker.io/mitmproxy/mitmproxy:12.2.3
          command: [mitmdump]
          args:
            - --listen-port=8080
            - --mode=regular
            - --set=confdir=/mitmproxy-ca
            - --set=verbosity=info
            - --set=termlog_verbosity=error
            - --set=flow_detail=0
            - --scripts=/addon/scrub.py
          ports:
            - containerPort: 8080
              name: proxy
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
          livenessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: proxy
            initialDelaySeconds: 3
            periodSeconds: 10
          volumeMounts:
            - name: mitmproxy-ca
              mountPath: /mitmproxy-ca
            - name: addon
              mountPath: /addon
              readOnly: true
            - name: tmp
              mountPath: /tmp
        # gitleaks second-layer redaction, reached by scrub.py over loopback only.
        # Same Pod (shared netns) so 127.0.0.1:8081 is intra-pod; no Service and no
        # CiliumNetworkPolicy rule (intra-pod loopback isn't CNI-enforced).
        - name: gitleaks-sidecar
          # renovate: datasource=docker depName=harbor.hahomelabs.com/vicegerent/egress-gitleaks-sidecar
          image: harbor.hahomelabs.com/vicegerent/egress-gitleaks-sidecar:v0.1.0
          ports:
            - containerPort: 8081
              name: gitleaks
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
          # exec, not httpGet: the server binds 127.0.0.1 only, so a kubelet
          # networked probe (which dials the pod IP) can't reach it. -healthcheck
          # runs in-container against loopback; distroless has no shell for a
          # curl-based exec probe, so the binary self-probes.
          livenessProbe:
            exec:
              command: [/usr/local/bin/egress-gitleaks-sidecar, -healthcheck]
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            exec:
              command: [/usr/local/bin/egress-gitleaks-sidecar, -healthcheck]
            initialDelaySeconds: 3
            periodSeconds: 10
      volumes:
        - name: ca-secret
          secret:
            secretName: egress-proxy-ca  # pragma: allowlist secret
            defaultMode: 0444
        - name: mitmproxy-ca
          emptyDir: {}
        - name: addon
          configMap:
            name: egress-proxy-addon
        - name: tmp
          emptyDir: {}
