---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "vicegerent-agent.name" . }}-egress
  namespace: agent-sandbox
spec:
  endpointSelector:
    matchLabels:
      vicegerent.io/dashboard: {{ include "vicegerent-agent.name" . }}
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: UDP
          rules:
            dns:
              - matchName: egress-proxy.egress-proxy.svc.cluster.local
              - matchName: victoria-logs-server.victoria-logs.svc.cluster.local
              {{- if .Values.networkAllowlist.slackFQDNs }}
              {{- range .Values.networkAllowlist.slackFQDNs }}
              - matchName: {{ . }}
              {{- end }}
              {{- end }}
              {{- if .Values.networkAllowlist.cnameChainedFQDN }}
              - matchName: {{ .Values.networkAllowlist.cnameChainedFQDN }}
              {{- end }}
              {{- range (splitList "," .Values.networkAllowlist.cnameChain) }}
              {{- if . }}
              - matchName: {{ . }}
              {{- end }}
              {{- end }}
              - matchName: github.com
    # All HTTP(S) traffic — to internet, agentgateway, and searxng — routes through
    # the scrubbing proxy. Secrets are redacted before reaching any destination.
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: egress-proxy
            app.kubernetes.io/name: egress-proxy
      toPorts:
        - ports:
            - port: '8080'
              protocol: TCP
    # Slack uses Socket Mode (WSS) + POST Web API — bypass the GET-only proxy.
    # Restricted to exactly the FQDNs slack-bolt needs; wildcard *.slack.com removed.
    #
    # slack.com          — Web API (slack.com/api/*): auth.test, chat.postMessage,
    #                      apps.connections.open, reactions.*, files.*, users.info, etc.
    # wss-primary.slack.com — Socket Mode WebSocket endpoint (primary)
    # wss-backup.slack.com  — Socket Mode WebSocket endpoint (failover)
    # files.slack.com    — File/image downloads when the agent reads attachments
    #
    # NOTE: if Slack rotates the WSS hostname (rare but possible), Socket Mode will
    # fail to reconnect and you'll see apps.connections.open succeed but the WSS
    # connection refused. Add the new hostname here and to no_proxy in sandbox.yaml.
    {{- if .Values.networkAllowlist.slackFQDNs }}
    - toFQDNs:
        {{- range .Values.networkAllowlist.slackFQDNs }}
        - matchName: {{ . }}
        {{- end }}
      toPorts:
        - ports:
            - port: '443'
              protocol: TCP
    {{- end }}
    # SSH bypasses the HTTP proxy — direct egress for git push/pull. The configured FQDN may
    # resolve through a CNAME chain (dynamic DNS); Cilium's toFQDNs DNS proxy strips a CNAME
    # answer unless every name in the chain is itself allowlisted, so cnameChain lists the
    # intermediate names. Both are machine-scoped (cluster-vars.yaml); github.com is always
    # allowed.
    - toFQDNs:
        {{- if .Values.networkAllowlist.cnameChainedFQDN }}
        - matchName: {{ .Values.networkAllowlist.cnameChainedFQDN }}
        {{- end }}
        {{- range (splitList "," .Values.networkAllowlist.cnameChain) }}
        {{- if . }}
        - matchName: {{ . }}
        {{- end }}
        {{- end }}
        - matchName: github.com
      toPorts:
        - ports:
            - port: '22'
              protocol: TCP
