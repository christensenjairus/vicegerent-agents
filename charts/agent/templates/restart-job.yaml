---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "vicegerent-agent.name" . }}-restart
  namespace: agent-sandbox
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "vicegerent-agent.name" . }}-restart
    spec:
      serviceAccountName: {{ include "vicegerent-agent.name" . }}-restart
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: restart
          # renovate: datasource=docker depName=alpine/k8s
          image: alpine/k8s:1.36.2
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          env:
            - name: HOME
              value: /tmp
            - name: SANDBOX_NAME
              value: {{ include "vicegerent-agent.name" . }}
            - name: NAMESPACE
              value: agent-sandbox
          command:
            - /bin/bash
            - -c
            - |-
              set -euo pipefail
              echo "restarting sandbox ${SANDBOX_NAME} in ${NAMESPACE}"
              kubectl delete pod "${SANDBOX_NAME}" \
                --namespace "${NAMESPACE}" \
                --ignore-not-found \
                --wait=false
          volumeMounts:
            - name: sandbox-spec
              mountPath: /reload/sandbox-spec
              readOnly: true
            - name: config
              mountPath: /reload/config
              readOnly: true
            - name: soul
              mountPath: /reload/soul
              readOnly: true
            - name: codex-config
              mountPath: /reload/codex-config
              readOnly: true
            - name: claude-config
              mountPath: /reload/claude-config
              readOnly: true
            - name: approval-policy
              mountPath: /reload/approval-policy
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: sandbox-spec
          configMap:
            name: {{ include "vicegerent-agent.name" . }}-sandbox-spec
        - name: config
          configMap:
            name: {{ include "vicegerent-agent.name" . }}-config
        - name: soul
          configMap:
            name: {{ include "vicegerent-agent.name" . }}-soul
        - name: codex-config
          configMap:
            name: {{ include "vicegerent-agent.name" . }}-codex-config
        - name: claude-config
          configMap:
            name: {{ include "vicegerent-agent.name" . }}-claude-config
        - name: approval-policy
          configMap:
            name: {{ include "vicegerent-agent.name" . }}-approval-policy
        - name: tmp
          emptyDir: {}
