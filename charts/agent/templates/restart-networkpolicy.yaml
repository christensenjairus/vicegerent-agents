---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: {{ include "vicegerent-agent.name" . }}-restart-egress
  namespace: agent-sandbox
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vicegerent-agent.name" . }}-restart
  egress:
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: '53'
              protocol: UDP
          rules:
            dns:
              - matchPattern: '*'
    - toEntities: [kube-apiserver, host, remote-node]
