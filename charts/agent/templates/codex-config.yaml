---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vicegerent-agent.name" . }}-codex-config
  namespace: agent-sandbox
data:
  config.toml: |-
    model = "gpt-5.5"
    model_provider = "vicegerent"
    web_search = "disabled"
    developer_instructions = "{{ include "vicegerent-agent.webSearchInstructions" . | trim | replace "\"" "\\\"" }}"
    suppress_unstable_features_warning = true
    sandbox_mode = "danger-full-access"
    [model_providers.vicegerent]
    name = "Vicegerent agentgateway"
    base_url = "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/openai/v1"
    # Placeholder: agentgateway injects the real upstream key; the client only
    # needs a non-empty value, and the egress proxy scrubs it in transit.
    experimental_bearer_token = "unused"
    wire_api = "responses"
    [mcp_servers.mnemosyne]
    command = "/opt/hermes/.venv/bin/mnemosyne"
    args = ["mcp"]
    tool_timeout_sec = 180
    [mcp_servers.vmcp]
    url = "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/vmcp"
    tool_timeout_sec = 180
    # Pre-trust PVC-seeded workdirs so codex never blocks on directory trust.
    [projects."/workspace"]
    trust_level = "trusted"
    [projects."/workspace/vicegerent-agents"]
    trust_level = "trusted"
    [projects."/opt/hermes"]
    trust_level = "trusted"
    [features]
    respect_system_proxy = true
