---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "vicegerent-agent.name" . }}-restart
  namespace: agent-sandbox
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "vicegerent-agent.name" . }}-restart
  namespace: agent-sandbox
rules:
  - apiGroups: ['']
    resources: [pods]
    resourceNames: [{{ include "vicegerent-agent.name" . | quote }}]
    verbs: [get, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "vicegerent-agent.name" . }}-restart
  namespace: agent-sandbox
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "vicegerent-agent.name" . }}-restart
subjects:
  - kind: ServiceAccount
    name: {{ include "vicegerent-agent.name" . }}-restart
    namespace: agent-sandbox
