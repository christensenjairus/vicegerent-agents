---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vicegerent-agent.name" . }}-claude-config
  namespace: agent-sandbox
data:
  # DISABLE_NONESSENTIAL_TRAFFIC below: Claude Code's own telemetry/statsig/error-reporting
  # calls api.anthropic.com directly and ignores ANTHROPIC_BASE_URL (that only covers the Messages API client).
  settings.json: |-
    {
      "env": {
        "ANTHROPIC_BASE_URL": "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/anthropic",
        "ANTHROPIC_AUTH_TOKEN": "none",
        "CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC": "1"
      },
      "model": "claude-opus-4-8",
      "enableAllProjectMcpServers": true,
      "permissions": {
        "allow": ["mcp__mnemosyne", "mcp__vmcp"],
        "deny": ["WebSearch", "WebFetch"]
      },
      "sandbox": {
        "enabled": false
      },
      "theme": "dark",
      "skipDangerousModePermissionPrompt": true
    }
  claude.json: |-
    {
      "mcpServers": {
        "mnemosyne": {
          "type": "stdio",
          "command": "/opt/hermes/.venv/bin/mnemosyne",
          "args": ["mcp"]
        },
        "vmcp": {
          "type": "http",
          "url": "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/vmcp"
        }
      },
      "projects": {
        "/workspace": {
          "hasTrustDialogAccepted": true
        },
        "/workspace/vicegerent-agents": {
          "hasTrustDialogAccepted": true
        },
        "/opt/hermes": {
          "hasTrustDialogAccepted": true
        }
      }
    }
  CLAUDE.md: |-
    {{ include "vicegerent-agent.webSearchInstructions" . | trim }}
