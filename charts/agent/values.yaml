name: ''
image:
  repository: harbor.hahomelabs.com/vicegerent/hermes-agent
  tag: v2026.7.1
storage:
  data: 10Gi
  gitrepos: 50Gi
  # Mnemosyne embedding-model weights, reseeded from the image; excluded from Velero backup.
  models: 2Gi
  dataStorageClassName: csi-hostpath-sc
  gitreposStorageClassName: csi-hostpath-sc
  modelsStorageClassName: csi-hostpath-sc
slack:
  commandName: ''
# Required per agent; empty leaves the NodePort auto-allocated, which is unstable.
dashboard:
  nodePort: ''
obsidian:
  # Absolute path to a git-synced Obsidian vault under /opt/data or /workspace. Empty disables
  # Obsidian entirely: no env var is set and the Environment section omits Obsidian guidance.
  vaultPath: ''
# Personality/voice only. The chart appends a fixed Environment section after this.
soul: ''
# Agent config.yaml as a literal YAML string. Merged with defaultConfig and
# mandatoryConfig in _helpers.tpl — see those for what's default vs. locked.
config: ''
