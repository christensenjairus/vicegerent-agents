---
name: ''
image:
  repository: harbor.hahomelabs.com/vicegerent/hermes-agent
  tag: v2026.7.20
storage:
  data: 10Gi
  gitrepos: 50Gi
  # Mnemosyne embedding-model weights, reseeded from the image; excluded from Velero backup.
  models: 2Gi
  dataStorageClassName: csi-hostpath-sc
  gitreposStorageClassName: csi-hostpath-sc
  modelsStorageClassName: csi-hostpath-sc
slack:
  commandName: ''
# Required per agent; empty leaves the NodePort auto-allocated, which is unstable.
dashboard:
  nodePort: ''
obsidian:
  # Absolute path to a git-synced Obsidian vault under /opt/data or /workspace. Empty disables
  # Obsidian entirely: no env var is set and the Environment section omits Obsidian guidance.
  vaultPath: ''
git:
  # Global git identity for commits the agent makes (MRs, vault pushes, etc.). Empty skips
  # seeding ~/.gitconfig, leaving git to fail with "Author identity unknown" until set manually.
  userName: ''
  userEmail: ''
# Per-agent model-provider opt-in. anthropic/openai default enabled; deepseek/zai are opt-in.
# model/auxiliaryModel drive Hermes only -- codex/opencode hardcode their own model ids.
providers:
  anthropic:
    enabled: true
    model: claude-sonnet-5
    auxiliaryModel: claude-haiku-4-5
  openai:
    enabled: true
    model: gpt-5.4
    auxiliaryModel: gpt-4o-mini
  deepseek:
    enabled: false
    model: deepseek-v4-pro
    auxiliaryModel: deepseek-v4-flash
  zai:
    enabled: false
    model: glm-5.2
    auxiliaryModel: glm-4.7-flash
# Machine-scoped egress allowlist for a direct (port-22) FQDN reached behind dynamic DNS/a CDN
# (templates/networkpolicy.yaml), set per cluster from cluster-vars.yaml. Cilium's toFQDNs DNS
# proxy strips a CNAME answer unless every name in the resolution chain is itself allowlisted,
# so cnameChain (comma-joined) must list every intermediate hostname, not just the one actually
# queried — applies to any CNAME-chained FQDN, not specifically git. github.com is always
# allowed and not listed here.
networkAllowlist:
  cnameChainedFQDN: ''
  cnameChain: ''
  # Port-443 FQDNs allowed direct egress, bypassing the GET-only egress proxy (Slack Socket Mode
  # needs POST + WebSocket). Empty by default so the bypass list is opt-in per agent, not silently
  # inherited from this chart default.
  slackFQDNs: []
  # Same WSS-bypass shape as slackFQDNs, for edge-tts (tts.provider: edge): its only endpoint is
  # speech.platform.bing.com over WSS. Empty by default -- text sent to TTS leaves the scrubbing
  # proxy's protection entirely (no auth, no DPA, no retention guarantee from Microsoft), so this
  # is opt-in per agent, not a platform default. Set alongside config.tts.provider: edge.
  edgeTtsFQDNs: []
# Personality/voice only. The chart appends a fixed Environment section after this.
soul: ''
# Agent config.yaml as a literal YAML string. Merged with defaultConfig and
# mandatoryConfig in _helpers.tpl — see those for what's default vs. locked.
config: ''
