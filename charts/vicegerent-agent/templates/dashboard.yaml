---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "vicegerent-agent.name" . }}-dashboard
  namespace: agent-sandbox
spec:
  type: NodePort
  selector:
    vicegerent.io/dashboard: {{ include "vicegerent-agent.name" . }}
  ports:
    - name: dashboard
      port: 9119
      targetPort: dashboard
      nodePort: {{ .Values.dashboard.nodePort }}
