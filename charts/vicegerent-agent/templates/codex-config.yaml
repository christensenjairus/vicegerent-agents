---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vicegerent-agent.name" . }}-codex-config
  namespace: agent-sandbox
data:
  config.toml: |-
    model = "gpt-5.5"
    model_provider = "vicegerent"
    [model_providers.vicegerent]
    name = "Vicegerent agentgateway"
    base_url = "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/openai/v1"
    experimental_bearer_token = "${AGENTGATEWAY_API_KEY}"
    wire_api = "responses"
    [mcp_servers.mnemosyne]
    command = "/opt/hermes/.venv/bin/mnemosyne"
    args = ["mcp"]
    [mcp_servers.tavily]
    url = "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/tavily"
    [mcp_servers.firecrawl]
    url = "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/firecrawl"
    [mcp_servers.host]
    url = "http://agentgateway-proxy.agentgateway-system.svc.cluster.local/mcp/host"
    # Pre-trust PVC-seeded workdirs so codex never blocks on directory trust.
    [projects."/workspace"]
    trust_level = "trusted"
    [projects."/workspace/vicegerent-agents"]
    trust_level = "trusted"
    [projects."/opt/hermes"]
    trust_level = "trusted"
