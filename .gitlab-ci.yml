---
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "web"

variables:
  FORCE_COLOR: "3"
  PRE_COMMIT_HOME: $CI_PROJECT_DIR/.cache/pre-commit
  RENOVATE_BASE_DIR: $CI_PROJECT_DIR/renovate
  RENOVATE_CACHE_PRIVATE_PACKAGES: "true"
  RENOVATE_ENDPOINT: https://gitlab.hahomelabs.com/api/v4/
  RENOVATE_EXTRA_FLAGS: ""
  RENOVATE_GIT_AUTHOR: Renovate Bot <noreply@hahomelabs.com>
  RENOVATE_OPTIMIZE_FOR_DISABLED: "true"
  RENOVATE_PLATFORM: gitlab
  RENOVATE_REPOSITORIES: '["jchristensen/vicegerent-agents"]'
  RENOVATE_REPOSITORY_CACHE: enabled
  LOG_LEVEL: info

stages: [validate, scan]

validate:pre-commit:
  stage: validate
  image: harbor.hahomelabs.com/docker.io/alpine/k8s:1.36.2
  interruptible: true
  variables:
    SCHEMA_DEST: $CI_PROJECT_DIR/.flux-crd-schemas/master-standalone-strict
    TOOLS_CACHE_DIR: $CI_PROJECT_DIR/.cache/ci-tools
    # renovate: datasource=github-releases depName=mikefarah/yq
    YQ_VERSION: v4.53.3
    # renovate: datasource=github-releases depName=kubernetes-sigs/kustomize
    KUSTOMIZE_VERSION: v5.8.1
    # renovate: datasource=github-releases depName=yannh/kubeconform
    KUBECONFORM_VERSION: v0.8.0
    # renovate: datasource=github-releases depName=cerbos/cerbos
    CERBOS_VERSION: v0.53.0
  cache:
    key:
      prefix: validation-cache-yq${YQ_VERSION}-kustomize${KUSTOMIZE_VERSION}-kubeconform${KUBECONFORM_VERSION}-cerbos${CERBOS_VERSION}
      files:
        - .pre-commit-config.yaml
        - clusters/personal/flux-system/gotk-components.yaml
    paths:
      - .cache/pre-commit/
      - .flux-crd-schemas/
      - .cache/ci-tools/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "web"
      when: on_success
    - when: never
  before_script:
    - apk add --no-cache bash curl git python3 py3-pip tar 2>/dev/null || true
    - mkdir -p "$TOOLS_CACHE_DIR"
    - |
      if [ ! -x "$TOOLS_CACHE_DIR/yq" ]; then
        curl -sLo "$TOOLS_CACHE_DIR/yq" "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64"
        chmod +x "$TOOLS_CACHE_DIR/yq"
      fi
    - |
      if [ ! -x "$TOOLS_CACHE_DIR/kustomize" ]; then
        curl -sLo /tmp/kustomize.tar.gz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz"
        tar -xzf /tmp/kustomize.tar.gz -C "$TOOLS_CACHE_DIR" kustomize
      fi
    - |
      if [ ! -x "$TOOLS_CACHE_DIR/kubeconform" ]; then
        curl -sLo /tmp/kubeconform.tar.gz "https://github.com/yannh/kubeconform/releases/download/${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz"
        tar -xzf /tmp/kubeconform.tar.gz -C "$TOOLS_CACHE_DIR" kubeconform
      fi
    - |
      if [ ! -x "$TOOLS_CACHE_DIR/cerbos" ]; then
        curl -sLo /tmp/cerbos.tar.gz "https://github.com/cerbos/cerbos/releases/download/${CERBOS_VERSION}/cerbos_${CERBOS_VERSION#v}_Linux_x86_64.tar.gz"
        tar -xzf /tmp/cerbos.tar.gz -C "$TOOLS_CACHE_DIR" cerbos
      fi
    - cp "$TOOLS_CACHE_DIR"/{yq,kustomize,kubeconform,cerbos} /usr/local/bin/
    - chmod +x /usr/local/bin/{yq,kustomize,kubeconform,cerbos}
    - pip install pre-commit==4.5.0 detect-secrets==1.5.0 --break-system-packages --quiet
  script:
    - pre-commit run --all-files --show-diff-on-failure

validate:shim-go-test:
  stage: validate
  image: harbor.hahomelabs.com/docker.io/library/golang:1.26
  interruptible: true
  variables:
    GOPATH: $CI_PROJECT_DIR/.cache/go
    GOCACHE: $CI_PROJECT_DIR/.cache/go-build
  cache:
    key:
      prefix: shim-go
      files:
        - images/mcp-cerbos-shim/go.sum
    paths:
      - .cache/go/pkg/mod/
      - .cache/go-build/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - images/mcp-cerbos-shim/**/*
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "web"
      when: on_success
    - when: never
  script:
    - cd images/mcp-cerbos-shim
    - test -z "$(gofmt -l .)" || { echo "gofmt needed:"; gofmt -l .; exit 1; }
    - go vet ./...
    - go test ./...

validate:agentgateway-crds:
  stage: validate
  image: harbor.hahomelabs.com/docker.io/alpine/k8s:1.36.2
  interruptible: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - apps/base/**/*
        - infrastructure/controllers/agentgateway/**/*
        - scripts/validate-agentgateway*.{sh,py}
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "web"
      when: on_success
    - when: never
  before_script:
    - apk add --no-cache python3 py3-pip 2>/dev/null || true
    - pip install jsonschema --break-system-packages --quiet
  script:
    - bash scripts/validate-agentgateway.sh

validate:renovate-config:
  stage: validate
  image: harbor.hahomelabs.com/ghcr.io/renovatebot/renovate:43.256.0
  interruptible: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "web"
      when: on_success
    - when: never
  script:
    - renovate-config-validator renovate.json

scan:renovate:
  stage: scan
  image: harbor.hahomelabs.com/ghcr.io/renovatebot/renovate:43.256.0
  resource_group: renovate-main
  interruptible: false
  needs: []
  cache:
    key: renovate-cache-v1
    paths:
      - renovate/cache/
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule" && $CI_COMMIT_BRANCH == "main"
      when: on_success
    - if: $CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_BRANCH == "main"
      when: on_success
    - when: never
  script:
    - renovate-config-validator renovate.json
    - renovate $RENOVATE_EXTRA_FLAGS
