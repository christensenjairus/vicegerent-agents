---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kmcp-crds
  namespace: kmcp-system
spec:
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
    crds: CreateReplace
  upgrade:
    remediation:
      retries: -1
    crds: CreateReplace
  interval: 30m
  chart:
    spec:
      chart: kmcp-crds
      version: 0.3.0
      sourceRef:
        kind: HelmRepository
        name: kmcp-crds
        namespace: kmcp-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: kmcp-crds-values
