---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kmcp
  namespace: kmcp-system
spec:
  dependsOn:
    - name: kmcp-crds
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
    crds: CreateReplace
  upgrade:
    remediation:
      retries: -1
    crds: CreateReplace
    force: true
  interval: 30m
  chart:
    spec:
      chart: kmcp
      version: 0.3.0
      sourceRef:
        kind: HelmRepository
        name: kmcp
        namespace: kmcp-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: kmcp-values
