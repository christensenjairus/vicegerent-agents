---
name: linear_devops_team_block_test
description: Linear save_issue calls targeting a team other than DEVOPS are denied;
  calls confined to the DEVOPS team (by uuid, name, or key) are allowed.
options:
  now: '2026-07-02T00:00:00Z'
principals:
  hermes:
    id: hermes
    roles: [agent]
resources:
  devops_team_uuid:
    id: 6deab0c5-9bda-4f82-b552-41f4aa9e449b
    kind: linear_team
    attr: {teamId: 6deab0c5-9bda-4f82-b552-41f4aa9e449b}
  devops_team_name:
    id: DevOps
    kind: linear_team
    attr: {teamId: DevOps}
  devops_team_key:
    id: DEVOPS
    kind: linear_team
    attr: {teamId: DEVOPS}
  other_team:
    id: some-other-team-id
    kind: linear_team
    attr: {teamId: some-other-team-id}
  missing_team_id:
    id: '*'
    kind: linear_team
    attr: {teamId: ''}
tests:
  - name: save_issue confined to DEVOPS (uuid, name, or key) is allowed
    input:
      principals: [hermes]
      resources: [devops_team_uuid, devops_team_name, devops_team_key]
      actions: [access]
    expected:
      - principal: hermes
        resource: devops_team_uuid
        actions: {access: EFFECT_ALLOW}
      - principal: hermes
        resource: devops_team_name
        actions: {access: EFFECT_ALLOW}
      - principal: hermes
        resource: devops_team_key
        actions: {access: EFFECT_ALLOW}
  - name: save_issue targeting another team, or with no teamId, is denied
    input:
      principals: [hermes]
      resources: [other_team, missing_team_id]
      actions: [access]
    expected:
      - principal: hermes
        resource: other_team
        actions: {access: EFFECT_DENY}
      - principal: hermes
        resource: missing_team_id
        actions: {access: EFFECT_DENY}
