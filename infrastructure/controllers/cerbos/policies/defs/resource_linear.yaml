---
# linear_team policy: deny a save_issue call that supplies a team other than the
# allowed one (${linearAllowedTeams}, from clusters/personal/cluster-vars.yaml);
# allow everything else. The team is matched by any of its three known
# identifiers, since the caller's `team` arg may be the real Linear team
# UUID, its display name ("DevOps"), or its issue-key prefix ("DEVOPS") — an
# exact match against only one form would wrongly deny legitimate DEVOPS
# calls that use a different form. A call that supplies no team at all
# (every ordinary issue update — team is optional there) has no teamId attr
# key at all (see mapping.yaml's linearIssueAttr helper) and falls through
# to allow-all.
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: linear_team
  rules:
    - name: deny-non-devops-team
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            has(request.resource.attr.teamId) &&
            !(request.resource.attr.teamId in
            [${linearAllowedTeams}])
    - name: allow-all
      actions: ['*']
      effect: EFFECT_ALLOW
      roles: ['*']
