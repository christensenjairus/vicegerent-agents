---
# linear_team policy: allow save_issue calls confined to the DEVOPS team;
# deny everything else, including a missing/empty team. DEVOPS is matched by
# any of its three known identifiers, since the caller's `team` arg may be
# the real Linear team UUID, its display name ("DevOps"), or its issue-key
# prefix ("DEVOPS") — an exact match against only one form would wrongly
# deny legitimate DEVOPS calls that use a different form. On issue updates
# (existing issue, no team arg available) the shim maps straight to the
# UUID (see mapping.yaml), so this rule is a no-op there; it only bites on
# create. Previously this compared against a REPLACE_WITH_DEVOPS_TEAM_ID
# placeholder — harmless on its own, but combined with a mapping.yaml key
# that pointed at a since-renamed tool (linear_create_issue, now
# linear_save_issue), the check never received a populated teamId and never
# fired at all; both are fixed together here.
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: linear_team
  rules:
    - name: deny-non-devops-team
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            !has(request.resource.attr.teamId) ||
            !(request.resource.attr.teamId in
            ["6deab0c5-9bda-4f82-b552-41f4aa9e449b", "DevOps", "DEVOPS"])
    - name: allow-all
      actions: ['*']
      effect: EFFECT_ALLOW
      roles: ['*']
