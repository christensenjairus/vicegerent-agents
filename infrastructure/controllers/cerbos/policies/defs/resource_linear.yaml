---
# linear_team policy: deny a save_issue call that supplies (or
# whose target issue currently HAS, per a live resolution) a team other than
# the allowed one (${linearAllowedTeams}, from clusters/personal/cluster-vars.yaml);
# deny a save_project call whose addTeams/setTeams (or whose
# target project's CURRENT teams, per a live resolution) contain any team
# other than the allowed one; deny a save_comment
# call on an issue whose team the shim resolved (via a live linear_get_issue
# lookup) to anything other than the allowed one; deny a
# create_issue_label call whose teamId is set to anything other than the
# allowed one (a workspace-scoped label has no teamId at all and
# isn't checked); allow everything else. The team is matched by any of its
# three known identifiers, since the caller's `team`/addTeams/setTeams/teamId
# entries (or the shim's resolved lookup result for save_comment/save_issue
# updates/save_project updates) may be the real Linear team UUID, its display
# name ("DevOps"), or its issue-key prefix ("DEVOPS") — an exact match against
# only one form would wrongly deny legitimate DEVOPS calls that use a
# different form.
#
# An earlier fix closed a real enforcement gap: previously, a save_issue UPDATE with
# no `team` arg (an ordinary field edit — the overwhelming majority of
# updates) got no teamId attr at all and fell through to allow-all
# REGARDLESS of the issue's actual current team, since linearIssueAttr only
# ever populated teamId from the call's own `team` argument. The same gap
# existed for save_project updates that touched neither addTeams nor
# setTeams. The shim now runs a live lookup (linear_get_issue /
# linear_get_project, server.go) whenever the call itself didn't supply an
# explicit, already-verifiable team signal, and injects the resolved
# current team(s) into this same teamId/teams attr — so this policy's rules
# below are unchanged; only what populates the attr got stricter. A
# save_issue call that supplies an explicit team at all (create, required;
# update, a deliberate reassignment) has that value take precedence over any
# live resolution — see mapping.yaml's linearIssueAttr helper. The only calls
# that still fall through to allow-all with NO teamId/teams attr at all are
# ones with genuinely nothing to verify or resolve: a save_comment call with
# no issueId (a comment on a project/initiative/document/milestone, or a
# reply via parentId — server.go's team-resolution gate has no id to look up), and a
# create_issue_label call with no teamId arg (a workspace-scoped label isn't
# team-owned at all — mapping.yaml's linearLabelAttr helper). Every OTHER
# Linear write against an existing team-scoped entity now gets either an
# explicit, caller-supplied team signal or a live-resolved current one before
# reaching this policy.
#
# force-self-assignee follow-up: also deny (a) a save_issue CREATE call
# (isCreate="true", i.e. no `id` arg) that doesn't set assignee at all, and
# (b) any save_issue call (create or update) that sets assignee to someone
# outside ${linearAllowedAssignees} -- mirrors Jira's identical pair of
# rules exactly (resource_jira.yaml). "me" is always implicitly valid
# regardless of the allowlist, since Linear's own API treats it as the
# OAuth-connected identity (this operator) -- checked as a literal string
# match against the raw `assignee` arg value before Cerbos ever sees it
# (linearIssueAttrOption, helpers_linear.go), so `assignee: "me"` never
# even reaches the allowlist comparison. isCreate/assignee are surfaced by
# the same linearIssueAttr helper the pre-existing teamId check already
# uses -- has()-guarded the same way, so an ordinary update that never
# touches assignee gets no assignee key at all and isn't affected by
# either new rule. The "*" bypass is honored here too, matching
# jiraAllowedAssignees's disable-the-whole-check semantics.
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: linear_team
  rules:
    - name: deny-non-devops-team
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            has(request.resource.attr.teamId) &&
            !(request.resource.attr.teamId in
            [${linearAllowedTeams}])
      output:
        when:
          ruleActivated: >-
            "This agent may only create/update Linear issues for the DEVOPS team."
    - name: deny-non-devops-project-teams
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            has(request.resource.attr.teams) &&
            request.resource.attr.teams.exists(t, !(t in
            [${linearAllowedTeams}]))
      output:
        when:
          ruleActivated: >-
            "This agent may only assign Linear projects to the DEVOPS team."
    - name: deny-create-missing-assignee
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            has(request.resource.attr.isCreate) &&
            request.resource.attr.isCreate == "true" &&
            (!has(request.resource.attr.assignee) || request.resource.attr.assignee
            == "")
            && !("*" in [${linearAllowedAssignees}])
      output:
        when:
          ruleActivated: >-
            "This agent must set an allowed assignee when creating a new"
            + " Linear issue. Pass assignee explicitly (or \"me\")."
    - name: deny-assignee-outside-allowed
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            has(request.resource.attr.assignee) && request.resource.attr.assignee
            != ""
            && request.resource.attr.assignee != "me"
            && !("*" in [${linearAllowedAssignees}])
            && !(request.resource.attr.assignee in [${linearAllowedAssignees}])
      output:
        when:
          ruleActivated: >-
            "This agent may only assign Linear issues to an allowed user."
            + " The requested assignee is outside that scope."
    - name: allow-all
      actions: ['*']
      effect: EFFECT_ALLOW
      roles: ['*']
