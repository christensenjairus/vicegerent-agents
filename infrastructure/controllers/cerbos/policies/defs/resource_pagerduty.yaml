---
# pagerduty_incident policy: deny manage_incidents calls that change anything
# other than status=acknowledged/resolved -- blocks reopening to "triggered",
# and blocks the presence of ANY manage_request key other than incident_ids/
# status at all (an allowlist of that shape, not a denylist of specific
# field names like urgency/escalation_level/assignement/assignment -- see
# helpers_pagerduty.go for why); allow everything else, including
# add_note_to_incident. The shim's pagerdutyManageAttr helper
# (helpers_pagerduty.go) parses manage_incidents' single manage_request arg
# -- this MCP tool's own FLAT body: {incident_ids, status, urgency,
# escalation_level, assignement} -- to compute hasOutOfScopeChange.
#
# NOTE: an earlier version of this policy/helper assumed manage_request had a
# PagerDuty-REST-API-shaped "incidents" array of per-incident objects with
# priority/resolution/title/incident_type/conference_bridge fields. That
# shape does not exist on this MCP tool's actual call at all -- confirmed
# against the tool's real IncidentManageRequest schema. Because the assumed
# array was never present, the old helper's loop never executed and
# hasOutOfScopeChange was always "false", silently letting urgency and
# escalation_level through unchecked (found via live testing: an
# escalation_level=2 call reached PagerDuty's real API instead of being
# denied by Cerbos, and was only stopped by PagerDuty itself rejecting an
# already-resolved incident -- against a triggered/acknowledged incident it
# would have gone through). The next version fixed that by denylisting the
# real flat field names (urgency/escalation_level/assignement) directly --
# which then needed a second by-hand fix when pagerduty-mcp 1.1.0's tool
# description started calling that same wire field "assignment" instead of
# "assignement". This version allowlists incident_ids/status instead of
# denylisting everything else, so a field neither of those two incidents
# anticipated is caught automatically, without another by-hand fix.
#
# No bulk-size cap: incident_ids can list multiple ids in one status change;
# there's no per-incident field variation to gate (unlike a REST-API batch),
# so a single allowlist check against the whole manage_request covers any
# batch size.
# create_incident, add_responders, and start_incident_workflow are removed
# from the tool allowlist entirely (toolhive-servers.json) rather than
# policy-limited, since there's no useful partial-scope to enforce on them
# short of an outright block. Read-only tools (get_incident, list_incidents,
# schedules (v2 and v3), on-calls, services, teams, users, escalation
# policies, incident/responder analytics metrics) are unmapped and pass.
#
# deny-write-outside-allowed-services: status-only scoping isn't
# enough if the agent can act on ANY incident it can reach -- neither
# manage_incidents nor add_note_to_incident carries a service/team
# identifier in its own args at all, only an opaque incident_id/
# incident_ids, so there's nothing here for Cerbos alone to check. The
# shim resolves every targeted incident to its owning service via a live
# pagerduty_get_incident lookup BEFORE this policy is consulted (server.go's
# checkPagerdutyIncidentServices, same pattern as the Notion ancestry gate
# and Linear issue/project team gates elsewhere in this shim) and injects
# the resolved id(s) into serviceIds; a write is denied if ANY resolved
# service isn't in ${pagerdutyAllowedServiceIds} -- a bulk manage_incidents
# call is treated as a single unit (deny the whole batch on any
# out-of-scope member), not per-incident, mirroring this same policy's own
# no-bulk-cap rationale for manage_incidents above. "*" disables the check
# entirely, the safe default until the operator opts in, since there was
# no pre-existing service restriction to preserve.
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: pagerduty_incident
  rules:
    - name: deny-non-ack-resolve-change
      actions: [manage]
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            has(request.resource.attr.hasOutOfScopeChange) &&
            request.resource.attr.hasOutOfScopeChange == "true"
      output:
        when:
          ruleActivated: >-
            "This agent may only acknowledge or resolve PagerDuty incidents."
            + " Reopening to 'triggered', and urgency/escalation/assignment"
            + " changes, are not allowed."
    - name: deny-write-outside-allowed-services
      actions: [manage, annotate]
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            has(request.resource.attr.serviceIds) &&
            !("*" in [${pagerdutyAllowedServiceIds}]) &&
            request.resource.attr.serviceIds.exists(s, !(s in [${pagerdutyAllowedServiceIds}]))
      output:
        when:
          ruleActivated: >-
            "This agent may only act on PagerDuty incidents belonging to an"
            + " allowed service. At least one targeted incident is outside"
            + " that scope."
    - name: allow-all
      actions: ['*']
      effect: EFFECT_ALLOW
      roles: ['*']
