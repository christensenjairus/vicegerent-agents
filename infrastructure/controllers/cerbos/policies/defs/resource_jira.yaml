---
# jira_project policy: deny any Jira call that targets a project other than the
# allowed one (${jiraProjectKey}, from clusters/personal/cluster-vars.yaml);
# allow everything else. The shim maps every project/issue-bearing Jira tool to this
# resource, carrying project_key plus any issue/inward/outward/epic keys (whose
# "<PROJECT>-123" prefix is the project). A call is denied if any populated key
# resolves to a different project. Do NOT add tools here to permit them;
# that belongs in the vMCP tools allowlist.
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: jira_project
  rules:
    - name: deny-non-change-project
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            (has(request.resource.attr.projectKey) && request.resource.attr.projectKey
            != "" && request.resource.attr.projectKey != "${jiraProjectKey}")
            || (has(request.resource.attr.issueKey) && request.resource.attr.issueKey
            != "" && !request.resource.attr.issueKey.startsWith("${jiraProjectKey}-"))
            || (has(request.resource.attr.inwardKey) && request.resource.attr.inwardKey
            != "" && !request.resource.attr.inwardKey.startsWith("${jiraProjectKey}-"))
            || (has(request.resource.attr.outwardKey) && request.resource.attr.outwardKey
            != "" && !request.resource.attr.outwardKey.startsWith("${jiraProjectKey}-"))
            || (has(request.resource.attr.epicKey) && request.resource.attr.epicKey
            != "" && !request.resource.attr.epicKey.startsWith("${jiraProjectKey}-"))
      output:
        when:
          ruleActivated: >-
            "This agent may only act on the ${jiraProjectKey} Jira project. The"
            + " targeted project/issue/epic is outside that scope."
    - name: allow-all
      actions: ['*']
      effect: EFFECT_ALLOW
      roles: ['*']
