---
# notion_page policy: allow-all except (a) a hard deny on destructive update-page
# commands, and (b) a hard deny on create-pages calls whose parent isn't the
# Scratchpad folder.
#
# create-pages: mapping.yaml used to `force`-rewrite every call's `parent` to
# the Scratchpad page id, so a wrong/omitted parent silently landed under
# Scratchpad anyway instead of erroring. That taught a calling agent nothing —
# it never saw feedback that its intended parent was ignored, so it kept
# guessing wrong on future calls. This denies instead, with a message naming
# the correct page_id, so the agent corrects itself going forward.
# parentKind/parentPageId come from notionCreateAttr (helpers_notion.go);
# parentKind is "" when parent was omitted (creates a private workspace-level
# page, also not under Scratchpad) or set to database_id/data_source_id
# (never Scratchpad, which is a plain page).
#
# update-page/create-comment: TWO complementary gates apply (extended
# to create-comment and multi-parent scoping). The shim runs a live ancestry
# lookup BEFORE this policy is consulted (it calls notion-fetch back through
# vMCP -- Cerbos itself has no I/O and can't resolve a page's parent) and
# denies any write to a page not under ANY of the allowed parent folders
# (NOTION_ALLOWED_PARENT_PAGE_IDS env var on the shim Deployment: Scratchpad
# always implicit, plus ${notionAllowedParentPageIds} -- a per-machine list of
# additional team folders, e.g. DEVOPS/DevSecOps but not Finance -- see
# deployment.yaml/main.go/cluster-vars.yaml). notion-create-pages is NOT part
# of this multi-parent list -- it stays pinned to Scratchpad-only via this
# policy's own create rule below (${notionScratchpadPageId}), a narrower,
# separate check. This Cerbos policy is the second gate for update-page: for
# pages that DO pass the ancestry check, it still blocks the destructive
# commands -- `command == replace_content` (overwrites the entire page body)
# or `allow_deleting_content: true` (lets replace_content delete child
# pages/databases outright). update_properties, update_content (targeted
# search-and-replace), insert_content, apply_template, and update_verification
# remain allowed -- the tool's own docs already steer toward preferring
# update_content/insert_content over replace_content, this just makes that
# guidance load-bearing. create-comment has no destructive-command surface, so
# the ancestry gate is its only check; it always reaches this policy's
# allow-all rule once past that gate.
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: notion_page
  rules:
    - name: deny-destructive-update
      actions: [update]
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            request.resource.attr.command == "replace_content" ||
            request.resource.attr.allowDeletingContent == "true"
      output:
        when:
          ruleActivated: >-
            "This agent may not replace_content or allow_deleting_content on an existing"
            + " Notion page. Use update_content (targeted search-and-replace) or"
            + " insert_content instead."
    - name: deny-create-outside-scratchpad
      actions: [create]
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            request.resource.attr.parentKind != "page_id" ||
            request.resource.attr.parentPageId != "${notionScratchpadPageId}"
      output:
        when:
          ruleActivated: >-
            "New Notion pages may only be created with parent.page_id set to the"
            + " Scratchpad folder (page_id ${notionScratchpadPageId}). Pass that id"
            + " as parent.page_id, or omit new pages from this call and use"
            + " update-page on an existing page under Scratchpad instead."
    - name: allow-all
      actions: ['*']
      effect: EFFECT_ALLOW
      roles: ['*']
