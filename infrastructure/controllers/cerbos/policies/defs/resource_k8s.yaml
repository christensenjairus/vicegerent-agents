---
# Resource policy for k8s MCP tool calls proxied through agentgateway.
# The ExtMCP shim (follow-up) maps each MCP tool call to a CheckResources
# request: principal = calling agent (role "agent"), resource = the k8s object
# the tool targets (kind/apiResource/namespace), action = the MCP tool name.
# DENY overrides ALLOW in Cerbos, so the Secret rule is a hard block even for
# read tools that are otherwise allowed against non-secret kinds. This closes
# the gap the agentgateway tool-name allowlist cannot: getResource/listResources
# are legitimately allowed, but the k8s-mcp-server returns Secrets through those
# same tools, so the block must key on the resource kind, not the tool name.
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: k8s_resource
  rules:
    - name: deny-secrets
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            request.resource.attr.kind == "Secret" ||
            request.resource.attr.apiResource == "secrets"
    - name: allow-readonly
      actions:
        - getResource
        - listResources
        - describeResource
        - getPodsLogs
        - getEvents
        - getNodeMetrics
        - getPodMetrics
      effect: EFFECT_ALLOW
      roles: [agent]
