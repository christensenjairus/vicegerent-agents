---
# k8s_resource policy: deny Secrets (deny-secrets) and unresolvable kind (deny-no-kind); allow everything else.
# Do NOT add tools/kinds here to permit them; that belongs in the gateway allowlist.
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: k8s_resource
  rules:
    - name: deny-secrets
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            request.resource.attr.kind == "Secret" ||
            request.resource.attr.apiResource == "secrets"
    - name: deny-no-kind
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            request.resource.attr.kind == "" &&
            request.resource.attr.apiResource == ""
    - name: allow-all
      actions: ['*']
      effect: EFFECT_ALLOW
      roles: ['*']
