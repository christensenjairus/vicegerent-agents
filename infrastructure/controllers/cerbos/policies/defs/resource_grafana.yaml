---
# grafana_datasource policy: deny reads targeting any denied datasource
# (${grafanaDeniedDatasourceUids}/${grafanaDeniedDatasourceNames}, from
# clusters/personal/cluster-vars.yaml — matched by uid or name, CEL-list-ready
# same as githubAllowedRepos/linearAllowedTeams); allow everything else. The
# shim maps every datasource-bearing Grafana tool to this resource, carrying
# uid+name attrs. Do NOT add tools/kinds here to permit them; that belongs in
# the gateway allowlist.
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: grafana_datasource
  rules:
    - name: deny-blocked-datasource
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            (has(request.resource.attr.uid) && request.resource.attr.uid in [${grafanaDeniedDatasourceUids}])
            ||
            (has(request.resource.attr.name) && request.resource.attr.name in [${grafanaDeniedDatasourceNames}])
      output:
        when:
          ruleActivated: >-
            "This agent is not allowed to query this Grafana datasource. Choose a"
            + " different datasource."
    - name: allow-all
      actions: ['*']
      effect: EFFECT_ALLOW
      roles: ['*']
