---
name: gitlab_protected_branch_block_test
description: GitLab calls that write directly to a protected branch are denied; calls
  confined to a non-protected branch are allowed.
options:
  now: '2026-07-02T00:00:00Z'
principals:
  hermes:
    id: hermes
    roles: [agent]
resources:
  push_to_main:
    id: '42'
    kind: gitlab_repo
    attr: {branch: main}
  create_or_update_file_on_master:
    id: '42'
    kind: gitlab_repo
    attr: {branch: master}
  create_branch_named_production:
    id: '42'
    kind: gitlab_repo
    attr: {branch: production}
  push_to_feature_branch:
    id: '42'
    kind: gitlab_repo
    attr: {branch: feature-x}
  no_branch_arg:
    id: '42'
    kind: gitlab_repo
    attr: {branch: ''}
tests:
  - name: writes targeting a protected branch are denied
    input:
      principals: [hermes]
      resources:
        - push_to_main
        - create_or_update_file_on_master
        - create_branch_named_production
      actions: [access]
    expected:
      - principal: hermes
        resource: push_to_main
        actions: {access: EFFECT_DENY}
      - principal: hermes
        resource: create_or_update_file_on_master
        actions: {access: EFFECT_DENY}
      - principal: hermes
        resource: create_branch_named_production
        actions: {access: EFFECT_DENY}
  - name: a non-protected branch, and a call with no branch arg, are allowed
    input:
      principals: [hermes]
      resources: [push_to_feature_branch, no_branch_arg]
      actions: [access]
    expected:
      - principal: hermes
        resource: push_to_feature_branch
        actions: {access: EFFECT_ALLOW}
      - principal: hermes
        resource: no_branch_arg
        actions: {access: EFFECT_ALLOW}
