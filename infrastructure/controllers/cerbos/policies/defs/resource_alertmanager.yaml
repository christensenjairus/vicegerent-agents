---
# alertmanager_silence policy: deny createSilence calls whose duration exceeds
# this machine's cap (${alertmanagerMaxSilenceSeconds}, from
# clusters/*/cluster-vars.yaml -- work is capped at 24h, personal at 14d). The
# shim's alertmanagerAttr helper (helpers_alertmanager.go) converts
# createSilence's free-form `duration` string ("30m","2h","1d") into
# durationSeconds, defaulting an omitted duration to Alertmanager's own
# documented 2h rather than bypassing the cap.
#
# deleteSilence (and every other Alertmanager tool -- getAlerts, getSilences,
# etc.) is unmapped and passes. deleteSilence used to be denied outright
# because ownership of a silence can't be verified from the call args (it
# carries only a silenceId, a UUID, and this shim never calls back to
# Alertmanager to look up a silence's actual creator). That blanket deny was
# removed: an unconditional deny doesn't provide real ownership protection --
# it blocks legitimate self-cleanup exactly as much as it would block
# deleting someone else's silence, since there's no signal here (or in
# Alertmanager's own API) to distinguish the two cases. A policy with no
# discriminating signal isn't worth the added surface; deleteSilence now
# behaves like any other unmapped call.
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: alertmanager_silence
  rules:
    - name: deny-silence-too-long
      actions: [create]
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            has(request.resource.attr.durationSeconds) &&
            int(request.resource.attr.durationSeconds) > ${alertmanagerMaxSilenceSeconds}
      output:
        when:
          ruleActivated: >-
            "Silence duration exceeds this agent's cap of ${alertmanagerMaxSilenceSeconds}
            seconds."
            + " Create a shorter silence, or ask a human to extend it."
    - name: allow-all
      actions: ['*']
      effect: EFFECT_ALLOW
      roles: ['*']
