---
# Fixtures use the literal project matching cluster-vars.yaml's jiraAllowedProjects --
# validate.sh compiles the substituted policy against them, so keep the two in sync.
name: jira_write_project_allowlist_test
description: Jira reads are allowed against any project; Jira writes targeting a project
  other than the allowed list (by project_key, issue/inward/outward/epic key prefix,
  or an epicKey/parent smuggled inside additional_fields/fields JSON) are denied,
  while writes confined to an allowed project are allowed.
options:
  now: '2026-07-02T00:00:00Z'
principals:
  hermes:
    id: hermes
    roles: [agent]
resources:
  create_in_change:
    id: CHANGE
    kind: jira_project
    attr:
      projectKey: CHANGE
      issueKey: ''
      inwardKey: ''
      outwardKey: ''
      epicKey: ''
      extraEpicKey: ''
      extraParentKey: ''
      assignee: jchristensen@moveworks.ai
  create_in_other:
    id: FOO
    kind: jira_project
    attr:
      projectKey: FOO
      issueKey: ''
      inwardKey: ''
      outwardKey: ''
      epicKey: ''
      extraEpicKey: ''
      extraParentKey: ''
  get_change_issue:
    id: CHANGE-123
    kind: jira_project
    attr:
      projectKey: ''
      issueKey: CHANGE-123
      inwardKey: ''
      outwardKey: ''
      epicKey: ''
      extraEpicKey: ''
      extraParentKey: ''
  get_other_issue:
    id: FOO-9
    kind: jira_project
    attr:
      projectKey: ''
      issueKey: FOO-9
      inwardKey: ''
      outwardKey: ''
      epicKey: ''
      extraEpicKey: ''
      extraParentKey: ''
  link_mixed_projects:
    id: CHANGE-1
    kind: jira_project
    attr:
      projectKey: ''
      issueKey: ''
      inwardKey: CHANGE-1
      outwardKey: FOO-2
      epicKey: ''
      extraEpicKey: ''
      extraParentKey: ''
  link_to_change_epic:
    id: CHANGE-1
    kind: jira_project
    attr:
      projectKey: ''
      issueKey: CHANGE-1
      inwardKey: ''
      outwardKey: ''
      epicKey: CHANGE-9
      extraEpicKey: ''
      extraParentKey: ''
  link_to_other_epic:
    id: CHANGE-1
    kind: jira_project
    attr:
      projectKey: ''
      issueKey: CHANGE-1
      inwardKey: ''
      outwardKey: ''
      epicKey: FOO-9
      extraEpicKey: ''
      extraParentKey: ''
  no_keys:
    id: '*'
    kind: jira_project
    attr:
      projectKey: ''
      issueKey: ''
      inwardKey: ''
      outwardKey: ''
      epicKey: ''
      extraEpicKey: ''
      extraParentKey: ''
  create_change_but_smuggled_epic:
    id: CHANGE
    kind: jira_project
    attr:
      projectKey: CHANGE
      issueKey: ''
      inwardKey: ''
      outwardKey: ''
      epicKey: ''
      extraEpicKey: FOO-9
      extraParentKey: ''
  create_change_but_smuggled_parent:
    id: CHANGE
    kind: jira_project
    attr:
      projectKey: CHANGE
      issueKey: ''
      inwardKey: ''
      outwardKey: ''
      epicKey: ''
      extraEpicKey: ''
      extraParentKey: FOO-2
  create_change_with_allowed_smuggled_epic:
    id: CHANGE
    kind: jira_project
    attr:
      projectKey: CHANGE
      issueKey: ''
      inwardKey: ''
      outwardKey: ''
      epicKey: ''
      extraEpicKey: CHANGE-9
      extraParentKey: ''
      assignee: jchristensen@moveworks.ai
  create_with_disallowed_assignee:
    id: CHANGE
    kind: jira_project
    attr:
      projectKey: CHANGE
      issueKey: ''
      inwardKey: ''
      outwardKey: ''
      epicKey: ''
      extraEpicKey: ''
      extraParentKey: ''
      assignee: someone@example.com
  create_with_allowed_assignee:
    id: CHANGE
    kind: jira_project
    attr:
      projectKey: CHANGE
      issueKey: ''
      inwardKey: ''
      outwardKey: ''
      epicKey: ''
      extraEpicKey: ''
      extraParentKey: ''
      assignee: jchristensen@moveworks.ai
  create_with_no_assignee:
    id: CHANGE
    kind: jira_project
    attr:
      projectKey: CHANGE
      issueKey: ''
      inwardKey: ''
      outwardKey: ''
      epicKey: ''
      extraEpicKey: ''
      extraParentKey: ''
      assignee: ''
  update_with_no_assignee:
    id: CHANGE-1
    kind: jira_project
    attr:
      projectKey: ''
      issueKey: CHANGE-1
      inwardKey: ''
      outwardKey: ''
      epicKey: ''
      extraEpicKey: ''
      extraParentKey: ''
      assignee: ''
tests:
  - name: reads against any project are always allowed, regardless of allowlist
    input:
      principals: [hermes]
      resources:
        - create_in_change
        - create_in_other
        - get_change_issue
        - get_other_issue
        - link_mixed_projects
        - link_to_other_epic
        - no_keys
      actions: [read]
    expected:
      - principal: hermes
        resource: create_in_change
        actions: {read: EFFECT_ALLOW}
      - principal: hermes
        resource: create_in_other
        actions: {read: EFFECT_ALLOW}
      - principal: hermes
        resource: get_change_issue
        actions: {read: EFFECT_ALLOW}
      - principal: hermes
        resource: get_other_issue
        actions: {read: EFFECT_ALLOW}
      - principal: hermes
        resource: link_mixed_projects
        actions: {read: EFFECT_ALLOW}
      - principal: hermes
        resource: link_to_other_epic
        actions: {read: EFFECT_ALLOW}
      - principal: hermes
        resource: no_keys
        actions: {read: EFFECT_ALLOW}
  - name: writes confined to an allowed project are allowed
    input:
      principals: [hermes]
      resources:
        - create_in_change
        - get_change_issue
        - link_to_change_epic
        - no_keys
        - create_change_with_allowed_smuggled_epic
      actions: [write]
    expected:
      - principal: hermes
        resource: create_in_change
        actions: {write: EFFECT_ALLOW}
      - principal: hermes
        resource: get_change_issue
        actions: {write: EFFECT_ALLOW}
      - principal: hermes
        resource: link_to_change_epic
        actions: {write: EFFECT_ALLOW}
      - principal: hermes
        resource: no_keys
        actions: {write: EFFECT_ALLOW}
      - principal: hermes
        resource: create_change_with_allowed_smuggled_epic
        actions: {write: EFFECT_ALLOW}
  - name: writes targeting another project are denied
    input:
      principals: [hermes]
      resources:
        - create_in_other
        - get_other_issue
        - link_mixed_projects
        - link_to_other_epic
        - create_change_but_smuggled_epic
        - create_change_but_smuggled_parent
      actions: [write]
    expected:
      - principal: hermes
        resource: create_in_other
        actions: {write: EFFECT_DENY}
      - principal: hermes
        resource: get_other_issue
        actions: {write: EFFECT_DENY}
      - principal: hermes
        resource: link_mixed_projects
        actions: {write: EFFECT_DENY}
      - principal: hermes
        resource: link_to_other_epic
        actions: {write: EFFECT_DENY}
      - principal: hermes
        resource: create_change_but_smuggled_epic
        actions: {write: EFFECT_DENY}
      - principal: hermes
        resource: create_change_but_smuggled_parent
        actions: {write: EFFECT_DENY}
  - name: assignee scoping (jiraAllowedAssignees is jchristensen@moveworks.ai on this
      cluster, matching validate.sh's work cluster-vars.yaml) denies any other assignee,
      allows the configured one, requires an assignee on create (force-self-assignee),
      but doesn't require one on an ordinary update that doesn't touch assignee
    input:
      principals: [hermes]
      resources:
        - create_with_disallowed_assignee
        - create_with_allowed_assignee
        - create_with_no_assignee
        - update_with_no_assignee
      actions: [write]
    expected:
      - principal: hermes
        resource: create_with_disallowed_assignee
        actions: {write: EFFECT_DENY}
      - principal: hermes
        resource: create_with_allowed_assignee
        actions: {write: EFFECT_ALLOW}
      - principal: hermes
        resource: create_with_no_assignee
        actions: {write: EFFECT_DENY}
      - principal: hermes
        resource: update_with_no_assignee
        actions: {write: EFFECT_ALLOW}
