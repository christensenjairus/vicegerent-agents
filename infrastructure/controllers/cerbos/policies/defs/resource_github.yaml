---
# github_repo policy: deny any GitHub call whose owner/repo isn't in the allowed
# list (${githubAllowedRepos}, from clusters/personal/cluster-vars.yaml), or
# whose branch arg names a protected branch (main/master/production), or any
# create/update_pull_request call that sets reviewers (see below); allow
# everything else. The shim maps every repo-bearing GitHub tool to this
# resource, carrying owner+repo (always populated) and branch (populated only
# for push_files/create_or_update_file/create_branch — the tools that write or
# name a branch directly; everything else, including create_pull_request's
# base/head, resolves to ''). Opening a PR against main is not blocked here —
# that's normal and doesn't write to the branch. Do NOT add tools here to
# permit them; that belongs in the vMCP tools allowlist.
#
# pull_request_review_write (review submissions/approvals, inline pending-
# review comments via add_comment_to_pending_review, and the resolve_thread/
# unresolve_thread methods that structurally bypassed the owner/repo
# allowlist below) is no longer in the tool surface at all — the operator
# does not want the bot leaving ANY comment/review text on a PR, so the whole
# capability was removed at the source (toolhive-servers.json / mapping.yaml)
# rather than partially enforced here. The deny-approve and
# deny-resolve-thread rules that used to key off that tool's event/method
# attrs are gone with it — they can never fire against a tool that doesn't
# exist, so keeping them as "defense in depth" would just be dead code.
#
# create_pull_request/update_pull_request's reviewers arg (GitHub
# usernames or ORG/team-slug reviewers to request) is the actual PR analog
# of an "assignee" — a PR has no separate assignees concept at all
# (assignees only exists on issue_write, which isn't in this tool allowlist
# to begin with, since this operator uses GitHub for PRs only). Rather than
# build an allowlist for a capability the operator explicitly isn't sure
# should exist, this denies any call that sets reviewers outright.
#
# deny-pr-not-from-fork: create_pull_request into ${githubForkRequiredOwners}
# must set head as "<owner>:branch" with owner in ${githubForkOwners}. Bare
# head or wrong owner is denied. update_pull_request has no head arg (source
# branch can't change post-creation), so it's not covered. "*" in either var
# disables the check.
#
# deny-pr-title-missing-ticket-ref / deny-pr-body-missing-change-link: PRs
# against moveworks-emu/k8s-manifests specifically must carry a ticket
# reference in the title ("[<LINEAR-KEY>] rest of title") and a change-ticket
# link in the body. Hardcoded to this one owner/repo rather than driven by a
# cluster-var, since the operator only wants this on the one repo that
# actually has a change-ticket process, not every allowed repo on every
# machine. create_pull_request's title is a required arg (mapping.yaml), so
# a create call always has a populated title to check; body is optional on
# both tools, so the body rule only fires on create (isPrCreate) -- an
# update that doesn't touch body isn't reassigning the description away from
# a link it may already carry.
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: github_repo
  rules:
    - name: deny-non-allowed-repo
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            !(request.resource.attr.owner + "/" + request.resource.attr.repo in
            [${githubAllowedRepos}])
      output:
        when:
          ruleActivated: >-
            "GitHub repo " + request.resource.attr.owner + "/" + request.resource.attr.repo
            + " is outside the allowed repo list for this agent."
    - name: deny-protected-branch
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            has(request.resource.attr.branch) && request.resource.attr.branch != ""
            && request.resource.attr.branch in ["main", "master", "production"]
      output:
        when:
          ruleActivated: >-
            "Direct writes to protected branch '" + request.resource.attr.branch
            + "' are not allowed. Use a feature branch and open a pull/merge request."
    - name: deny-reviewers
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            has(request.resource.attr.hasReviewers) && request.resource.attr.hasReviewers
            == "true"
      output:
        when:
          ruleActivated: >-
            "This agent is not allowed to set reviewers on a pull request. Request"
            + " reviews manually instead."
    - name: deny-pr-not-from-fork
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            !("*" in [${githubForkOwners}])
            && has(request.resource.attr.owner) && request.resource.attr.owner
            in [${githubForkRequiredOwners}]
            && has(request.resource.attr.head) && request.resource.attr.head
            != ""
            && !(request.resource.attr.head.contains(":")
            && request.resource.attr.head.split(":")[0] in [${githubForkOwners}])
      output:
        when:
          ruleActivated: >-
            "PRs into " + request.resource.attr.owner + "/" + request.resource.attr.repo
            + " must come from your personal fork (head must be"
            + " '<fork-owner>:branch' with <fork-owner> matching an allowed"
            + " fork-owner pattern), not a same-repo branch."
    - name: deny-pr-title-missing-ticket-ref
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            request.resource.attr.owner == "moveworks-emu"
            && request.resource.attr.repo == "k8s-manifests"
            && has(request.resource.attr.title) && request.resource.attr.title
            != ""
            && !request.resource.attr.title.matches("^\\[[A-Za-z0-9]+-[0-9]+\\] .+")
      output:
        when:
          ruleActivated: >-
            "PR titles against moveworks-emu/k8s-manifests must start with a"
            + " ticket reference, e.g. '[TEAM-1234] My PR Title'."
    - name: deny-pr-body-missing-change-link
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            request.resource.attr.owner == "moveworks-emu"
            && request.resource.attr.repo == "k8s-manifests"
            && (
            (has(request.resource.attr.isPrCreate) && request.resource.attr.isPrCreate
            == "true"
            && (!has(request.resource.attr.body) || request.resource.attr.body
            == "" || !request.resource.attr.body.matches(
            "https://bannertech\\.atlassian\\.net/browse/CHANGE-[0-9]+")))
            ||
            (has(request.resource.attr.isPrCreate) && request.resource.attr.isPrCreate
            == "false"
            && has(request.resource.attr.body) && request.resource.attr.body
            != "" && !request.resource.attr.body.matches(
            "https://bannertech\\.atlassian\\.net/browse/CHANGE-[0-9]+"))
            )
      output:
        when:
          ruleActivated: >-
            "PR descriptions against moveworks-emu/k8s-manifests must include a"
            + " change-ticket link, e.g."
            + " https://bannertech.atlassian.net/browse/CHANGE-1234."
    - name: allow-all
      actions: ['*']
      effect: EFFECT_ALLOW
      roles: ['*']
