---
# github_repo policy: deny any GitHub call whose owner/repo isn't in the allowed
# list (${githubAllowedRepos}, from clusters/personal/cluster-vars.yaml), or
# whose branch arg names a protected branch (main/master/production), or a
# pull_request_review_write call whose event is APPROVE (HAH-65 — the bot must
# never approve its own or anyone's PR; comment/request-changes/resolve-thread
# are unaffected); allow everything else. The shim maps every repo-bearing
# GitHub tool to this resource, carrying owner+repo (always populated) and
# branch (populated only for push_files/create_or_update_file/create_branch —
# the tools that write or name a branch directly; everything else, including
# create_pull_request's base/head, resolves to ''). pull_request_review_write
# additionally carries event (populated only for method=create|submit_pending;
# resolve_thread/unresolve_thread carry no owner/repo/event and stay unmapped
# by this deny — see mapping.yaml). Opening a PR against main is not blocked
# here — that's normal and doesn't write to the branch. Do NOT add tools here
# to permit them; that belongs in the vMCP tools allowlist.
apiVersion: api.cerbos.dev/v1
resourcePolicy:
  version: default
  resource: github_repo
  rules:
    - name: deny-non-allowed-repo
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            !(request.resource.attr.owner + "/" + request.resource.attr.repo in
            [${githubAllowedRepos}])
      output:
        when:
          ruleActivated: >-
            "GitHub repo " + request.resource.attr.owner + "/" + request.resource.attr.repo
            + " is outside the allowed repo list for this agent."
    - name: deny-protected-branch
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            has(request.resource.attr.branch) && request.resource.attr.branch != ""
            && request.resource.attr.branch in ["main", "master", "production"]
      output:
        when:
          ruleActivated: >-
            "Direct writes to protected branch '" + request.resource.attr.branch
            + "' are not allowed. Use a feature branch and open a pull/merge request."
    - name: deny-self-approve
      actions: ['*']
      effect: EFFECT_DENY
      roles: ['*']
      condition:
        match:
          expr: >-
            has(request.resource.attr.event) && request.resource.attr.event == "APPROVE"
      output:
        when:
          ruleActivated: >-
            "This agent is not allowed to approve pull requests (event=APPROVE). Use"
            + " event=COMMENT or REQUEST_CHANGES instead, or ask a human to approve."
    - name: allow-all
      actions: ['*']
      effect: EFFECT_ALLOW
      roles: ['*']
