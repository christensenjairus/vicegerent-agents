---
# mcp-cerbos-shim mapping. See mapping.example.yaml + shim README for full docs.
# Only resource-bearing tools are mapped (k8s kind, a Grafana datasource id, a
# Jira project/issue key, a GitHub owner/repo[/branch], a Linear teamId, an
# Alertmanager silence duration, or a PagerDuty manage_incidents change);
# unmapped tools pass (defaultAction: allow). Cerbos denies Secret reads,
# OpenSearch-datasource reads, Jira WRITES targeting a project outside
# ${jiraAllowedProjects} (reads are unrestricted), GitHub calls targeting a repo outside the allowlist or writing
# directly to a protected branch, Linear calls targeting a team other than
# DEVOPS, Alertmanager silences over the duration cap, out-of-scope
# PagerDuty incident changes, Notion create-pages calls whose parent isn't
# the Scratchpad folder, and Tavily/Firecrawl crawl+map calls targeting an
# internal-only host or exceeding the limit/depth/breadth caps. GitLab has no mapped tools or Cerbos resource at all
# (see the GitLab tools comment below). A `force` block instead
# allows-with-rewritten-args — that's a mutation, not a deny (see server.go):
# GitHub PR create/update force draft: true. Adding a tool here to permit it
# is wrong; that belongs in the gateway allowlist.
backends:
  vmcp:
    defaultAction: allow
    helpers:
      - canonicalK8s
      - linearIssueAttr
      - linearProjectAttr
      - linearLabelAttr
      - alertmanagerAttr
      - pagerdutyManageAttr
      - notionAttr
      - notionCreateAttr
      - jiraFieldsAttr
      - githubReviewersAttr
      - webCrawlAttr
      - webFetchAttr
      - webMonitorAttr
    tools:
      kubernetes_resources_get:
        resourceType: k8s_resource
        action: getResource
        id: get(args,'name','')
        attrFrom: canonicalK8s(args)
      kubernetes_resources_list:
        resourceType: k8s_resource
        action: listResources
        id: "''"
        attrFrom: canonicalK8s(args)
      # GitLab has no mapped tools at all: push_files/create_or_update_file/
      # create_branch (its only branch-writing tools, and the only source of
      # a 'branch' arg) were removed from the tool allowlist entirely
      # (toolhive-servers.json) — the bot has direct SSH access to
      # gitlab.hahomelabs.com, so routine git operations go through git
      # itself now, not a GitLab-API tool. The gitlab_repo Cerbos resource
      # and its protected-branch policy were removed for the same reason
      # (nothing populates them anymore). Everything else GitLab-side (issue
      # read+write, MR object/comments/discussions/notes/labels/todos/
      # pipelines) is left unmapped and passes; this operator isn't picky
      # about GitLab (it's their own instance).
      # Grafana datasource-bearing tools -> grafana_datasource; Cerbos denies
      # OpenSearch datasources by uid/name. Same body for every tool: capture the
      # datasource id from whichever arg the tool uses (datasourceUid | uid | name).
      # get_datasource_by_uid/get_datasource_by_name and check_datasources_health
      # are deliberately NOT mapped here: the first two don't exist on the live
      # server (get_datasource is the only real one), and check_datasources_health
      # takes a plural `uids` array this single-resource-per-call model can't check
      # (and it only reveals up/down status, not the datasource's actual data, so
      # it's outside what this guardrail is for anyway).
      grafana_get_datasource: &grafana_ds
        resourceType: grafana_datasource
        action: read
        id: get(args,'datasourceUid', get(args,'uid', get(args,'name','')))
        attr:
          uid: get(args,'datasourceUid', get(args,'uid',''))
          name: get(args,'name','')
      grafana_query_prometheus: *grafana_ds
      grafana_query_prometheus_histogram: *grafana_ds
      grafana_list_prometheus_metric_metadata: *grafana_ds
      grafana_list_prometheus_metric_names: *grafana_ds
      grafana_list_prometheus_label_names: *grafana_ds
      grafana_list_prometheus_label_values: *grafana_ds
      # grafana_gov backend (toolhive-servers.json): same tools, same guardrail --
      # the OpenSearch-datasource block doesn't depend on which Grafana instance
      # the call is aimed at, so it reuses the *grafana_ds body verbatim.
      grafana_gov_get_datasource: *grafana_ds
      grafana_gov_query_prometheus: *grafana_ds
      grafana_gov_query_prometheus_histogram: *grafana_ds
      grafana_gov_list_prometheus_metric_metadata: *grafana_ds
      grafana_gov_list_prometheus_metric_names: *grafana_ds
      grafana_gov_list_prometheus_label_names: *grafana_ds
      grafana_gov_list_prometheus_label_values: *grafana_ds
      # Jira project/issue-bearing tools -> jira_project, mirroring Notion's
      # read-everywhere/write-scoped model: reads (get_issue/get_project_issues/
      # get_transitions) are allowed against ANY project, since there's nothing
      # dangerous about looking at a ticket outside the allowlist; only writes
      # (create/update/transition/comment/link) are denied when they touch a
      # project outside ${jiraAllowedProjects} (was a single jiraProjectKey;
      # widened to a CEL-list-ready allowlist matching the linearAllowedTeams/
      # githubAllowedRepos pattern). Tool names are double-prefixed
      # ({workload}_{tool} = jira_ + jira_*). Same body for every tool: capture
      # whichever project/issue-key args it carries (absent args resolve to "").
      # jira_jira_search is intentionally unmapped — JIRA_PROJECTS_FILTER confines
      # search server-side, and its free-form jql can't be checked here.
      jira_jira_get_issue: &jira_proj_read
        resourceType: jira_project
        action: read
        id: get(args,'project_key', get(args,'issue_key',''))
        attr:
          projectKey: get(args,'project_key','')
          issueKey: get(args,'issue_key','')
          inwardKey: get(args,'inward_issue_key','')
          outwardKey: get(args,'outward_issue_key','')
          epicKey: get(args,'epic_key','')
      jira_jira_get_project_issues: *jira_proj_read
      jira_jira_get_transitions: *jira_proj_read
      # jira_create_issue/jira_update_issue's additional_fields (and update's
      # required fields) are raw JSON strings that can smuggle an
      # {"epicKey"/"epic_link"/"parent": "OTHER-123"} reference to a
      # different project, bypassing the plain top-level epic_key/issue_key
      # check entirely -- the jiraFieldsAttr helper parses those JSON args with a real JSON
      # decode (not fragile CEL string matching) and surfaces any embedded
      # epicKey/parent reference as extraEpicKey/extraParentKey, which
      # resource_jira.yaml's write rule now also checks. The same helper
      # also surfaces issue_type/issuetype (top-level on create; only via
      # fields/additional_fields JSON on update, which has no
      # top-level issue_type arg at all) as issueType, checked against
      # ${jiraAllowedIssueTypes}. Other write tools (transition/comment/link)
      # don't carry additional_fields/fields at all, so attrFrom is harmless
      # there too -- it always resolves every extra key to "".
      jira_jira_create_issue: &jira_proj_write
        resourceType: jira_project
        action: write
        id: get(args,'project_key', get(args,'issue_key',''))
        attrFrom: jiraFieldsAttr(args)
        attr:
          projectKey: get(args,'project_key','')
          issueKey: get(args,'issue_key','')
          inwardKey: get(args,'inward_issue_key','')
          outwardKey: get(args,'outward_issue_key','')
          epicKey: get(args,'epic_key','')
      jira_jira_update_issue: *jira_proj_write
      jira_jira_transition_issue: *jira_proj_write
      jira_jira_add_comment: *jira_proj_write
      jira_jira_create_issue_link: *jira_proj_write
      jira_jira_link_to_epic: *jira_proj_write
      # GitHub repo-bearing tools -> github_repo; Cerbos denies any call whose
      # owner/repo isn't in the allowlist, or whose branch arg (only carried
      # by tools that name a branch directly — everything else resolves to
      # '') names a protected branch. github_get_me is intentionally unmapped
      # — it identifies the caller, not a repo.
      #
      # This tool set is deliberately PR-only, with no issue tools and no
      # generic git file/branch-write tools at all (removed entirely from
      # toolhive-servers.json's allowlist, not just unmapped here):
      #   - No issue tools (issue_read/issue_write/add_issue_comment/
      #     list_issues/list_issue_types/search_issues/sub_issue_write/
      #     assign_copilot_to_issue/get_label): this operator doesn't use
      #     GitHub issues at work, only PRs.
      #   - No create_branch/create_or_update_file/push_files: the bot has
      #     direct SSH access to github.com (charts/agent/templates/
      #     networkpolicy.yaml allows port 22 to github.com unconditionally),
      #     so routine git operations should go through git itself, not a
      #     GitHub-API tool — one fewer way for the bot to get confused about
      #     which mechanism to use for ordinary branch/file/commit work.
      #   - No add_reply_to_pull_request_comment: this tool carries no
      #     author/ownership info the shim could use to tell "reply to a
      #     human's comment" from "reply to the bot's own" — the honest
      #     fallback (same pattern as Alertmanager's deleteSilence) is to
      #     remove the whole surface rather than partially enforce it.
      #   - No pull_request_review_write/add_comment_to_pending_review: the
      #     operator does not want the bot leaving ANY comment/review text on
      #     a PR at all, not just replies -- inline pending-review comments
      #     and review submissions carrying free-text bodies (COMMENT/
      #     REQUEST_CHANGES; APPROVE was already Cerbos-denied, but that only
      #     blocked approval, not the comment text itself) are both removed
      #     from the tool allowlist entirely (toolhive-servers.json), same
      #     "no discriminating signal, remove the capability" pattern as
      #     add_reply_to_pull_request_comment above. This also removes the
      #     resolve_thread/unresolve_thread threadId-spoofing bypass that
      #     pull_request_review_write carried (see git history / MR
      #     description) — it can't fire if the tool itself doesn't exist.
      github_pull_request_read: &github_repo
        resourceType: github_repo
        action: access
        id: get(args,'owner','') + '/' + get(args,'repo','')
        attr:
          owner: get(args,'owner','')
          repo: get(args,'repo','')
          branch: get(args,'branch','')
      # create/update_pull_request force draft: true regardless of what's sent —
      # every PR the agent opens (or un-drafts via update) stays a draft. This is
      # a mutation (allow-with-rewritten-args), not a deny: see server.go's Force
      # handling. Applied only after the repo/branch checks above already passed.
      # Both tools also carry a 'reviewers' array (GitHub usernames or
      # ORG/team-slug reviewers to request) -- there is no separate
      # "assignee" concept on a PR (assignees only exists on issue_write,
      # which isn't in this allowlist at all), so 'reviewers' is the actual
      # PR analog worth scoping. Rather than build an allowlist for a
      # capability the operator isn't sure should exist at all, this denies
      # any call that sets reviewers outright -- request reviews manually
      # instead.
      github_create_pull_request:
        <<: *github_repo
        force: {draft: true}
        attrFrom: githubReviewersAttr(args)
        attr:
          owner: get(args,'owner','')
          repo: get(args,'repo','')
          branch: get(args,'branch','')
      github_update_pull_request:
        <<: *github_repo
        force: {draft: true}
        attrFrom: githubReviewersAttr(args)
        attr:
          owner: get(args,'owner','')
          repo: get(args,'repo','')
          branch: get(args,'branch','')
      github_list_pull_requests: *github_repo
      github_search_pull_requests: *github_repo
      github_request_copilot_review: *github_repo
      github_update_pull_request_branch: *github_repo
      # Linear save_issue (create+update in one tool) -> linear_team; Cerbos
      # denies any team other than DEVOPS. IMPORTANT: this key must be the
      # live vMCP tool name exactly, or the mapping silently never fires and
      # every call falls through to defaultAction: allow (this happened for
      # months under the previous key, linear_create_issue, which no longer
      # exists — the tool was renamed upstream to linear_save_issue).
      # `team` is required when creating (no `id` arg) and optional when
      # updating an existing issue. A plain `attr: {teamId: get(args,'team',
      # '')}` would put an empty-but-present teamId on every ordinary update
      # (team omitted) and Cerbos's has()-based check would trip on all of
      # them — so attrFrom calls the linearIssueAttr helper instead: it
      # surfaces teamId on every create, and on update only when the call
      # itself sets `team` (a deliberate reassignment). save_project is
      # different: its addTeams/setTeams args are a directly-verifiable team
      # signal, so it's mapped below.
      # save_comment targets an existing comment/thread by issueId
      # (or projectId/initiativeId/documentId/milestoneId, but only issueId
      # is team-resolvable) and carries no team of its own in the call args
      # -- the shim runs a live linear_get_issue lookup BEFORE this policy is
      # consulted (server.go's checkLinearCommentTeam, mirrors the Notion
      # ancestry gate elsewhere in this shim) and injects the resolved team as this same
      # teamId attr so Cerbos's existing deny-non-devops-team rule fires
      # identically to save_issue's. A call with no issueId (project/
      # initiative/document/milestone comment, or a reply via parentId with
      # no entity ref) has nothing to resolve and passes the gate unchecked.
      # An ordinary save_issue UPDATE with no `team` arg used to get
      # no teamId key at all and fall through to allow-all regardless of the
      # issue's REAL team -- e.g. any plain edit to an issue that already
      # belongs to a non-DEVOPS team went through unchecked. server.go now
      # runs the SAME live linear_get_issue lookup save_comment uses (keyed
      # off the call's `id` arg) whenever save_issue's own attrFrom omitted
      # teamId, closing that gap with zero duplication of the allowlist.
      # A create call always sets `team` itself (required) and has no `id`,
      # so it never reaches this lookup; only a real update with an omitted
      # `team` does.
      linear_save_issue:
        resourceType: linear_team
        action: access
        id: get(args,'id', get(args,'team',''))
        attrFrom: linearIssueAttr(args)
      linear_save_comment:
        resourceType: linear_team
        action: access
        id: get(args,'issueId','*')
        attr:
          issueId: get(args,'issueId','')
      # Linear save_project (create+reassign in one tool) -> reuses
      # linear_team; the verifiable signal here is addTeams/setTeams (the
      # array args a project's team membership is set through), not a single
      # team/id like save_issue. linearProjectAttr unions both arrays into one
      # `teams` list attr so Cerbos can deny if any entry isn't DEVOPS.
      # Same gap and same fix as save_issue above -- an ordinary
      # save_project UPDATE that sets neither addTeams nor setTeams used to
      # get no teams key at all and fall through to allow-all regardless of
      # the project's REAL team(s) (a project can belong to more than one
      # team). server.go now runs a live linear_get_project lookup (keyed off
      # the call's `id` arg) whenever save_project's own attrFrom omitted
      # teams, closing that gap. A create call always sets addTeams or
      # setTeams itself (Linear requires at least one team on creation) and
      # has no `id`, so it never reaches this lookup.
      linear_save_project:
        resourceType: linear_team
        action: access
        id: get(args,'id','*')
        attrFrom: linearProjectAttr(args)
      # Linear create_issue_label: a workspace-scoped label needs no
      # check (teamId omitted entirely -- workspace labels aren't team-
      # scoped), but a team-scoped label's `teamId` arg is a directly
      # verifiable signal, same shape as save_comment's issueId attr, no
      # lookup needed since the caller already supplies the team id itself.
      linear_create_issue_label:
        resourceType: linear_team
        action: access
        id: get(args,'teamId','*')
        attrFrom: linearLabelAttr(args)
      # Alertmanager silence-creating tool -> alertmanager_silence; Cerbos denies
      # a duration longer than the per-machine cap (${alertmanagerMaxSilenceSeconds},
      # from clusters/*/cluster-vars.yaml — work caps at 24h, personal at 14d).
      # The `duration` arg is a free-form string ("30m","2h","1d") per the tool's
      # own schema, not a number CEL can compare, so attrFrom calls the
      # alertmanagerAttr helper (helpers_alertmanager.go) to convert it to
      # seconds first. An omitted duration defaults to Alertmanager's own
      # documented default (2h) rather than falling through unchecked.
      # deleteSilence/getSilences/getAlerts/etc. are unmapped and pass:
      # deleteSilence used to be denied outright over unverifiable ownership,
      # but a deny with no discriminating signal blocked legitimate
      # self-cleanup as much as it would have blocked anything else, so it was
      # removed (see resource_alertmanager.yaml for the reasoning).
      alertmanager_createSilence: &alertmanager_create_silence
        resourceType: alertmanager_silence
        action: create
        id: get(args,'alertName','')
        attrFrom: alertmanagerAttr(args)
      # alertmanager_gov backend (toolhive-servers.json): same duration cap,
      # reused verbatim -- the cap doesn't depend on which Alertmanager
      # instance the silence is created on.
      alertmanager_gov_createSilence: *alertmanager_create_silence
      # PagerDuty manage_incidents -> pagerduty_incident; Cerbos denies any
      # status other than acknowledged/resolved, and denies any call that sets
      # urgency/escalation_level/assignement (this MCP tool's actual
      # IncidentManageRequest schema is flat: incident_ids/status/urgency/
      # escalation_level/assignement -- it is NOT PagerDuty's raw REST batch
      # body, which has no bearing on what this specific tool call can carry).
      # The operator only wants ack/resolve via this tool -- no bulk-count cap
      # on incident_ids, since the field allowlist makes batch size irrelevant
      # to the risk. server.go's checkPagerdutyIncidentServices runs
      # BEFORE Cerbos (a live get_incident lookup Cerbos itself can't do) and
      # injects a serviceIds attr resolved from every targeted incident id,
      # which resource_pagerduty.yaml's deny-write-outside-allowed-services
      # rule checks against ${pagerdutyAllowedServiceIds} -- same handoff
      # pattern as the Linear team gates elsewhere in this shim.
      # create_incident/add_responders/start_incident_workflow are removed
      # from the tool allowlist entirely (toolhive-servers.json) rather than
      # mapped, since there's no useful partial scope to enforce on them short
      # of blocking them.
      pagerduty_manage_incidents: &pagerduty_manage
        resourceType: pagerduty_incident
        action: manage
        id: "'manage_incidents'"
        attrFrom: pagerdutyManageAttr(args)
      pagerduty_add_note_to_incident: &pagerduty_add_note
        resourceType: pagerduty_incident
        action: annotate
        id: get(args,'incident_id','')
        attr:
          incidentId: get(args,'incident_id','')
      # pagerduty_gov backend (toolhive-servers.json): same ack/resolve-only
      # and service-allowlist scoping, reused verbatim. server.go's
      # pagerdutyManageIncidentsTools/pagerdutyAddNoteTools maps THIS tool
      # name to pagerduty_gov's own get_incident tool for the live
      # incident->service lookup, not pagerduty's -- an incident only exists
      # in the account it actually belongs to.
      pagerduty_gov_manage_incidents: *pagerduty_manage
      pagerduty_gov_add_note_to_incident: *pagerduty_add_note
      # Notion create-pages -> only allowed with parent.page_id set to the
      # Scratchpad folder; any other parent (a different page, a database/data
      # source, or omitted entirely -- which creates a standalone workspace-level
      # private page per the tool's own docs) is denied by defs/resource_notion.yaml
      # with a directional message pointing the agent at the correct page_id,
      # rather than silently rewriting parent to Scratchpad the way this mapping
      # used to (a `force` override here previously mutated any parent the agent
      # sent into the Scratchpad id on every call, no error). That silently
      # discarded whatever parent the agent actually intended and taught it
      # nothing about where new pages land, so a caller kept guessing on every
      # future create call. Denying with a clear reason is slower per call but
      # self-correcting. create-comment targets an existing page by id and is
      # unmapped (see toolhive-servers.json's notion entry).
      notion_notion-create-pages:
        resourceType: notion_page
        action: create
        id: "'notion-create-pages'"
        attrFrom: notionCreateAttr(args)
      # Notion update-page -> notion_page; unlike create-pages this targets an EXISTING
      # page by id (any page the integration can reach, not just Scratchpad). TWO
      # complementary gates apply: the shim first runs a live ancestry check
      # (it calls notion-fetch back through vMCP to resolve the page's ancestor chain)
      # and denies any page not under NOTION_SCRATCHPAD_PAGE_ID (deployment.yaml env
      # var, same ${notionScratchpadPageId} cluster-var create-pages's Cerbos rule
      # checks) — a check Cerbos can't do (no I/O); then Cerbos denies the destructive
      # commands (replace_content, allow_deleting_content) on the pages that DO pass,
      # allowing the rest (update_properties/update_content/insert_content/
      # apply_template/update_verification) — see defs/resource_notion.yaml.
      # allow_deleting_content is a real JSON boolean on the wire (not a string), so this
      # uses the notionAttr helper rather than a plain get() -- get()/lookupCI only match
      # string-typed values and would silently treat a bool true as absent (same failure
      # mode as Linear's teamId key-rename postmortem: the check looks live but never fires).
      notion_notion-update-page:
        resourceType: notion_page
        action: update
        id: get(args,'page_id','')
        attrFrom: notionAttr(args)
      # Notion create-comment -> notion_page; targets an EXISTING page by id (same
      # multi-parent ancestry gate as update-page above, action "comment" -- see
      # server.go's notionAncestryGatedActions). No destructive-command surface like
      # update-page's replace_content/allow_deleting_content, so Cerbos's own
      # allow-all rule is the only policy outcome here; the shim's ancestry check
      # (which runs before Cerbos) is the real gate for this tool. attr carries
      # pageId only so the resource is inspectable if a future policy needs it.
      notion_notion-create-comment:
        resourceType: notion_page
        action: comment
        id: get(args,'page_id','')
        attr:
          pageId: get(args,'page_id','')
      # Firecrawl interact -> firecrawl_session; this is the only Firecrawl tool that can
      # execute raw code (bash/python/node) in a live browser session -- Cerbos denies any
      # call where `code` is set, forcing prompt-only natural-language interaction. Every
      # other Firecrawl tool has no code-execution surface and stays unmapped.
      firecrawl_firecrawl_interact:
        resourceType: firecrawl_session
        action: interact
        id: get(args,'scrapeId', get(args,'url',''))
        attr:
          code: get(args,'code','')
      # Tavily/Firecrawl crawl+map tools -> web_crawl: these are the
      # only tools in either backend that follow links outward from a caller-
      # supplied url rather than fetching/searching a single caller-supplied
      # target, so they're the ones an SSRF-style internal-target url or an
      # unbounded limit/depth/breadth actually matters for. tavily_search/
      # tavily_research and every other firecrawl_* tool (search/monitor/etc.)
      # fetch exactly what the caller named and don't discover new targets, so
      # they stay unmapped -- same reasoning firecrawl_interact's comment
      # above uses to justify why nothing else in that backend is mapped.
      tavily_tavily_crawl:
        resourceType: web_crawl
        action: crawl
        id: get(args,'url','')
        attrFrom: webCrawlAttr(args)
      tavily_tavily_map:
        resourceType: web_crawl
        action: crawl
        id: get(args,'url','')
        attrFrom: webCrawlAttr(args)
      firecrawl_firecrawl_crawl:
        resourceType: web_crawl
        action: crawl
        id: get(args,'url','')
        attrFrom: webCrawlAttr(args)
      # Single-URL/multi-URL fetch tools -> web_crawl, action fetch: these
      # were left unmapped by the crawl/map mapping above because they don't discover new
      # targets, but the seed url/urls they DO fetch is exactly as caller-
      # controlled and exactly as exposed to the SSRF trust-boundary gap
      # (host.docker.internal, RFC1918/link-local ranges, the cloud metadata
      # IP, cluster-internal names) as crawl/map's starting url. No limit/
      # depth/breadth cap applies here -- these tools have no such args.
      firecrawl_firecrawl_scrape:
        resourceType: web_crawl
        action: fetch
        id: get(args,'url','')
        attrFrom: webFetchAttr(args)
      firecrawl_firecrawl_extract:
        resourceType: web_crawl
        action: fetch
        id: get(args,'urls','')
        attrFrom: webFetchAttr(args)
      firecrawl_firecrawl_agent:
        resourceType: web_crawl
        action: fetch
        id: get(args,'urls','')
        attrFrom: webFetchAttr(args)
      tavily_tavily_extract:
        resourceType: web_crawl
        action: fetch
        id: get(args,'urls','')
        attrFrom: webFetchAttr(args)
      # Firecrawl monitor create/update -> web_crawl, action monitor:
      # these set up a PERSISTENT recurring fetch (per scheduleText/
      # searchWindow), so an internal-only target here is a standing SSRF
      # probe, not a one-shot hit -- worse than crawl/map, and monitor_create's
      # optional webhookUrl means results can be actively pushed back out too.
      # webMonitorAttr checks the top-level page/pages (monitor_create only)
      # and best-effort inspects the opaque, freeform body object both tools
      # carry for nested url/urls/page/pages keys, since monitor_create's own
      # docs describe body as carrying "advanced requests such as crawl
      # targets." monitor_list/get/delete/run/checks/check are read/lifecycle
      # tools with no new target-setting surface, so they stay unmapped.
      firecrawl_firecrawl_monitor_create:
        resourceType: web_crawl
        action: monitor
        id: get(args,'page','')
        attrFrom: webMonitorAttr(args)
      firecrawl_firecrawl_monitor_update:
        resourceType: web_crawl
        action: monitor
        id: get(args,'id','')
        attrFrom: webMonitorAttr(args)
