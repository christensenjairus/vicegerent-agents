---
# mcp-cerbos-shim mapping. See mapping.example.yaml + shim README for full docs.
# Only kind-bearing tools are mapped; unmapped tools pass (defaultAction: allow).
# Adding a tool here to permit it is wrong; that belongs in the gateway allowlist.
backends:
  vmcp:
    defaultAction: allow
    helpers: [canonicalK8s]
    tools:
      kubernetes_resources_get:
        resourceType: k8s_resource
        action: getResource
        id: get(args,'name','')
        attrFrom: canonicalK8s(args)
      kubernetes_resources_list:
        resourceType: k8s_resource
        action: listResources
        id: "''"
        attrFrom: canonicalK8s(args)
