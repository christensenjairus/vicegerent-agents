---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-cerbos-shim
  namespace: cerbos
  labels:
    app.kubernetes.io/name: mcp-cerbos-shim
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-cerbos-shim
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-cerbos-shim
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-cerbos-shim
          image: harbor.hahomelabs.com/vicegerent/mcp-cerbos-shim:v0.23.0
          ports:
            - name: grpc
              containerPort: 4445
          env:
            - name: NOTION_SCRATCHPAD_PAGE_ID
              value: ${notionScratchpadPageId}  # pragma: allowlist secret (Notion page id; HAH-88 update-page ancestry gate)
            - name: NOTION_ALLOWED_PARENT_PAGE_IDS
              value: ${notionScratchpadPageId},${notionAllowedParentPageIds}  # pragma: allowlist secret (Notion page ids; Scratchpad always implicit, plus cluster-vars' team-folder list)
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
          volumeMounts:
            - name: mapping
              mountPath: /etc/mcp-cerbos-shim
              readOnly: true
      volumes:
        - name: mapping
          configMap:
            name: mcp-cerbos-shim-mapping
