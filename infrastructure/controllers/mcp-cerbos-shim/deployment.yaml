---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-cerbos-shim
  namespace: cerbos
  labels:
    app.kubernetes.io/name: mcp-cerbos-shim
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-cerbos-shim
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-cerbos-shim
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: mcp-cerbos-shim
          image: harbor.hahomelabs.com/vicegerent/mcp-cerbos-shim:v0.7.0
          ports:
            - name: grpc
              containerPort: 4445
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
          volumeMounts:
            - name: mapping
              mountPath: /etc/mcp-cerbos-shim
              readOnly: true
      volumes:
        - name: mapping
          configMap:
            name: mcp-cerbos-shim-mapping
