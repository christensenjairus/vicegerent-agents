---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agents-sandbox-controller
  namespace: agent-sandbox-system
spec:
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
    crds: CreateReplace
  upgrade:
    remediation:
      retries: -1
    crds: CreateReplace
    force: true
  interval: 30m
  chart:
    spec:
      chart: ./helm
      version: 0.3.0
      sourceRef:
        kind: GitRepository
        name: agent-sandbox
        namespace: agent-sandbox-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: agentsandbox-values
