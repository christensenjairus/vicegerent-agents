---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agent-sandbox
  namespace: agent-sandbox-system
spec:
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
    crds: CreateReplace
  upgrade:
    remediation:
      retries: -1
    crds: CreateReplace
  interval: 30m
  chart:
    spec:
      chart: ./helm
      sourceRef:
        kind: GitRepository
        name: agent-sandbox
        namespace: agent-sandbox-system
      interval: 12h
      reconcileStrategy: Revision
  valuesFrom:
    - kind: ConfigMap
      name: agent-sandbox-values
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: ServiceAccount
              name: agent-sandbox-controller
            patch: |-
              - op: remove
                path: /metadata/labels/helm.sh~1chart
          - target:
              kind: ClusterRoleBinding
              name: agent-sandbox-controller
            patch: |-
              - op: remove
                path: /metadata/labels/helm.sh~1chart
          - target:
              kind: Service
              name: agent-sandbox-controller
            patch: |-
              - op: remove
                path: /metadata/labels/helm.sh~1chart
          - target:
              kind: Deployment
              name: agent-sandbox-controller
            patch: |-
              - op: remove
                path: /metadata/labels/helm.sh~1chart
