---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
  namespace: kube-system
spec:
  # Adopts the existing cilium-cli-installed release (name+storageNamespace match).
  releaseName: cilium
  targetNamespace: kube-system
  storageNamespace: kube-system
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
    crds: CreateReplace
  upgrade:
    remediation:
      retries: -1
    crds: CreateReplace
    force: true
  interval: 30m
  chart:
    spec:
      chart: cilium
      version: 1.19.6
      interval: 12h
      sourceRef:
        kind: HelmRepository
        name: cilium
        namespace: kube-system
  valuesFrom:
    - kind: ConfigMap
      name: cilium-values
