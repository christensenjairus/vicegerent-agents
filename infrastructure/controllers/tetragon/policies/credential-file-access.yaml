---
apiVersion: cilium.io/v1alpha1
kind: TracingPolicyNamespaced
metadata:
  name: credential-file-access
  namespace: agent-sandbox
spec:
  kprobes:
    - call: security_file_open
      syscall: false
      args:
        - index: 0
          type: file
      selectors:
        - matchArgs:
            - index: 0
              operator: Prefix
              values:
                - /opt/hermes-ssh  # mounted SSH private-key Secret
                - /opt/data/.ssh
          matchActions:
            - action: Post
