---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tetragon
  namespace: kube-system
spec:
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
    crds: CreateReplace
  upgrade:
    remediation:
      retries: -1
    crds: CreateReplace
  interval: 30m
  chart:
    spec:
      chart: tetragon
      version: 1.7.0
      interval: 12h
      sourceRef:
        kind: HelmRepository
        name: tetragon
        namespace: kube-system
  valuesFrom:
    - kind: ConfigMap
      name: tetragon-values
