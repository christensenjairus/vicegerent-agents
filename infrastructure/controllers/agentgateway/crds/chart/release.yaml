---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway-crds
  namespace: agentgateway-system
spec:
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
    crds: CreateReplace
  upgrade:
    remediation:
      retries: -1
    crds: CreateReplace
  interval: 30m
  chart:
    spec:
      chart: agentgateway-crds
      version: v1.3.1
      sourceRef:
        kind: HelmRepository
        name: agentgateway-crds
        namespace: agentgateway-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: agentgateway-crds-values
