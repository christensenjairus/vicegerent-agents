---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: agentgateway
  namespace: agentgateway-system
spec:
  dependsOn:
    - name: agentgateway-crds
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
    crds: CreateReplace
  upgrade:
    remediation:
      retries: -1
    crds: CreateReplace
    force: true
  interval: 30m
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: agentgateway
            patch: |-
              - op: remove
                path: /spec/template/spec/containers/0/resources/limits/cpu
  chart:
    spec:
      chart: agentgateway
      version: v2.2.1
      sourceRef:
        kind: HelmRepository
        name: agentgateway
        namespace: agentgateway-system
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: agentgateway-values
