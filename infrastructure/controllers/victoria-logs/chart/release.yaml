---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoria-logs
  namespace: victoria-logs
spec:
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
    crds: CreateReplace
  upgrade:
    remediation:
      retries: -1
    crds: CreateReplace
  interval: 30m
  chart:
    spec:
      chart: victoria-logs-single
      version: 0.13.9
      sourceRef:
        kind: HelmRepository
        name: vm-victoria-logs
        namespace: victoria-logs
      interval: 12h
  valuesFrom:
    - kind: ConfigMap
      name: victoria-logs-values
