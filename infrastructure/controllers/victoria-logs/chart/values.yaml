---
# Upstream default values:
# https://github.com/VictoriaMetrics/helm-charts/blob/master/charts/victoria-logs-single/values.yaml
nameOverride: victoria-logs
server:
  retentionPeriod: 7d
  persistentVolume:
    size: 10Gi
    storageClassName: csi-hostpath-sc
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
  podAnnotations:
    reloader.stakater.com/auto: 'false' # reloads automatically
vector:
  enabled: true
  role: Agent
  image:
    repository: timberio/vector
    tag: 0.56.0-debian
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
  tolerations:
    - key: node-role.kubernetes.io/control-plane
      effect: NoSchedule
  customConfig:
    data_dir: /vector-data-dir
    api:
      enabled: false
      address: 0.0.0.0:8686
    sources:
      k8s:
        type: kubernetes_logs
        pod_annotation_fields:
          # Disable "pod_ips" as "pod_ip" already includes required info
          pod_ips: ''
    transforms:
      scope:
        type: filter
        inputs: [k8s]
        condition:
          type: vrl
          source: |
            (.kubernetes.pod_namespace == "kube-system" && .kubernetes.pod_labels."app.kubernetes.io/name" == "tetragon" && .kubernetes.container_name == "export-stdout") ||
            (.kubernetes.pod_namespace == "agentgateway-system" && starts_with(.kubernetes.pod_name, "agentgateway-proxy-") && .kubernetes.container_name == "agentgateway") ||
            (.kubernetes.pod_namespace == "agent-sandbox" && .kubernetes.container_name == "hermes") ||
            (.kubernetes.pod_namespace == "egress-proxy" && .kubernetes.container_name == "mitmproxy")
      parser:
        type: remap
        inputs: [scope]
        source: |
          .log = parse_json(.message) ?? .message
          if is_object(.log) {
            if is_object(.log.process_exec) {
              p = .log.process_exec.process
              binary = to_string(p.binary) ?? "?"
              args = to_string(p.arguments) ?? ""
              .message = "process_start: " + binary + " " + args
            } else if is_object(.log.process_kprobe) {
              p = .log.process_kprobe.process
              binary = to_string(p.binary) ?? "?"
              args = to_string(p.arguments) ?? ""
              policy = to_string(.log.process_kprobe.policy_name) ?? "?"
              .message = "process_kprobe (policy " + policy + "): " + binary + " " + args
            }
          }
      # Mirrors REDACT_PATTERNS in charts/egress-proxy/templates/addon-configmap.yaml -- see docs/secrets-and-pii-redaction.md.
      redactor:
        type: remap
        inputs: [parser]
        source: |
          .message = replace!(.message, r'(?s)-----BEGIN (RSA |EC |OPENSSH |DSA |ED25519 |ENCRYPTED )?PRIVATE KEY-----.+?-----END (RSA |EC |OPENSSH |DSA |ED25519 |ENCRYPTED )?PRIVATE KEY-----', "<masked>", count: -1)
          .message = replace!(.message, r'xox[bpraescd]-[A-Za-z0-9\-_]+', "<masked>", count: -1)
          .message = replace!(.message, r'xapp-[A-Za-z0-9\-_]+', "<masked>", count: -1)
          .message = replace!(.message, r'(?i)\bBearer\s+[A-Za-z0-9\-._~+/]+=*', "<masked>", count: -1)
          .message = replace!(.message, r'(?i)\bBasic\s+[A-Za-z0-9+/]+=*', "<masked>", count: -1)
          .message = replace!(.message, r'\b(AKIA|ASIA|AROA|AIDA)[A-Z0-9]{16}\b', "<masked>", count: -1)
          .message = replace!(.message, r'\bgh[pousr]_[A-Za-z0-9]{36,255}\b', "<masked>", count: -1)
          .message = replace!(.message, r'\bglpat-[A-Za-z0-9_\-]{20,}\b', "<masked>", count: -1)
          .message = replace!(.message, r'\bAIza[A-Za-z0-9_\-]{35}\b', "<masked>", count: -1)
          .message = replace!(.message, r'\bsk-(proj-)?[A-Za-z0-9_\-]{20,}\b', "<masked>", count: -1)
          .message = replace!(.message, r'\bsk-ant-[A-Za-z0-9_\-]{20,}\b', "<masked>", count: -1)
          .message = replace!(.message, r'\b(sk|rk)_(live|test)_[A-Za-z0-9]{16,}\b', "<masked>", count: -1)
          .message = replace!(.message, r'\bntn_[A-Za-z0-9]{20,}\b', "<masked>", count: -1)
          .message = replace!(.message, r'\bSK[a-f0-9]{32}\b', "<masked>", count: -1)
          .message = replace!(.message, r'\bnpm_[A-Za-z0-9]{36}\b', "<masked>", count: -1)
          .message = replace!(.message, r'\beyJ[A-Za-z0-9_\-]+\.eyJ[A-Za-z0-9_\-]+\.[A-Za-z0-9_\-]+\b', "<masked>", count: -1)
          .message = replace!(.message, r'\b(0(0[1-9]|[1-9][0-9])|[1-5][0-9]{2}|6([0-5][0-9]|6[0-57-9]|[7-9][0-9])|[78][0-9]{2})-(0[1-9]|[1-9][0-9])-(000[1-9]|00[1-9][0-9]|0[1-9][0-9]{2}|[1-9][0-9]{3})\b', "<masked>", count: -1)
          .message = replace!(.message, r'\b4([0-9]{12}|[0-9]{15}|[0-9]{18})\b', "<masked>", count: -1)
          .message = replace!(.message, r'\b(5[1-5][0-9]{14}|(222[1-9]|22[3-9][0-9]|2[3-6][0-9]{2}|27[01][0-9]|2720)[0-9]{12})\b', "<masked>", count: -1)
          .message = replace!(.message, r'\b3[47][0-9]{13}\b', "<masked>", count: -1)
          .message = replace!(.message, r'\b(6011[0-9]{12}|65[0-9]{14}|64[4-9][0-9]{13}|622(12[6-9]|1[3-9][0-9]|[2-8][0-9]{2}|9([01][0-9]|2[0-5]))[0-9]{10})\b', "<masked>", count: -1)
          .message = replace!(.message, r'(\+?1[-.\s]?)?(\([0-9]{3}\)[-.\s]?|[0-9]{3}[-.\s])[0-9]{3}[-.\s][0-9]{4}\b', "<masked>", count: -1)
    sinks:
      vlogs:
        type: elasticsearch
        inputs: [redactor]
        mode: bulk
        api_version: v8
        compression: gzip
        healthcheck:
          enabled: false
        request:
          headers:
            VL-Time-Field: timestamp
            VL-Stream-Fields: stream,kubernetes.pod_name,kubernetes.container_name,kubernetes.pod_namespace
            VL-Msg-Field: message,msg,_msg,log.msg,log.message,log
            AccountID: '0'
            ProjectID: '0'
