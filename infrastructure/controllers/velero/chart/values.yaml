---
# https://github.com/vmware-tanzu/helm-charts/blob/velero-12.1.0/charts/velero/values.yaml
resources:
  requests:
    cpu: 20m
    memory: 128Mi
initContainers:
  - name: velero-plugin-for-aws
    image: docker.io/velero/velero-plugin-for-aws:v1.14.2
    imagePullPolicy: IfNotPresent
    volumeMounts:
      - mountPath: /target
        name: plugins
# CSI uses EnableCSI + a labeled VolumeSnapshotClass, not a VSL; this only gates the legacy VSL.
snapshotsEnabled: false
# Avoid an empty global Secret; the per-BSL credential below is the only one needed.
credentials:
  useSecret: false
configuration:
  # Enable Velero's built-in CSI snapshotting for CSI-backed PVCs (the agent data PVC).
  features: EnableCSI
  backupStorageLocation:
    - name: vicegerent
      provider: aws
      bucket: vicegerent
      default: true
      accessMode: ReadWrite
      credential:
        name: velero-credentials
        key: cloud
      config:
        region: default
        s3ForcePathStyle: true
        # Self-hosted rclone serve s3 on the laptop, via the Docker Desktop host gateway.
        s3Url: http://host.docker.internal:9899
deployNodeAgent: true
nodeAgent:
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
schedules:
  vicegerent-daily:
    disabled: false
    schedule: CRON_TZ=America/Denver 0 13 * * *
    template:
      ttl: 168h
      storageLocation: vicegerent
      snapshotVolumes: true
      defaultVolumesToFsBackup: false
      includedNamespaces: [agent-sandbox]
