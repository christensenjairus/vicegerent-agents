---
# Per-machine identity/scoping values, substituted into policy and config
# manifests at Flux reconcile time via this cluster's apps.yaml +
# infrastructure.yaml postBuild.substituteFrom. Nothing here is a secret — it's
# the operator's own GitHub repos, Jira project, Linear team, and git host — so
# the Cerbos authorization policies under
# infrastructure/controllers/cerbos/policies/defs/*.yaml carry readable
# ${tokens} instead of hand-edited literal strings that mean nothing to anyone
# else forking this repo.
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-vars
  namespace: flux-system
data:
  # GitHub owner/repo pairs this machine's agents may act on (resource_github.yaml).
  # CEL-list-ready: pre-quoted, comma-joined. Flux substitution is a literal string
  # replace, not YAML-aware — it is spliced into a CEL `in [...]` list, so keep the
  # quotes and commas and do not reformat it into a YAML list.
  githubAllowedRepos: >-
    "christensenjairus/vicegerent-agents", "christensenjairus/clustercreator"

  # Jira projects this machine's agents may WRITE to (resource_jira.yaml) --
  # reads are unrestricted. CEL-list-ready; every issue/epic key is expected
  # to start with one of these prefixes + "-". (I don't use Jira for personal.)
  jiraAllowedProjects: >-
    "CHANGE"

  # Jira assignees this machine's agents may set on an issue
  # (resource_jira.yaml) -- "*" disables the check entirely (default: false
  # existing restriction to preserve, unlike jiraAllowedProjects above).
  jiraAllowedAssignees: >-
    "*"

  # Jira issue types this machine's agents may create/set on an issue
  # (resource_jira.yaml) -- "*" disables the check entirely (safe default
  # until the operator opts in, matching jiraAllowedAssignees above; there
  # was no pre-existing issue-type restriction to preserve).
  jiraAllowedIssueTypes: >-
    "*"

  # Linear team this machine's agents may create/update issues for
  # (resource_linear.yaml). CEL-list-ready set of the team's three identifier
  # forms — the real team UUID, the display name, and the issue-key prefix —
  # since a caller's `team` arg may be any one of them.
  linearAllowedTeams: >-
    "91f312b9-73e9-45ea-8b80-4d3a1ef7aff9", "HAHomelabs", "HAH"

  # Linear assignees this machine's agents may set on an issue
  # (resource_linear.yaml) -- "*" disables the check entirely, mirroring
  # jiraAllowedAssignees above. "me" is always implicitly valid regardless of
  # this list (Linear's own API treats "me" as the OAuth-connected identity).
  linearAllowedAssignees: >-
    "*"

  # PagerDuty service ids this machine's agents may act on via
  # manage_incidents/add_note_to_incident (resource_pagerduty.yaml). "*"
  # disables the check entirely.
  pagerdutyAllowedServiceIds: >-
    "*"

  # This machine's git-over-SSH FQDN and every intermediate hostname in its CNAME
  # chain (charts/agent/templates/networkpolicy.yaml). Generic to any CNAME-chained
  # FQDN the SSH egress block allowlists, not git-specific. Cilium's toFQDNs DNS
  # proxy strips a CNAME answer unless every name in the chain is itself
  # allowlisted, so list them all, comma-joined (empty if the host resolves with
  # no CNAME chain).
  cnameChainedFQDN: gitlab.hahomelabs.com
  cnameChain: uw1-ddns.hahomelabs.com,uw1-hahomelabs.ddns.net

  # FQDNs the shared egress-proxy permits for external HTTP(S) (charts/egress-proxy).
  # Machine-scoped, not per-agent: one laptop implies one set of network requirements,
  # so this lives here rather than in each agent's values.yaml. One source drives both
  # the Cilium toFQDNs policy and the mitmproxy scrub.py allowlist. Comma-joined bare
  # hostnames — Flux substitutes them into apps/personal/egress-proxy/values.yaml and
  # the chart splitLists each one. apexWildcardDomains get an exact match AND a
  # *.<domain> wildcard; exactOnlyDomains get an exact match only. (httpbin.io stays
  # hardcoded in the chart: a redaction-test-suite target, not a user-facing
  # destination.) Go proxy/sumdb/GCS added for `go mod download` (GCS is where
  # proxy.golang.org redirects zip fetches — golang/go#45248).
  apexWildcardDomains: github.com,githubusercontent.com
  exactOnlyDomains: pypi.org,files.pythonhosted.org,proxy.golang.org,sum.golang.org,storage.googleapis.com

  # Grafana datasources this machine's agents may NOT read from
  # (resource_grafana.yaml). Matched by uid or by name — whichever the calling
  # tool populates — since either can identify the datasource depending on the
  # Grafana MCP tool used. CEL-list-ready: pre-quoted, comma-joined, same
  # pattern as githubAllowedRepos/linearAllowedTeams -- add more datasources
  # here without touching resource_grafana.yaml.
  # I don't have off-limits datasources for personal.
  grafanaDeniedDatasourceUids: >-
    "fess5o6x6evb4b"
  grafanaDeniedDatasourceNames: >-
    "dev-opensearch-datasource"

  # Notion page id notion-create-pages is pinned to (Cerbos denies any create
  # call whose parent isn't this page, defs/resource_notion.yaml) — your
  # "Scratchpad" page. Also always implicitly included in
  # notionAllowedParentPageIds below (deployment.yaml), so update-page/
  # create-comment calls under Scratchpad stay allowed regardless of that list.
  notionScratchpadPageId: 393de8859710809c9f5ec57a91d2c81a  # pragma: allowlist secret (Notion page id)

  # Additional Notion parent-folder page ids (comma-joined, Scratchpad NOT
  # repeated here -- it's implicit, see above) this machine's agent may
  # update-page/create-comment under, beyond Scratchpad itself
  # (mcp-cerbos-shim's live ancestry gate, HAH multi-parent scoping). Anything
  # outside Scratchpad + this list -- e.g. a Finance team folder -- is denied.
  # notion-create-pages is unaffected; it stays pinned to Scratchpad-only via
  # notionScratchpadPageId above regardless of this list.
  notionAllowedParentPageIds: 1ccde885971080989baffe615ee5922b  # pragma: allowlist secret (Notion page id; "Teamspace Home")

  # No content moderation on personal
  contentModerationEnabled: ''

  # Alertmanager silence duration cap in seconds (resource_alertmanager.yaml).
  # createSilence's duration is capped by this value; personal machine gets a
  # longer leash than work.
  alertmanagerMaxSilenceSeconds: '1209600'  # 14 days

  # Tavily/Firecrawl crawl+map caps (resource_webcrawl.yaml). Same value on
  # both machines -- there's no per-machine reason for a looser crawl budget
  # the way silence duration has (a stale silence's blast radius scales with
  # team size; a crawl budget doesn't).
  webCrawlMaxLimit: '200'
  webCrawlMaxDepth: '3'
  webCrawlMaxBreadth: '50'
