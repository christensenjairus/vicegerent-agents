---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources: [gotk-components.yaml, gotk-sync.yaml]
patches:
  # React immediately to changes in postBuild.substituteFrom/valuesFrom
  # ConfigMaps/Secrets instead of waiting for the next interval tick.
  - patch: |
      - op: add
        path: /spec/template/spec/containers/0/args/-
        value: --watch-configs-label-selector=owner!=helm
    target:
      kind: Deployment
      name: (kustomize-controller|helm-controller)
