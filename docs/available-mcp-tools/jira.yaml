      jira_add_issues_to_sprint:
        description: "Add issues to a Jira sprint. Args: ctx: The FastMCP context. sprint_id: The ID of the sprint. issue_keys: Comma-separated issue keys. Returns: JSON string with success message. Raises: ValueError: If in read-only mode or Jira client unavailable."
