            required: true
            description: "Sprint ID to add issues to"
      jira_move_issues_to_backlog:
        description: "Move issues to the backlog, removing them from any sprint. Args: ctx: The FastMCP context. issue_keys: Comma-separated issue keys. Returns: JSON string with success message. Raises: ValueError: If in read-only mode or Jira client unavailable."
        arguments:
          issue_keys:
            type: "string"
            required: true
            description: "Comma-separated issue keys (e.g., 'PROJ-1,PROJ-2')"
      jira_get_project_issue_types:
        description: "Get available issue types for a Jira project. Returns the list of issue types (Bug, Task, Story, Epic, etc.) that can be created in the specified project. Use the returned issue type IDs with get_create_fields to discover what fields each type requires. Args: ctx: The FastMCP context. project_key: The project key. Returns: JSON string with list of issue types (id, name, description, subtask)."
        arguments:
