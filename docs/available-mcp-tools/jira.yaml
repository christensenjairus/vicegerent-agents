      jira_get_project_fields:
        description: "Get the fields available on issues of a project (the create schema), deduplicated across the project's issue types \u2014 i.e. which fields tickets in this project have, regardless of whether they are filled. Args: ctx: The FastMCP context. project_key: The project key. Returns: JSON string with a list of fields: each {field_id, name, required, schema_type, custom, issue_types}. Empty list if none / on error. Raises: ValueError: If the Jira client is not configured or available."
        arguments:
          project_key:
            type: "string"
            required: true
            description: "The project key, e.g. 'PROJ'."
      jira_get_service_desk_for_project:
        description: "Get the Jira Service Desk associated with a project key. Server/Data Center only. Not available on Jira Cloud. Args: ctx: The FastMCP context. project_key: Jira project key. Returns: JSON string with project key and service desk data (or null if not found). Raises: NotImplementedError: If connected to Jira Cloud (Server/DC only)."
