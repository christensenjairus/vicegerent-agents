            type: "string"
            required: true
            description: "Jira issue key (e.g., 'PROJ-123', 'ACV2-642')"
          public:
            type: "boolean"
            required: false
            description: "(Optional) For JSM/Service Desk issues only. Set to true for customer-visible comment, false for internal agent-only comment. Uses the ServiceDesk API (plain text, not Markdown). Cannot be combined with visibility."
          visibility:
            type: "string"
            required: false
            description: "(Optional) Comment visibility as JSON string (e.g. '{\"type\":\"group\",\"value\":\"jira-users\"}')"
      jira_edit_comment:
        description: "Edit an existing comment on a Jira issue. Args: ctx: The FastMCP context. issue_key: Jira issue key. comment_id: The ID of the comment to edit. body: Updated comment text in Markdown. visibility: (Optional) Comment visibility as JSON string. Returns: JSON string representing the updated comment object. Raises: ValueError: If in read-only mode or Jira client unavailable."
        arguments:
          body:
            type: "string"
            required: true
            description: "Updated comment text in Markdown format"
          comment_id:
            type: "string"
            required: true
            description: "The ID of the comment to edit"
          issue_key:
            type: "string"
            required: true
            description: "Jira issue key (e.g., 'PROJ-123', 'ACV2-642')"
          visibility:
            type: "string"
            required: false
            description: "(Optional) Comment visibility as JSON string (e.g. '{\"type\":\"group\",\"value\":\"jira-users\"}')"
      jira_add_worklog:
        description: "Add a worklog entry to a Jira issue. Args: ctx: The FastMCP context. issue_key: Jira issue key. time_spent: Time spent in Jira format. comment: Optional comment in Markdown. started: Optional start time in ISO format. original_estimate: Optional new original estimate. remaining_estimate: Optional new remaining estimate. Returns: JSON string representing the added worklog object. Raises: ValueError: If in read-only mode or Jira client unavailable."
        arguments:
          comment:
            type: "string"
            required: false
            description: "(Optional) Comment for the worklog in Markdown format"
          issue_key:
            type: "string"
            required: true
            description: "Jira issue key (e.g., 'PROJ-123', 'ACV2-642')"
          original_estimate:
            type: "string"
            required: false
            description: "(Optional) New value for the original estimate"
          remaining_estimate:
            type: "string"
            required: false
            description: "(Optional) New value for the remaining estimate"
          started:
            type: "string"
            required: false
            description: "(Optional) Start time in ISO format. If not provided, the current time will be used. Example: '2023-08-01T12:00:00.000+0000'"
          time_spent:
            type: "string"
            required: true
            description: "Time spent in Jira format. Examples: '1h 30m' (1 hour and 30 minutes), '1d' (1 day), '30m' (30 minutes), '4h' (4 hours)"
      jira_link_to_epic:
        description: "Link an existing issue to an epic. Args: ctx: The FastMCP context. issue_key: The key of the issue to link. epic_key: The key of the epic to link to. Returns: JSON string representing the updated issue object. Raises: ValueError: If in read-only mode or Jira client unavailable."
        arguments:
          epic_key:
            type: "string"
            required: true
            description: "The key of the epic to link to (e.g., 'PROJ-456')"
          issue_key:
            type: "string"
            required: true
            description: "The key of the issue to link (e.g., 'PROJ-123', 'ACV2-642')"
      jira_create_issue_link:
        description: "Create a link between two Jira issues. Args: ctx: The FastMCP context. link_type: The type of link (e.g., 'Blocks'). inward_issue_key: The key of the source issue. outward_issue_key: The key of the target issue. comment: Optional comment text. comment_visibility: Optional JSON string for comment visibility. Returns: JSON string indicating success or failure. Raises: ValueError: If required fields are missing, invalid input, in read-only mode, or Jira client unavailable."
        arguments:
          comment:
            type: "string"
            required: false
            description: "(Optional) Comment to add to the link"
          comment_visibility:
            type: "string"
            required: false
            description: "(Optional) Visibility settings for the comment as JSON string (e.g. '{\"type\":\"group\",\"value\":\"jira-users\"}')"
          inward_issue_key:
            type: "string"
            required: true
            description: "The key of the inward issue (e.g., 'PROJ-123', 'ACV2-642')"
          link_type:
            type: "string"
            required: true
            description: "The type of link to create (e.g., 'Duplicate', 'Blocks', 'Relates to')"
          outward_issue_key:
            type: "string"
            required: true
            description: "The key of the outward issue (e.g., 'PROJ-456')"
      jira_create_remote_issue_link:
        description: "Create a remote issue link (web link or Confluence link) for a Jira issue. This tool allows you to add web links and Confluence links to Jira issues. The links will appear in the issue's \"Links\" section and can be clicked to navigate to external resources. Args: ctx: The FastMCP context. issue_key: The key of the issue to add the link to. url: The URL to link to (can be any web page or Confluence page). title: The title/name that will be displayed for the link. summary: Optional description of what the link is for. relationship: Optional relationship description. icon_url: Optional URL to a 16x16 icon for the link. Returns: JSON string indicating success or failure. Raises: ValueError: If required fields are missing, invalid input, in read-only mode, or Jira client unavailable."
        arguments:
          icon_url:
            type: "string"
            required: false
            description: "(Optional) URL to a 16x16 icon for the link"
          issue_key:
            type: "string"
            required: true
            description: "The key of the issue to add the link to (e.g., 'PROJ-123', 'ACV2-642')"
          relationship:
            type: "string"
            required: false
            description: "(Optional) Relationship description (e.g., 'causes', 'relates to', 'documentation')"
          summary:
            type: "string"
            required: false
            description: "(Optional) Description of the link"
          title:
            type: "string"
            required: true
            description: "The title/name of the link (e.g., 'Documentation Page', 'Confluence Page')"
          url:
            type: "string"
            required: true
            description: "The URL to link to (e.g., 'https://example.com/page' or Confluence page URL)"
      jira_remove_issue_link:
        description: "Remove a link between two Jira issues. Args: ctx: The FastMCP context. link_id: The ID of the link to remove. Returns: JSON string indicating success. Raises: ValueError: If link_id is missing, in read-only mode, or Jira client unavailable."
        arguments:
          link_id:
            type: "string"
            required: true
            description: "The ID of the link to remove"
      jira_transition_issue:
        description: "Transition a Jira issue to a new status. Args: ctx: The FastMCP context. issue_key: Jira issue key. transition_id: ID of the transition. fields: Optional JSON string of fields to update during transition. comment: Optional comment for the transition in Markdown format. Returns: JSON string representing the updated issue object. Raises: ValueError: If required fields missing, invalid input, in read-only mode, or Jira client unavailable."
        arguments:
          comment:
            type: "string"
            required: false
            description: "(Optional) Comment to add during the transition in Markdown format. This will be visible in the issue history."
          fields:
            type: "string"
            required: false
            description: "(Optional) JSON string of fields to update during the transition. Some transitions require specific fields to be set (e.g., resolution). Example: '{\"resolution\": {\"name\": \"Fixed\"}}'"
          issue_key:
            type: "string"
            required: true
            description: "Jira issue key (e.g., 'PROJ-123', 'ACV2-642')"
          transition_id:
            type: "string"
            required: true
            description: "ID of the transition to perform. Use the jira_get_transitions tool first to get the available transition IDs for the issue. Example values: '11', '21', '31'"
      jira_create_sprint:
        description: "Create Jira sprint for a board. Args: ctx: The FastMCP context. board_id: Board ID. name: Sprint name. start_date: Start date (ISO format). end_date: End date (ISO format). goal: Optional sprint goal. Returns: JSON string representing the created sprint object. Raises: ValueError: If in read-only mode or Jira client unavailable."
        arguments:
