      jira_search_projects:
        description: "Search for Jira projects by name or key prefix. Uses the projects picker endpoint to return a ranked list of matching projects without fetching every visible project on the instance. Args: ctx: The FastMCP context. query: Name or key prefix to search for. max_results: Maximum number of results to return. current_project_ids: Comma-separated project IDs to exclude. Returns: JSON string representing a list of matching project objects. Project keys are always returned in uppercase. If JIRA_PROJECTS_FILTER is configured, only returns projects matching those keys."
        arguments:
          current_project_ids:
