            description: "Issue key to scope the search to (e.g. 'DT-779'). Required if project_key is not given."
          limit:
            type: "integer"
            required: false
            description: "Maximum number of users to return (default 20)."
          project_key:
            type: "string"
            required: false
            description: "Project key to scope the search to (e.g. 'DT'). Required if issue_key is not given."
          query:
