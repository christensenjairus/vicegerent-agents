      jira_create_version:
        description: "Create a new fix version in a Jira project. Args: ctx: The FastMCP context. project_key: The project key. name: Name of the version. start_date: Start date (optional). release_date: Release date (optional). description: Description (optional). Returns: JSON string of the created version object."
        arguments:
          description:
            type: "string"
            required: false
            description: "Description of the version"
          name:
            type: "string"
            required: true
            description: "Name of the version"
          project_key:
            type: "string"
            required: true
            description: "Jira project key (e.g., 'PROJ', 'ACV2')"
          release_date:
            type: "string"
            required: false
            description: "Release date (YYYY-MM-DD)"
          start_date:
            type: "string"
            required: false
            description: "Start date (YYYY-MM-DD)"
      jira_batch_create_versions:
        description: "Batch create multiple versions in a Jira project. Args: ctx: The FastMCP context. project_key: The project key. versions: JSON array string of version objects. Returns: JSON array of results, each with success flag, version or error."
        arguments:
          project_key:
            type: "string"
            required: true
            description: "Jira project key (e.g., 'PROJ', 'ACV2')"
          versions:
            type: "string"
            required: true
            description: "JSON array of version objects. Each object should contain: - name (required): Name of the version - startDate (optional): Start date (YYYY-MM-DD) - releaseDate (optional): Release date (YYYY-MM-DD) - description (optional): Description of the version Example: [ {\"name\": \"v1.0\", \"startDate\": \"2025-01-01\", \"releaseDate\": \"2025-02-01\", \"description\": \"First release\"}, {\"name\": \"v2.0\"} ]"
      jira_update_version:
        description: "Update an existing fix version in a Jira project. Only fields explicitly provided are modified; other attributes of the version are left untouched. Useful for archiving/unarchiving versions, renaming, or shifting release dates without recreating them. Args: ctx: The FastMCP context. version_id: Numeric ID of the version to update. name: New name (optional). description: New description (optional). start_date: New start date YYYY-MM-DD (optional). release_date: New release date YYYY-MM-DD (optional). archived: Archived flag (optional). released: Released flag (optional). Returns: JSON string of the updated version object."
        arguments:
          archived:
            type: "boolean"
            required: false
            description: "Set archived flag (true to archive)"
          description:
            type: "string"
            required: false
            description: "New description for the version"
          name:
            type: "string"
            required: false
            description: "New name for the version"
          release_date:
            type: "string"
            required: false
            description: "New release date (YYYY-MM-DD)"
          released:
            type: "boolean"
            required: false
            description: "Set released flag (true to mark released)"
          start_date:
            type: "string"
            required: false
            description: "New start date (YYYY-MM-DD)"
          version_id:
            type: "string"
            required: true
            description: "Numeric ID of the version to update (e.g. '10001')"
      jira_get_issue_proforma_forms:
        description: "Get all ProForma forms associated with a Jira issue. Uses the new Jira Forms REST API. Form IDs are returned as UUIDs. Args: ctx: The FastMCP context. issue_key: The issue key to get forms for. Returns: JSON string representing the list of ProForma forms, or an error object if failed."
        arguments:
          issue_key:
            type: "string"
            required: true
            description: "Jira issue key (e.g., 'PROJ-123')"
      jira_get_proforma_form_details:
        description: "Get detailed information about a specific ProForma form. Uses the new Jira Forms REST API. Returns form details including ADF design structure. Args: ctx: The FastMCP context. issue_key: The issue key containing the form. form_id: The form UUID identifier. Returns: JSON string representing the ProForma form details, or an error object if failed."
        arguments:
          form_id:
            type: "string"
            required: true
            description: "ProForma form UUID (e.g., '1946b8b7-8f03-4dc0-ac2d-5fac0d960c6a')"
          issue_key:
            type: "string"
            required: true
            description: "Jira issue key (e.g., 'PROJ-123')"
      jira_update_proforma_form_answers:
        description: "Update form field answers using the Jira Forms REST API. This is the primary method for updating form data. Each answer object must specify the question ID, answer type, and value. **\u26a0\ufe0f KNOWN LIMITATION - DATETIME fields:** The Jira Forms API does NOT properly preserve time components in DATETIME fields. Only the date portion is stored; times are reset to midnight (00:00:00). **Workaround for DATETIME fields:** Use jira_update_issue to directly update the underlying custom fields instead: 1. Get the custom field ID from the form details (question's \"jiraField\" property) 2. Use jira_update_issue with fields like: {\"customfield_XXXXX\": \"2026-01-09T11:50:00-08:00\"} Example: ```python # Instead of updating via form (loses time): # jira_update_proforma_form_answers(issue_key, form_id, [{\"questionId\": \"91\", \"type\": \"DATETIME\", \"value\": \"...\"}]) # Use direct field update (preserves time): jira_update_issue(issue_key, {\"customfield_10542\": \"2026-01-09T11:50:00-08:00\"}) ``` **Automatic DateTime Conversion:** For DATE and DATETIME fields, you can provide values as: - ISO 8601 strings (e.g., \"2024-12-17T19:00:00Z\", \"2024-12-17\") - Unix timestamps in milliseconds (e.g., 1734465600000) The tool automatically converts ISO 8601 strings to Unix timestamps. Example answers: [ {\"questionId\": \"q1\", \"type\": \"TEXT\", \"value\": \"Updated description\"}, {\"questionId\": \"q2\", \"type\": \"SELECT\", \"value\": \"Product A\"}, {\"questionId\": \"q3\", \"type\": \"NUMBER\", \"value\": 42}, {\"questionId\": \"q4\", \"type\": \"DATE\", \"value\": \"2024-12-17\"} ] Common answer types: - TEXT: String values - NUMBER: Numeric values - DATE: Date values (ISO 8601 string or Unix timestamp in ms) - DATETIME: DateTime values - \u26a0\ufe0f USE WORKAROUND ABOVE - SELECT: Single selection from options - MULTI_SELECT: Multiple selections (value as list) - CHECKBOX: Boolean values Args: ctx: The FastMCP context. issue_key: The issue key containing the form. form_id: The form UUID (get from get_issue_proforma_forms). answers: List of answer objects with questionId, type, and value. Returns: JSON string with operation result."
        arguments:
          answers:
            type: "array"
            required: true
            description: "List of answer objects. Each answer must have: questionId (string), type (TEXT/NUMBER/SELECT/etc), value (any)"
          form_id:
            type: "string"
            required: true
            description: "ProForma form UUID (e.g., '1946b8b7-8f03-4dc0-ac2d-5fac0d960c6a')"
          issue_key:
            type: "string"
            required: true
            description: "Jira issue key (e.g., 'PROJ-123')"
      jira_get_issue_dates:
        description: "Get date information and status transition history for a Jira issue. Returns dates (created, updated, due date, resolution date) and optionally status change history with time tracking for workflow analysis. Args: ctx: The FastMCP context. issue_key: The Jira issue key. include_status_changes: Whether to include status change history. include_status_summary: Whether to include aggregated time per status. Returns: JSON string with issue dates and optional status tracking data."
        arguments:
          include_status_changes:
            type: "boolean"
            required: false
            description: "Include status change history with timestamps and durations"
          include_status_summary:
            type: "boolean"
            required: false
            description: "Include aggregated time spent in each status"
          issue_key:
            type: "string"
            required: true
            description: "Jira issue key (e.g., 'PROJ-123', 'ACV2-642')"
      jira_get_issue_sla:
        description: "Calculate SLA metrics for a Jira issue. Computes various time-based metrics including cycle time, lead time, time spent in each status, due date compliance, and more. Working hours can be configured via environment variables: - JIRA_SLA_WORKING_HOURS_ONLY: Enable working hours filtering (true/false) - JIRA_SLA_WORKING_HOURS_START: Start time (e.g., \"09:00\") - JIRA_SLA_WORKING_HOURS_END: End time (e.g., \"17:00\") - JIRA_SLA_WORKING_DAYS: Working days (e.g., \"1,2,3,4,5\" for Mon-Fri) - JIRA_SLA_TIMEZONE: Timezone for calculations (e.g., \"America/New_York\") Args: ctx: The FastMCP context. issue_key: The Jira issue key. metrics: Comma-separated list of metrics to calculate. working_hours_only: Use working hours only for calculations. include_raw_dates: Include raw date values in response. Returns: JSON string with calculated SLA metrics."
        arguments:
          include_raw_dates:
            type: "boolean"
            required: false
            description: "Include raw date values in the response"
          issue_key:
            type: "string"
            required: true
            description: "Jira issue key (e.g., 'PROJ-123', 'ACV2-642')"
          metrics:
            type: "string"
            required: false
            description: "Comma-separated list of SLA metrics to calculate. Available: cycle_time, lead_time, time_in_status, due_date_compliance, resolution_time, first_response_time. Defaults to configured metrics or 'cycle_time,time_in_status'."
          working_hours_only:
            type: "boolean"
            required: false
            description: "Calculate using working hours only (excludes weekends/non-business hours). Defaults to value from JIRA_SLA_WORKING_HOURS_ONLY environment variable."
      jira_get_issue_development_info:
