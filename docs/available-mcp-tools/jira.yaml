            description: "Name of the sprint (e.g., 'Sprint 1')"
          start_date:
            type: "string"
            required: true
            description: "Start time for sprint (ISO 8601 format)"
      jira_update_sprint:
        description: "Update jira sprint. Args: ctx: The FastMCP context. sprint_id: The ID of the sprint. name: Optional new name. state: Optional new state (future|active|closed). start_date: Optional new start date. end_date: Optional new end date. goal: Optional new goal. Returns: JSON string representing the updated sprint object or an error message. Raises: ValueError: If in read-only mode or Jira client unavailable."
        arguments:
          end_date:
            type: "string"
