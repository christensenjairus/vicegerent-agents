            description: "Jira project key (e.g., 'PROJ', 'JTEST')"
      jira_get_create_fields:
        description: "Get fields available for creating an issue of a specific type. Returns all fields (required and optional) for the given project and issue type, including field names, IDs, whether they're required, and their schema. Use jira_get_field_options when a returned field needs its allowed values. Args: ctx: The FastMCP context. project_key: The project key. issue_type_id: The issue type ID. Returns: JSON string with list of field metadata (field_id, name, required, schema)."
        arguments:
          issue_type_id:
            type: "string"
            required: true
            description: "The issue type ID (from get_project_issue_types). Example: '10002' for Task."
          project_key:
            type: "string"
            required: true
            description: "Jira project key (e.g., 'PROJ', 'JTEST')"
      jira_get_project_versions:
        description: "Get all fix versions for a specific Jira project."
        arguments:
          project_key:
            type: "string"
            required: true
            description: "Jira project key (e.g., 'PROJ', 'ACV2')"
      jira_get_project_components:
        description: "Get all components for a specific Jira project."
        arguments:
          project_key:
