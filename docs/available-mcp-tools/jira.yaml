            description: "Starting index for pagination (0-based)"
      jira_get_queue_issues:
        description: "Get issues from a Jira Service Desk queue. Server/Data Center only. Not available on Jira Cloud. Args: ctx: The FastMCP context. service_desk_id: Service desk ID. queue_id: Queue ID. start_at: Starting index for pagination. limit: Maximum number of issues to return. Returns: JSON string with queue metadata, issues, and pagination metadata. Raises: NotImplementedError: If connected to Jira Cloud (Server/DC only)."
        arguments:
          limit:
