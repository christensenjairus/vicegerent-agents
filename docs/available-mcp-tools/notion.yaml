# Catalog of every tool exposed by the running vicegerent MCP backend(s),
# with each tool's arguments (type, required, description, enum). Reference
# for spotting missing tools and for writing cerbos argument-level policies.
# GENERATED — do not edit by hand.
# Regenerate: scripts/probe-mcp-tools.py notion --format yaml -o <this-file>
group: vicegerent
tool_count: 20
servers:
  notion:
    tool_count: 20
    tools:
      notion-search:
        description: "Search the user's Notion workspace and connected sources (Slack, Google Drive, GitHub, Jira, Teams, SharePoint, OneDrive, Linear) and return a ranked list of results to read. Two query types: - \"internal\" (default): content across Notion and connected sources. - \"user\": find people by name or email. When to use this vs. get-answer: - Use search when you want results to read, filter, cite, or fetch in full, or when you'll synthesize across sources yourself. - Use get-answer when you just want one synthesized answer and don't need the underlying pages. If its answer isn't good enough, come back to search for the full results. How to search well: - One question or topic per call. Make separate calls for separate needs. - If the question names a person, timeframe, teamspace, or database, pass the matching filter. Otherwise omit filters for the broadest recall. - Keep responses small: set page_size (default 10, max 25) and max_highlight_length (default 200; 0 to omit) as low as you can. - After finding a Notion result, call fetch with its \"id\" for full contents. The backend is auto-selected: AI search when the user has Notion AI and connectors, otherwise faster workspace-only search. Use content_search_mode only when you specifically need one or the other. To search within a database: fetch the database first to get its data source URL (collection://...) from <data-source url=\"...\"> tags, then pass that as data_source_url. For multi-source databases, match by view ID (?v=...) or search each source. Don't combine a database URL or ID with the collection:// prefix, and don't use a database URL as page_url. <example description=\"Search with date range filter (only documents created in 2024)\"> { \"query\": \"quarterly revenue report\", \"query_type\": \"internal\", \"filters\": { \"created_date_range\": { \"start_date\": \"2024-01-01\", \"end_date\": \"2025-01-01\" } } } </example> <example description=\"Teamspace + creator filter\"> {\"query\": \"project updates\", \"query_type\": \"internal\", \"teamspace_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"filters\": {\"created_by_user_ids\": [\"a1b2c3d4-e5f6-7890-abcd-ef1234567890\"]}} </example> <example description=\"Database with date + creator filters\"> {\"query\": \"design review\", \"data_source_url\": \"collection://f336d0bc-b841-465b-8045-024475c079dd\", \"filters\": {\"created_date_range\": {\"start_date\": \"2024-10-01\"}, \"created_by_user_ids\": [\"a1b2c3d4-e5f6-7890-abcd-ef1234567890\", \"b2c3d4e5-f6a7-8901-bcde-f12345678901\"]}} </example> <example description=\"User search\"> {\"query\": \"john@example.com\", \"query_type\": \"user\"} </example>"
        arguments:
          query:
            type: "string"
            required: true
            description: "Semantic search query over your entire Notion workspace and connected sources (Slack, Google Drive, Github, Jira, Microsoft Teams, Sharepoint, OneDrive, or Linear). For best results, don't provide more than one question per tool call. Use a separate \"search\" tool call for each search you want to perform. Alternatively, the query can be a substring or keyword to find users by matching against their name or email address. For example: \"john\" or \"john@example.com\""
          query_type:
            type: "string"
            required: false
            enum: ["internal", "user"]
          content_search_mode:
            type: "string"
            required: false
            enum: ["workspace_search", "ai_search"]
          data_source_url:
            type: "string"
            required: false
            description: "Optionally, provide the URL of a Data source to search. This will perform a semantic search over the pages in the Data Source. Note: must be a Data Source, not a Database. <data-source> tags are part of the Notion flavored Markdown format returned by tools like fetch. The full spec is available in the create-pages tool description."
          page_url:
            type: "string"
            required: false
            description: "Optionally, provide the URL or ID of a page to search within. This will perform a semantic search over the content within and under the specified page. Accepts either a full page URL (e.g. https://notion.so/workspace/Page-Title-1234567890) or just the page ID (UUIDv4) with or without dashes."
          teamspace_id:
            type: "string"
            required: false
            description: "Optionally, provide the ID of a teamspace to restrict search results to. This will perform a search over content within the specified teamspace only. Accepts the teamspace ID (UUIDv4) with or without dashes."
          filters:
            type: "object"
            required: false
            description: "Optionally provide filters to apply to the search results. Only valid when query_type is 'internal'."
          page_size:
            type: "integer"
            required: false
            description: "Maximum number of results to return (default 10). Lower values reduce response size."
          max_highlight_length:
            type: "integer"
            required: false
            description: "Maximum character length for result highlights (default 200). Set to 0 to omit highlights entirely."
      notion-fetch:
        description: "Retrieves details about a Notion entity (page, database, or data source) by URL or ID. Provide URL or ID in `id` parameter. Make multiple calls to fetch multiple entities. Pages use enhanced Markdown format. For the complete specification, read the MCP resource `notion://docs/enhanced-markdown-spec` through your MCP client's resource-reading interface. Do not pass this URI to the Notion `fetch` tool or any URL-fetching tool. Databases return all data sources (collections). Each data source has a unique ID shown in `<data-source url=\"collection://...\">` tags. You can pass a data source ID directly to this tool to fetch details about that specific data source, including its schema and properties. Use data source IDs with update_data_source and query_data_sources tools. Multi-source databases (e.g., with linked sources) will show multiple data sources. Set `include_discussions` to true to see discussion counts and inline discussion markers that correlate with the `get_comments` tool. The page output will include a `<page-discussions>` summary tag with discussion count, preview snippets, and `discussion://` URLs that match the discussion IDs returned by `get_comments`. Pass the special id `\"self\"` to get the connected workspace and user identity instead of an entity. The result includes a `self` object with the workspace id + name and the authenticated user's id, name, and email. Use this to label the connection (e.g. by workspace name) or obtain a stable id for the connected workspace and user. <example>{\"id\": \"https://notion.so/workspace/Page-a1b2c3d4e5f67890\"}</example> <example>{\"id\": \"12345678-90ab-cdef-1234-567890abcdef\"}</example> <example>{\"id\": \"https://myspace.notion.site/Page-Title-abc123def456\"}</example> <example>{\"id\": \"page-uuid\", \"include_discussions\": true}</example> <example>{\"id\": \"collection://12345678-90ab-cdef-1234-567890abcdef\"}</example> <example>{\"id\": \"self\"}</example>"
        arguments:
          id:
            type: "string"
            required: true
            description: "The ID or URL of the Notion page, database, or data source to fetch. Supports notion.so URLs, Notion Sites URLs (*.notion.site), raw UUIDs, and data source URLs (collection://...). Pass \"self\" to fetch the connected workspace and user identity."
          include_transcript:
            type: "boolean"
            required: false
            description: "Whether to include meeting note transcripts. Defaults to false. When true, full transcripts are included; when false, a placeholder with the meeting note URL is shown instead."
          include_discussions:
            type: "boolean"
            required: false
            description: "Whether to include discussion/comment indicators in the page output. When true, adds a <page-discussions> summary with discussion count, preview snippets, and discussion:// URLs. Use with the get_comments tool to retrieve full discussion content. Defaults to false."
      notion-create-attachment:
        description: "Create an attachment and upload it to Notion. Provide exactly one source: - content for small UTF-8 text artifacts such as HTML, Markdown, plain text, CSV, JSON, XML, CSS, YAML, TSV, calendar, GPX, or SVG files. - source_url for a file available at a direct, publicly reachable HTTPS URL. This supports binary files and temporary signed download URLs. Notion performs a metadata-only HEAD request when supported, followed by the GET request that downloads the file. The URL must not redirect, require cookies or request headers, or resolve to a private network address. The filename must use a supported extension. The optional content_type is a MIME type and must agree with the filename; omit it to infer the type from the extension. Inline content is limited to 200 KiB after UTF-8 encoding. URL downloads must complete within one minute and are limited to 5 MiB for free workspaces and 50 MiB for paid workspaces. For local files, larger files, URLs that redirect, or authenticated downloads requiring headers, use ntn files create or the Notion File Upload API instead. The response includes a markdown_source value. To place the uploaded file on a page, pass that source to create-pages or update-page. Attach it within one hour: unattached uploads remain temporary and are deleted after they expire. Use <embed src=\"file-upload://...\"> for HTML files so Notion renders the sandboxed preview; use <file src=\"file-upload://...\"> for other files. <examples> 1. Create an HTML artifact: {\"filename\":\"report.html\",\"content\":\"<!doctype html><html><body><h1>Report</h1></body></html>\"} 2. Create Markdown with an explicit MIME type: {\"filename\":\"notes.md\",\"content_type\":\"text/markdown\",\"content\":\"# Notes Hello\"} 3. Import a PDF from a signed URL: {\"filename\":\"report.pdf\",\"source_url\":\"https://storage.example.com/report.pdf?signature=...\"} </examples>"
        arguments: {}
      notion-download-attachment:
        description: "Download the contents of a small UTF-8 text attachment created by the Notion MCP `create-attachment` tool. Pass the `file_upload_id` returned by `create-attachment`. The attachment must belong to the requesting integration, have completed uploading, and use a supported text format such as HTML, Markdown, plain text, CSV, JSON, XML, CSS, YAML, TSV, calendar, GPX, or SVG. The response contains the complete text in `content` so you can save it locally, edit it, and call `create-attachment` again to upload a new version. Downloads are limited to 200 KiB. This tool does not fetch arbitrary URLs or return binary files. For larger or binary attachments, use the signed file URL returned when reading the containing Notion page. <examples> 1. Download a text attachment: {\"file_upload_id\":\"12345678-90ab-cdef-1234-567890abcdef\"} </examples>"
        arguments:
          file_upload_id:
            type: "string"
            required: true
            description: "The FileUpload ID returned by the create-attachment tool."
      notion-create-pages:
        description: "## Overview Creates one or more Notion pages, with the specified properties and content. ## Parent All pages created with a single call to this tool will have the same parent. The parent can be a Notion page (\"page_id\") or data source (\"data_source_id\"). If the parent is omitted, the pages are created as standalone, workspace-level private pages, and the person that created them can organize them later as they see fit. If you have a database URL, ALWAYS pass it to the \"fetch\" tool first to get the schema and URLs of each data source under the database. You can't use the \"database_id\" parent type if the database has more than one data source, so you'll need to identify which \"data_source_id\" to use based on the situation and the results from the fetch tool (data source URLs look like collection://<data_source_id>). If you know the pages should be created under a data source, do NOT use the database ID or URL under the \"page_id\" parameter; \"page_id\" is only for regular, non-database pages. ## Content Notion page content is a string in Notion-flavored Markdown format. Don't include the page title at the top of the page's content. Only include it under \"properties\". **IMPORTANT**: For the complete Markdown specification, always first read the MCP resource `notion://docs/enhanced-markdown-spec` through your MCP client's resource-reading interface. Do NOT pass this URI to the Notion \"fetch\" tool or any URL-fetching tool. Do NOT guess or hallucinate Markdown syntax. This spec is also applicable to other tools like update-page and fetch. ## Properties Notion page properties are a JSON map of property names to SQLite values. When creating pages in a database: - Use the correct property names from the data source schema shown in the fetch tool results. - Always include a title property. Data sources always have exactly one title property, but it may not be named \"title\", so, again, rely on the fetched data source schema. For pages outside of a database: - The only allowed property is \"title\", which is the title of the page in inline markdown format. Always include a \"title\" property. **IMPORTANT**: Some property types require expanded formats: - Date properties: Split into \"date:{property}:start\", \"date:{property}:end\" (optional), and \"date:{property}:is_datetime\" (0 or 1) - Place properties: Split into \"place:{property}:name\", \"place:{property}:address\", \"place:{property}:latitude\", \"place:{property}:longitude\", and \"place:{property}:google_place_id\" (optional) - Number properties: Use JavaScript numbers (not strings) - Checkbox properties: Use \"__YES__\" for checked, \"__NO__\" for unchecked **Special property naming**: Properties named \"id\" or \"url\" (case insensitive) must be prefixed with \"userDefined:\" (e.g., \"userDefined:URL\", \"userDefined:id\") ## Templates When creating a page in a database, you can apply a template to pre-populate it with content and property values. Use the \"fetch\" tool on a database to see available templates in the <templates> section of each data source. When using a template: - Pass the template's ID as \"template_id\" in the page object. - Do NOT include \"content\" when using a template, as the template provides it. - You can still set \"properties\" alongside the template to override template defaults. - Template application is asynchronous. The page is created immediately but starts blank; the template content will appear shortly after. ## Icon and Cover Each page can optionally have an icon and a cover image. - \"icon\": An emoji character (e.g. \"\ud83d\ude80\"), a custom emoji by name (e.g. \":rocket_ship:\"), or an external image URL. Use \"none\" to remove. Omit to leave unchanged. - \"cover\": An external image URL. Use \"none\" to remove. Omit to leave unchanged. ## Examples <example description=\"Create a page with an icon and cover\"> { \"pages\": [ { \"properties\": {\"title\": \"My Page\"}, \"icon\": \"\ud83d\ude80\", \"cover\": \"https://example.com/cover.jpg\" } ] } </example> <example description=\"Create a page from a database template\"> { \"parent\": {\"data_source_id\": \"f336d0bc-b841-465b-8045-024475c079dd\"}, \"pages\": [ { \"template_id\": \"a5da15f6-b853-455d-8827-f906fb52db2b\", \"properties\": { \"Task Name\": \"New urgent bug\" } } ] } </example> <example description=\"Create a standalone page with a title and content\"> { \"pages\": [ { \"properties\": {\"title\": \"Page title\"}, \"content\": \"# Section 1 {color=\"blue\"} Section 1 content <details> <summary>Toggle block</summary> Hidden content inside toggle </details>\" } ] } </example> <example description=\"Create a page under a database's data source\"> { \"parent\": {\"data_source_id\": \"f336d0bc-b841-465b-8045-024475c079dd\"}, \"pages\": [ { \"properties\": { \"Task Name\": \"Task 123\", \"Status\": \"In Progress\", \"Priority\": 5, \"Is Complete\": \"__YES__\", \"date:Due Date:start\": \"2024-12-25\", \"date:Due Date:is_datetime\": 0 } } ] } </example> <example description=\"Create a page with an existing page as a parent\"> { \"parent\": {\"page_id\": \"a1b2c3d4-e5f6-7890-abcd-ef1234567890\"}, \"pages\": [ { \"properties\": {\"title\": \"Page title\"}, \"content\": \"# Section 1 Section 1 content # Section 2 Section 2 content\" } ] } </example> ## Async support Set \"allow_async\" to true to opt into receiving an async task result when this create operation is accepted for background execution. If this field is omitted or false, the tool keeps the existing synchronous result shape."
        arguments:
          pages:
            type: "array"
            required: true
            description: "The pages to create."
          parent:
            type: "object|object|object"
            required: false
            description: "The parent under which the new pages will be created. This can be a page (page_id), a database page (database_id), or a data source/collection under a database (data_source_id). If omitted, the new pages will be created as private pages at the workspace level. Use data_source_id when you have a collection:// URL from the fetch tool."
          allow_async:
            type: "boolean"
            required: false
            description: "Set to true to opt into receiving an async_task result when this create operation is accepted for background execution. If omitted or false, the tool keeps the existing synchronous result shape."
      notion-update-page:
        description: "## Overview Update a Notion page's properties or content. ## Properties Notion page properties are a JSON map of property names to SQLite values. For pages in a database: - ALWAYS use the \"fetch\" tool first to get the data source schema and the exact property names. - Provide a non-null value to update a property's value. - Omitted properties are left unchanged. **IMPORTANT**: Some property types require expanded formats: - Date properties: Split into \"date:{property}:start\", \"date:{property}:end\" (optional), and \"date:{property}:is_datetime\" (0 or 1) - Place properties: Split into \"place:{property}:name\", \"place:{property}:address\", \"place:{property}:latitude\", \"place:{property}:longitude\", and \"place:{property}:google_place_id\" (optional) - Number properties: Use JavaScript numbers (not strings) - Checkbox properties: Use \"__YES__\" for checked, \"__NO__\" for unchecked **Special property naming**: Properties named \"id\" or \"url\" (case insensitive) must be prefixed with \"userDefined:\" (e.g., \"userDefined:URL\", \"userDefined:id\") For pages outside of a database: - The only allowed property is \"title\", which is the title of the page in inline markdown format. ## Content Notion page content is a string in Notion-flavored Markdown format. **IMPORTANT**: For the complete Markdown specification, first read the MCP resource `notion://docs/enhanced-markdown-spec` through your MCP client's resource-reading interface. Do NOT pass this URI to the Notion \"fetch\" tool or any URL-fetching tool. Do NOT guess or hallucinate Markdown syntax. For small edits, send the smallest edit region that captures the intended change. Prefer \"update_content\" for targeted search-and-replace edits, or \"insert_content\" when you only need to prepend or append content. Avoid full-page \"replace_content\" when \"update_content\" or \"insert_content\" is sufficient, because resubmitting unchanged page content makes the operation slower and more likely to hit async processing limits. Use \"insert_content\" to add content at the beginning or end of a page. If position is omitted, the content is appended to the end of the page. Before using \"update_content\", use the \"fetch\" tool first to get the existing content and find the Markdown snippets to use in the \"update_content\" command's old_str fields. ### Preserving Child Pages and Databases When using \"replace_content\", the operation will check if any child pages or databases would be deleted. If so, it will fail with an error listing the affected items. To preserve child pages/databases, include them in new_str using `<page url=\"...\">` or `<database url=\"...\">` tags. Get the exact URLs from the \"fetch\" tool output. **CRITICAL**: To intentionally delete child content: if the call failed with validation and requires `allow_deleting_content` to be true, DO NOT automatically assume the content should be deleted. ALWAYS show the list of pages to be deleted and ask for user confirmation before proceeding. ## Icon and Cover You can set or remove a page's icon and cover alongside any command. - \"icon\": An emoji character (e.g. \"\ud83d\ude80\"), a custom emoji by name (e.g. \":rocket_ship:\"), or an external image URL. Use \"none\" to remove. Omit to leave unchanged. - \"cover\": An external image URL. Use \"none\" to remove. Omit to leave unchanged. ## Examples <example description=\"Update page icon and cover\"> { \"page_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"command\": \"update_properties\", \"properties\": {\"title\": \"My Page\"}, \"icon\": \"\ud83d\ude80\", \"cover\": \"https://example.com/cover.jpg\" } </example> <example description=\"Update page properties\"> { \"page_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"command\": \"update_properties\", \"properties\": { \"title\": \"New Page Title\", \"status\": \"In Progress\", \"priority\": 5, \"checkbox\": \"__YES__\", \"date:deadline:start\": \"2024-12-25\", \"date:deadline:is_datetime\": 0, \"place:office:name\": \"HQ\", \"place:office:latitude\": 37.7749, \"place:office:longitude\": -122.4194 } } </example> <example description=\"Replace the entire content of a page\"> { \"page_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"command\": \"replace_content\", \"new_str\": \"# New Section Updated content goes here\" } </example> <example description=\"Update specific content in a page (search-and-replace)\"> { \"page_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"command\": \"update_content\", \"content_updates\": [ { \"old_str\": \"# Old Section Old content here\", \"new_str\": \"# New Section Updated content goes here\" } ] } </example> <example description=\"Insert new content at the top of a page\"> { \"page_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"command\": \"insert_content\", \"content\": \"## Latest update Status update goes here\", \"position\": { \"type\": \"start\" } } </example> <example description=\"Insert content after a specific location\"> { \"page_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"command\": \"update_content\", \"content_updates\": [ { \"old_str\": \"## Previous section Existing content\", \"new_str\": \"## Previous section Existing content ## New Section Content to insert goes here\" } ] } </example> <example description=\"Multiple content updates in a single call\"> { \"page_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"command\": \"update_content\", \"content_updates\": [ { \"old_str\": \"Old text 1\", \"new_str\": \"New text 1\" }, { \"old_str\": \"Old text 2\", \"new_str\": \"New text 2\" } ] } </example> ## Templates You can apply a template to an existing page using the \"apply_template\" command. The template content is appended to the page asynchronously. Get template IDs from the <templates> section in the fetch tool results for a database, or use any page ID as a template. <example description=\"Apply a template to an existing page\"> { \"page_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"command\": \"apply_template\", \"template_id\": \"a5da15f6-b853-455d-8827-f906fb52db2b\" } </example> ## Verification You can verify or unverify a page using the \"update_verification\" command. Verification marks a page as reviewed and up-to-date. Requires a Business or Enterprise plan (or the page must be in a wiki). When updating verification, the owner will be automatically set to the authenticated actor. <example description=\"Verify a page for 90 days\"> { \"page_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"command\": \"update_verification\", \"verification_status\": \"verified\", \"verification_expiry_days\": 90 } </example> <example description=\"Verify a page indefinitely\"> { \"page_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"command\": \"update_verification\", \"verification_status\": \"verified\" } </example> <example description=\"Remove verification from a page\"> { \"page_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"command\": \"update_verification\", \"verification_status\": \"unverified\" } </example>"
        arguments:
          page_id:
            type: "string"
            required: true
            description: "The ID of the page to update, with or without dashes."
          command:
            type: "string"
            required: true
            enum: ["update_properties", "update_content", "replace_content", "insert_content", "apply_template", "update_verification"]
          properties:
            type: "object"
            required: false
            description: "Required for \"update_properties\" command. A JSON object that updates the page's properties. For pages in a database, use the SQLite schema definition shown in <database>. For pages outside of a database, the only allowed property is \"title\", which is the title of the page in inline markdown format. Use null to remove a property's value."
          new_str:
            type: "string"
            required: false
            description: "Required for \"replace_content\" command. The new content string to replace the entire page content with."
          content:
            type: "string"
            required: false
            description: "Required for \"insert_content\" command. The markdown content to insert into the page."
          content_updates:
            type: "array"
            required: false
            description: "Required for \"update_content\" command. An array of search-and-replace operations, each with old_str (content to find) and new_str (replacement content)."
          position:
            type: "object|object"
            required: false
            description: "Optional for \"insert_content\" command. Use {\"type\":\"start\"} to prepend content or {\"type\":\"end\"} to append content. Omit to append."
          allow_deleting_content:
            type: "boolean"
            required: false
            description: "Optional for \"replace_content\" and \"update_content\" commands. Set to true to allow deletion of child pages and databases that are not referenced in the new content. If false or omitted, the operation will fail with an error listing the pages/databases that would be deleted."
          template_id:
            type: "string"
            required: false
            description: "Required for \"apply_template\" command. The ID of a template to apply to this page. Template content is appended to any existing page content."
          verification_status:
            type: "string"
            required: false
            enum: ["verified", "unverified"]
          verification_expiry_days:
            type: "integer"
            required: false
            description: "Optional for \"update_verification\" command when verification_status is \"verified\". Number of days until verification expires (e.g. 7, 30, 90). Omit for indefinite verification."
          icon:
            type: "string"
            required: false
            description: "An emoji character (e.g. \"\ud83d\ude80\"), a custom emoji by name (e.g. \":rocket_ship:\"), or an external image URL. Use \"none\" to remove the icon. Omit to leave unchanged. Can be set alongside any command."
          cover:
            type: "string"
            required: false
            description: "An external image URL for the page cover. Use \"none\" to remove the cover. Omit to leave unchanged. Can be set alongside any command."
          allow_async:
            type: "boolean"
            required: false
            description: "Optional. Set to true to opt into an async_task response after the update_page request is validated, durably persisted, and accepted for queued execution. If omitted or false, the tool waits for a synchronous result when possible, but may still return a pollable async_task response if queued execution exceeds the synchronous wait deadline."
      notion-move-pages:
        description: "Move one or more Notion pages or databases to a new parent."
        arguments:
          page_or_database_ids:
            type: "array"
            required: true
            description: "An array of up to 100 page or database IDs to move. IDs are v4 UUIDs and can be supplied with or without dashes (e.g. extracted from a <page> or <database> URL given by the \"search\" or \"fetch\" tool). Data Sources under Databases can't be moved individually."
          new_parent:
            type: "object|object|object|object"
            required: true
            description: "The new parent under which the pages will be moved. This can be a page, the workspace, a database, or a specific data source under a database when there are multiple. Moving pages to the workspace level adds them as private pages and should rarely be used."
      notion-duplicate-page:
        description: "Duplicate a Notion page. The page must be within the current workspace, and you must have permission to access it. The duplication completes asynchronously, so do not rely on the new page identified by the returned ID or URL to be populated immediately. Let the user know that the duplication is in progress and that they can check back later using the 'fetch' tool or by clicking the returned URL and viewing it in the Notion app."
        arguments:
          page_id:
            type: "string"
            required: true
            description: "The ID of the page to duplicate. This is a v4 UUID, with or without dashes, and can be parsed from a Notion page URL."
      notion-create-database:
        description: "Creates a new Notion database using SQL DDL syntax, or a typed database using Notion's canonical schema for tasks, projects, or skills. Provide exactly one of: - schema: a CREATE TABLE statement. If no title property is provided, \"Name\" is auto-added. - database_type: one of tasks, projects, or skills. The database is created with the canonical required properties and typed metadata used by Notion. Returns Markdown with schema, SQLite definition, and data source ID in <data-source> tag for use with update_data_source and query_data_sources tools. Type syntax: - Simple: TITLE, RICH_TEXT, DATE, PEOPLE, CHECKBOX, URL, EMAIL, PHONE_NUMBER, STATUS, FILES - SELECT('opt':color, ...) / MULTI_SELECT('opt':color, ...) - NUMBER [FORMAT 'dollar'] / FORMULA('expression') - RELATION('data_source_id') \u2014 one-way relation - RELATION('data_source_id', DUAL) \u2014 two-way relation - RELATION('data_source_id', DUAL 'synced_name') \u2014 two-way with synced property name - RELATION('data_source_id', DUAL 'synced_name' 'synced_id') \u2014 two-way with synced name and ID (for self-relations) - ROLLUP('rel_prop', 'target_prop', 'function') - UNIQUE_ID [PREFIX 'X'] / CREATED_TIME / LAST_EDITED_TIME - Any column: COMMENT 'description text' Colors: default, gray, brown, orange, yellow, green, blue, purple, pink, red <example description=\"Minimal\">{\"schema\": \"CREATE TABLE (\"Name\" TITLE)\"}</example> <example description=\"Tasks\">{\"database_type\": \"tasks\", \"title\": \"Tasks\"}</example> <example description=\"With parent and options\">{\"parent\": {\"page_id\": \"f336d0bc-b841-465b-8045-024475c079dd\"}, \"title\": \"Projects\", \"schema\": \"CREATE TABLE (\"Name\" TITLE, \"Budget\" NUMBER FORMAT 'dollar', \"Tags\" MULTI_SELECT('eng':blue, 'design':pink), \"Task ID\" UNIQUE_ID PREFIX 'PRJ')\"}</example> <example description=\"Self-relation (two-step: create database first, then use its data source ID with update_data_source to add self-relations)\">{\"title\": \"Tasks\", \"schema\": \"CREATE TABLE (\"Name\" TITLE, \"Parent\" RELATION('ds_id', DUAL 'Children' 'children'), \"Children\" RELATION('ds_id', DUAL 'Parent' 'parent'))\"}</example>"
        arguments:
          parent:
            type: "object"
            required: false
            description: "The parent under which to create the new database. If omitted, the database will be created as a private page at the workspace level."
          title:
            type: "string"
            required: false
            description: "The title of the new database."
          description:
            type: "string"
            required: false
            description: "The description of the new database."
          schema:
            type: "string"
            required: false
            description: "SQL DDL CREATE TABLE statement defining the database schema. Cannot be combined with database_type. Column names must be double-quoted and type options use single quotes."
          database_type:
            type: "string"
            required: false
            enum: ["tasks", "projects", "skills"]
      notion-update-data-source:
        description: "Update a Notion data source's schema, title, or attributes using SQL DDL statements. Returns Markdown showing updated structure and schema. Accepts a data source ID (collection ID from fetch response's <data-source> tag) or a single-source database ID. Multi-source databases require the specific data source ID. The statements param accepts semicolon-separated DDL statements: - ADD COLUMN \"Name\" <type> - add a new property - DROP COLUMN \"Name\" - remove a property - RENAME COLUMN \"Old\" TO \"New\" - rename a property - ALTER COLUMN \"Name\" SET <type> - change type/options Same type syntax as create_database. Key types: - SELECT('opt':color, ...) / MULTI_SELECT('opt':color, ...) - NUMBER [FORMAT 'dollar'] / FORMULA('expression') - RELATION('ds_id') / RELATION('ds_id', DUAL) / RELATION('ds_id', DUAL 'synced_name' 'synced_id') - ROLLUP('rel_prop', 'target_prop', 'function') / UNIQUE_ID [PREFIX 'X'] - Simple: TITLE, RICH_TEXT, DATE, PEOPLE, CHECKBOX, URL, EMAIL, PHONE_NUMBER, STATUS, FILES <example description=\"Add properties\">{\"data_source_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"statements\": \"ADD COLUMN \"Priority\" SELECT('High':red, 'Medium':yellow, 'Low':green); ADD COLUMN \"Due Date\" DATE\"}</example> <example description=\"Rename property\">{\"data_source_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"statements\": \"RENAME COLUMN \"Status\" TO \"Project Status\"\"}</example> <example description=\"Remove property\">{\"data_source_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"statements\": \"DROP COLUMN \"Old Property\"\"}</example> <example description=\"Add self-relation\">{\"data_source_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"statements\": \"ADD COLUMN \"Parent\" RELATION('f336d0bc-b841-465b-8045-024475c079dd', DUAL 'Children' 'children'); ADD COLUMN \"Children\" RELATION('f336d0bc-b841-465b-8045-024475c079dd', DUAL 'Parent' 'parent')\"}</example> <example description=\"Update title\">{\"data_source_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"title\": \"Project Tracker 2024\"}</example> <example description=\"Trash data source\">{\"data_source_id\": \"f336d0bc-b841-465b-8045-024475c079dd\", \"in_trash\": true}</example> Notes: Cannot delete/create title properties. Max one unique_id property. Cannot update synced databases. Use \"fetch\" first to see current schema and get the data source ID from <data-source url=\"collection://...\"> tags."
        arguments:
          data_source_id:
            type: "string"
            required: true
            description: "The data source to update. Accepts a collection:// URI from <data-source> tags, a bare UUID, or a database ID (only if the database has a single data source)."
          statements:
            type: "string"
            required: false
            description: "Semicolon-separated SQL DDL statements to update the schema. Supports ADD COLUMN, DROP COLUMN, RENAME COLUMN, ALTER COLUMN SET."
          title:
            type: "string"
            required: false
            description: "The new title of the data source."
          description:
            type: "string"
            required: false
            description: "The new description of the data source."
          is_inline:
            type: "boolean"
            required: false
            description: "Whether the database should display inline (true) or as full page (false). Only applicable for single-source databases."
          in_trash:
            type: "boolean"
            required: false
            description: "Move data source to trash. Cannot be undone without Notion UI."
      notion-create-comment:
        description: "Add a comment to a page or specific content. Creates a new comment. Provide `page_id` to identify the page, then choose ONE targeting mode: - `page_id` alone: Page-level comment on the entire page - `page_id` + `selection_with_ellipsis`: Comment on specific block content - `discussion_id`: Reply to an existing discussion thread (page_id is still required) Provide exactly one content format: - `markdown`: Preferred. Inline Notion-flavored Markdown for comment text. For exact syntax, read the MCP resource `notion://docs/enhanced-markdown-spec` through your MCP client's resource-reading interface. Do NOT pass this URI to the Notion `fetch` tool or any URL-fetching tool. Use only the Rich text types and Mentions syntax that comments support. Comments support inline formatting (bold, italic, strikethrough, underline, code, links), inline math using `$`Equation`$`, and user/page/database/date mention tags such as `<mention-date start=\"YYYY-MM-DD\"/>`. Do not use UI shortcuts like `@today`, `@name`, `[[page]]`, or autocomplete-style emoji syntax; those are editor affordances, not markdown syntax. Mention tags must include a real `url` where required by the spec. Block-level Markdown such as headings, lists, tables, blockquotes, and fenced code blocks is stored as plain comment text rather than rendered as blocks. - `rich_text`: Array of rich text objects. For content targeting, use `selection_with_ellipsis` with ~10 chars from start and end: \"# Section Ti...tle content\" <example description=\"Page-level comment\"> {\"page_id\": \"uuid\", \"markdown\": \"Comment with **important** context.\"} </example> <example description=\"Comment on specific content\"> {\"page_id\": \"uuid\", \"selection_with_ellipsis\": \"# Meeting No...es heading\", \"markdown\": \"Comment on this section.\"} </example> <example description=\"Reply to discussion\"> {\"page_id\": \"uuid\", \"discussion_id\": \"discussion://pageId/blockId/discussionId\", \"markdown\": \"Reply with [context](https://example.com).\"} </example>"
        arguments:
          page_id:
            type: "string"
            required: true
            description: "The ID of the page to comment on (with or without dashes)."
          discussion_id:
            type: "string"
            required: false
            description: "The ID or URL of an existing discussion to reply to (e.g., discussion://pageId/blockId/discussionId)."
          selection_with_ellipsis:
            type: "string"
            required: false
            description: "Unique start and end snippet of the content to comment on. DO NOT provide the entire string. Instead, provide up to the first ~10 characters, an ellipsis, and then up to the last ~10 characters. Make sure you provide enough of the start and end snippet to uniquely identify the content. For example: \"# Section heading...last paragraph.\""
          rich_text:
            type: "array"
            required: false
            description: "An array of rich text objects that represent the content of the comment. Provide exactly one of rich_text or markdown."
          markdown:
            type: "string"
            required: false
            description: "The content of the comment as a Markdown string. Provide exactly one of markdown or rich_text. For exact syntax, read the MCP resource notion://docs/enhanced-markdown-spec through your MCP client's resource-reading interface. Do not pass this URI to the Notion fetch tool or any URL-fetching tool, and use only the Rich text types and Mentions syntax that comments support. Comments support inline formatting (bold, italic, strikethrough, underline, code, links), inline math using $`Equation`$, and user/page/database/date mention tags such as <mention-date start=\"YYYY-MM-DD\"/>. Do not use UI shortcuts like @today, @name, [[page]], or autocomplete-style emoji syntax; those are editor affordances, not markdown syntax. Mention tags must include a real url where required by the spec. Block-level Markdown such as fenced code blocks, headings, lists, tables, and blockquotes is stored as plain comment text rather than rendered as blocks."
      notion-get-comments:
        description: "Get comments and discussions from a Notion page. Returns discussions with full comment content in XML format. By default, returns page-level discussions only. Tip: Use the `fetch` tool with `include_discussions: true` first to see where discussions are anchored in the page content, then use this tool to retrieve full discussion threads. The `discussion://` URLs in the fetch output match the discussion IDs returned here. Parameters: - `include_all_blocks`: Include discussions on child blocks (default: false) - `include_resolved`: Include resolved discussions (default: false) - `discussion_id`: Fetch a specific discussion by ID or URL <example>{\"page_id\": \"page-uuid\"}</example> <example>{\"page_id\": \"page-uuid\", \"include_all_blocks\": true}</example> <example>{\"page_id\": \"page-uuid\", \"discussion_id\": \"discussion://pageId/blockId/discussionId\"}</example>"
        arguments:
          page_id:
            type: "string"
            required: true
            description: "Identifier for a Notion page."
          include_resolved:
            type: "boolean"
            required: false
            description: "Include resolved discussions in the response. Defaults to false."
          include_all_blocks:
            type: "boolean"
            required: false
            description: "Include discussions on child blocks, not just page-level discussions. Defaults to false."
          discussion_id:
            type: "string"
            required: false
            description: "Fetch a specific discussion by ID or discussion URL (e.g., discussion://pageId/blockId/discussionId)."
      notion-get-async-task:
        description: "Retrieves the current status of an async task that was started by another tool (for example, \"create_pages\" called with \"allow_async\": true). The status is one of \"queued\", \"running\", \"retrying\", \"succeeded\", or \"failed\". When the task has succeeded, the operation's result is included; when it has failed, an error is included instead. Poll this tool with the \"task_id\" from the original tool's \"async_task\" response. Wait briefly between polls \u2014 the original response includes a suggested backoff. <examples> 1. Check a task's status: {\"task_id\": \"task_abc123\"} </examples>"
        arguments:
          task_id:
            type: "string"
            required: true
            description: "The ID of the async task to retrieve, as returned in the async_task response of the tool that started it."
      notion-get-teams:
        description: "Retrieves a list of teams (teamspaces) in the current workspace. Shows which teams exist, user membership status, IDs, names, and roles. Teams are returned split by membership status and limited to a maximum of 10 results. <examples> 1. List all teams (up to the limit of each type): {} 2. Search for teams by name: {\"query\": \"engineering\"} 3. Find a specific team: {\"query\": \"Product Design\"} </examples>"
        arguments:
          query:
            type: "string"
            required: false
            description: "Optional search query to filter teams by name (case-insensitive)."
      notion-get-users:
        description: "Retrieves a list of users in the current workspace. Shows workspace members and guests with their IDs, names, emails (if available), and types (person or bot). Supports cursor-based pagination to iterate through all users in the workspace. <examples> 1. List all users (first page): {} 2. Search for users by name or email: {\"query\": \"john\"} 3. Get next page of results: {\"start_cursor\": \"abc123\"} 4. Set custom page size: {\"page_size\": 20} 5. Fetch a specific user by ID: {\"user_id\": \"00000000-0000-4000-8000-000000000000\"} 6. Fetch the current user: {\"user_id\": \"self\"} </examples>"
        arguments:
          query:
            type: "string"
            required: false
            description: "Optional search query to filter users by name or email (case-insensitive)."
          start_cursor:
            type: "string"
            required: false
            description: "Cursor for pagination. Use the next_cursor value from the previous response to get the next page."
          page_size:
            type: "integer"
            required: false
            description: "Number of users to return per page (default: 100, max: 100)."
          user_id:
            type: "string"
            required: false
            description: "Return only the user matching this ID. Pass \"self\" to fetch the current user."
      notion-query-data-sources:
        description: "Query data from Notion databases using SQL or by specifying a view. By default, uses SQL mode to execute SQLite queries against one or more data sources. Alternatively, use view mode to execute a database view's existing filters and sorts. Archive selection is supported in view mode only. SQL mode does not accept \"is_archived\"; SQL archive support is a separate infrastructure follow-up. Plans: single-data-source SQL queries and view mode require a Business plan or higher with Notion AI. Querying across multiple data sources in one SQL query requires an Enterprise plan with Notion AI; on other plans, query one data source at a time. Prerequisites: 1. Use the \"fetch\" tool first to get database schema and data source URLs 2. Data source URLs are found in <data-source url=\"...\"> tags in fetch results SQL mode (default): Execute custom SQLite queries against one or more data sources. - Use data source URLs as table names in your query - Supports parameterized queries for security - Checkbox values: use \"__YES__\" for checked, \"__NO__\" for unchecked Examples: 1. Simple query without explicit mode (defaults to SQL): { \"data\": { \"data_source_urls\": [\"collection://f336d0bc-b841-465b-8045-024475c079dd\"], \"query\": \"SELECT * FROM \"collection://f336d0bc-b841-465b-8045-024475c079dd\" LIMIT 10\" } } 2. Query with parameters: { \"data\": { \"mode\": \"sql\", \"data_source_urls\": [\"collection://abc123\"], \"query\": \"SELECT * FROM \"collection://abc123\" WHERE Status = ? AND Priority = ?\", \"params\": [\"In Progress\", \"High\"] } } 3. Query checkboxes: { \"data\": { \"data_source_urls\": [\"collection://def456\"], \"query\": \"SELECT * FROM \"collection://def456\" WHERE Completed = ?\", \"params\": [\"__YES__\"] } } View mode: Execute a specific database view's query with its filters and sorts. Omit \"is_archived\" or set it to false for non-archived rows. Set \"is_archived\": true to apply the view inside the archived partition. When the response has \"has_more\": true, pass its \"next_cursor\" as \"start_cursor\" in a follow-up view-mode request with the same \"is_archived\" value. Example: { \"data\": { \"mode\": \"view\", \"view_url\": \"https://www.notion.so/workspace/Tasks-DB-abc123?v=def456\", \"is_archived\": false } } Common use cases: - Aggregate data across databases - Filter records by complex conditions - Export data for analysis - Validate data quality - Generate reports from database content"
        arguments:
          data:
            type: "object|object"
            required: true
            description: "The data required for querying data sources"
      notion-query-database-view:
        description: "Query data from a Notion database view. Executes a database view's existing filters, sorts, and column selections to return matching pages. Use this to query a view exactly as configured. For custom SQL queries, aggregation, or querying across multiple data sources, use query_data_sources instead. By default, it returns non-archived rows only. Set \"is_archived\": true to query archived rows only. Prerequisites: 1. Use the \"fetch\" tool first to get the database and its view URLs 2. View URLs are found in database responses, typically in the format: https://www.notion.so/workspace/db-id?v=view-id Example: { \"view_url\": \"https://www.notion.so/workspace/Tasks-DB-abc123?v=def456\", \"is_archived\": false } When the response has \"has_more\": true, pass its \"next_cursor\" as \"start_cursor\" in a follow-up request with the same \"is_archived\" value. Common use cases: - Query databases using pre-defined views (filters/sorts already configured), e.g. look for all tickets marked \"In Progress\" in a Tasks DB - Export filtered data for analysis - Generate reports from database content"
        arguments:
          view_url:
            type: "string"
            required: true
            description: "URL of a specific database view to query. Example: https://www.notion.so/workspace/db-id?v=view-id"
          start_cursor:
            type: "string"
            required: false
            description: "Cursor for pagination. Use the next_cursor value from the previous response to get the next page."
          page_size:
            type: "integer"
            required: false
            description: "Number of rows to return per page (default: 100, max: 100)."
          is_archived:
            type: "boolean"
            required: false
            description: "Optional archive selector. Omitted or false queries non-archived rows only; true queries archived rows only."
      notion-query-meeting-notes:
        description: "Query the current user's meeting notes data source. Applies a filter over meeting note properties. Title keyword searching is done via filter on property \"title\" (e.g. string_contains). Title keyword matching is case-insensitive; capitalization does not matter. Returns up to 50 rows of matching meeting notes. Prerequisites: 1. Use the \"search\" tool to find people IDs if you need to filter by attendees Query building: - Ignore terms semantically related to meeting outputs (e.g. \"summaries\", \"notes\", \"todos\", \"action items\", \"deliverables\"). These signal the user wants outcomes from their meetings, not a title filter. - For example, \"what are my meeting todos?\" means filter meetings and find action items \u2014 do NOT add a title filter for \"todos\". - Only add a title filter when confident the user is targeting a specific meeting title (e.g. \"standup\", \"sprint planning\", \"1:1 with Alice\"). - Generic date phrases like \"recent meetings\", \"latest meetings\", \"meetings this week\", or \"yesterday's meetings\" should be interpreted as date range filters \u2014 never as title filters. - If a filter returns no results, simplify to a single term. The system is lexical, so multi-word title filters may not match. - Unless a user explicitly asks about a meeting titled with another user's name, assume they're referring to attendees or creators. Only add a title filter with a person's name as a fallback if attendee filtering returns no results. Default behavior: - This tool by default returns meeting notes where the current user is an attendee or creator. There is no need to add a filter for the current user. Filterable properties: - \"title\" (text) \u2014 meeting title - \"notion://meeting_notes/attendees\" (person) \u2014 meeting attendees - \"created_time\" (date) \u2014 when the meeting note was created - \"created_by\" (person) \u2014 who created the meeting note - \"last_edited_time\" (date) \u2014 when the meeting note was last edited - \"last_edited_by\" (person) \u2014 who last edited the meeting note Combinator filters use \"filters\" (not \"operands\"): { \"operator\": \"and\" | \"or\", \"filters\": [ ... ] } Date filtering (recommended default: date_is_within): - Prefer \"date_is_within\" for relative windows like \"past N days/weeks/months\". - Relative (common): { type: \"relative\", value: \"the_past_week\" | \"the_past_month\" | \"this_week\" } - Relative (custom): { type: \"relative\", value: \"custom\", direction: \"past\" | \"future\", unit: \"day\" | \"week\" | \"month\" | \"year\", count: <number> } - Exact range: { type: \"exact\", value: { type: \"daterange\", start_date: \"YYYY-MM-DD\", end_date: \"YYYY-MM-DD\" } } - Single-date operators (\"date_is\", \"date_is_before\", \"date_is_after\", \"date_is_on_or_before\", \"date_is_on_or_after\"): - Exact: { type: \"exact\", value: { type: \"date\", start_date: \"YYYY-MM-DD\" } } - Relative shortcuts: today | tomorrow | yesterday | one_week_ago | one_week_from_now | one_month_ago | one_month_from_now Title keyword filtering (OR vs AND): - Use OR (\"operator\": \"or\") when unsure or for broad discovery. - Use AND (\"operator\": \"and\") when the user is specific and you want to narrow results. - Break multi-word phrases into individual terms and filter on each term separately. Example 1: Filter meetings from the past week (relative): { \"filter\": { \"operator\": \"and\", \"filters\": [ { \"property\": \"created_time\", \"filter\": { \"operator\": \"date_is_within\", \"value\": { \"type\": \"relative\", \"value\": \"the_past_week\" } } } ] } } Example 2: Filter meetings from the past 3 days (custom relative): { \"filter\": { \"operator\": \"and\", \"filters\": [ { \"property\": \"created_time\", \"filter\": { \"operator\": \"date_is_within\", \"value\": { \"type\": \"relative\", \"value\": \"custom\", \"direction\": \"past\", \"unit\": \"day\", \"count\": 3 } } } ] } } Example 3: Filter meetings by exact date range: { \"filter\": { \"operator\": \"and\", \"filters\": [ { \"property\": \"created_time\", \"filter\": { \"operator\": \"date_is_within\", \"value\": { \"type\": \"exact\", \"value\": { \"type\": \"daterange\", \"start_date\": \"2025-01-01\", \"end_date\": \"2025-12-31\" } } } } ] } } Example 4: Filter meetings created after a specific date: { \"filter\": { \"operator\": \"and\", \"filters\": [ { \"property\": \"created_time\", \"filter\": { \"operator\": \"date_is_after\", \"value\": { \"type\": \"exact\", \"value\": { \"type\": \"date\", \"start_date\": \"2025-06-01\" } } } } ] } } Example 5: Filter meetings by a specific attendee (use \"search\" tool first to get user ID): { \"filter\": { \"operator\": \"and\", \"filters\": [ { \"property\": \"notion://meeting_notes/attendees\", \"filter\": { \"operator\": \"person_contains\", \"value\": [ { \"type\": \"exact\", \"value\": { \"table\": \"notion_user\", \"id\": \"a1b2c3d4-e5f6-7890-abcd-ef1234567890\" } } ] } } ] } } Example 6: Combine attendees with date range: { \"filter\": { \"operator\": \"and\", \"filters\": [ { \"property\": \"created_time\", \"filter\": { \"operator\": \"date_is_on_or_after\", \"value\": { \"type\": \"exact\", \"value\": { \"type\": \"date\", \"start_date\": \"2025-01-01\" } } } }, { \"property\": \"created_time\", \"filter\": { \"operator\": \"date_is_on_or_before\", \"value\": { \"type\": \"exact\", \"value\": { \"type\": \"date\", \"start_date\": \"2025-01-31\" } } } }, { \"property\": \"notion://meeting_notes/attendees\", \"filter\": { \"operator\": \"person_contains\", \"value\": [ { \"type\": \"exact\", \"value\": { \"table\": \"notion_user\", \"id\": \"a1b2c3d4-e5f6-7890-abcd-ef1234567890\" } } ] } } ] } } Example 7: Filter meetings by title content: { \"filter\": { \"operator\": \"and\", \"filters\": [ { \"property\": \"title\", \"filter\": { \"operator\": \"string_contains\", \"value\": { \"type\": \"exact\", \"value\": \"design review\" } } } ] } } Example 8: Filter meetings matching any of several title terms (using \"or\"): { \"filter\": { \"operator\": \"or\", \"filters\": [ { \"property\": \"title\", \"filter\": { \"operator\": \"string_contains\", \"value\": { \"type\": \"exact\", \"value\": \"standup\" } } }, { \"property\": \"title\", \"filter\": { \"operator\": \"string_contains\", \"value\": { \"type\": \"exact\", \"value\": \"sync\" } } } ] } }"
        arguments:
          filter:
            type: "object"
            required: false
            description: "Acceptable filter for querying current user's meeting notes data source."
      notion-create-view:
        description: "Create a new view on a Notion database. Exactly one of \"database_id\" or \"parent_page_id\" must be provided: - \"database_id\": add a new view tab to an existing database. - \"parent_page_id\": create an inline linked database view on a page that references the existing \"data_source_id\" (like the UI \"/linked\" command). The linked view block is appended to the end of the parent page. Use \"fetch\" first to get the database_id, parent_page_id, and data_source_id (from <data-source> tags in the response). The caller must have edit access to the database (or parent page) and access to the data source. Supported types: table, board, list, calendar, timeline, gallery, form, chart, map, dashboard. The optional \"configure\" param accepts a DSL for filters, sorts, grouping, and display options. See the notion://docs/view-dsl-spec resource for full syntax. Key directives: - FILTER \"Property\" = \"value\" \u2014 filter rows - SORT BY \"Property\" ASC \u2014 sort rows - GROUP BY \"Property\" \u2014 group by property (required for board views) - CALENDAR BY \"Property\" \u2014 date property (required for calendar views) - TIMELINE BY \"Start\" TO \"End\" \u2014 date range (required for timeline views) - MAP BY \"Property\" \u2014 location property (required for map views) - CHART column|bar|line|donut|number \u2014 chart type with optional AGGREGATE, COLOR, HEIGHT, SORT, STACK BY, CAPTION - FORM CLOSE|OPEN \u2014 close/open form submissions - FORM ANONYMOUS true|false \u2014 toggle anonymous submissions - FORM PERMISSIONS none|reader|editor \u2014 set submission permissions - SHOW \"Prop1\", \"Prop2\" \u2014 set visible properties - COVER \"Property\" \u2014 cover image property <example description=\"Table view on existing database\">{\"database_id\": \"abc123\", \"data_source_id\": \"def456\", \"name\": \"All Tasks\", \"type\": \"table\"}</example> <example description=\"Board grouped by Status\">{\"database_id\": \"abc123\", \"data_source_id\": \"def456\", \"name\": \"Task Board\", \"type\": \"board\", \"configure\": \"GROUP BY \"Status\"\"}</example> <example description=\"Filtered + sorted table\">{\"database_id\": \"abc123\", \"data_source_id\": \"def456\", \"name\": \"Active\", \"type\": \"table\", \"configure\": \"FILTER \"Status\" = \"In Progress\"; SORT BY \"Due Date\" ASC\"}</example> <example description=\"Calendar view\">{\"database_id\": \"abc123\", \"data_source_id\": \"def456\", \"name\": \"Calendar\", \"type\": \"calendar\", \"configure\": \"CALENDAR BY \"Due Date\"\"}</example> <example description=\"Dashboard\">{\"database_id\": \"abc123\", \"data_source_id\": \"def456\", \"name\": \"Overview\", \"type\": \"dashboard\"}</example> <example description=\"Linked view on a page\">{\"parent_page_id\": \"ghi789\", \"data_source_id\": \"def456\", \"name\": \"Company tasks\", \"type\": \"table\", \"configure\": \"FILTER \"Company\" = \"Acme\"\"}</example>"
        arguments:
          data_source_id:
            type: "string"
            required: true
            description: "The data source (collection) ID. Accepts a collection:// URI from <data-source> tags or a bare UUID."
          name:
            type: "string"
            required: true
            description: "The name of the view."
          type:
            type: "string"
            required: true
            enum: ["table", "board", "list", "calendar", "timeline", "gallery", "form", "chart", "map", "dashboard"]
          database_id:
            type: "string"
            required: false
            description: "The database to add a view tab to. Accepts a Notion URL or a bare UUID. Mutually exclusive with `parent_page_id`; exactly one must be provided."
          parent_page_id:
            type: "string"
            required: false
            description: "A page to create an inline linked database view on. Accepts a Notion URL or a bare UUID. The new linked view block is appended at the end of the page and references `data_source_id`. Mutually exclusive with `database_id`; exactly one must be provided."
          configure:
            type: "string"
            required: false
            description: "View configuration DSL string. Supports FILTER, SORT BY, GROUP BY, CALENDAR BY, TIMELINE BY, MAP BY, CHART, FORM, SHOW, HIDE, COVER, WRAP CELLS, and FREEZE COLUMNS directives. See notion://docs/view-dsl-spec."
      notion-update-view:
        description: "Update a view's name, filters, sorts, or display configuration. Use \"fetch\" to get view IDs from database responses. Only include fields you want to change. The \"configure\" param uses the same DSL as create_view. Use CLEAR to remove settings: - CLEAR FILTER \u2014 remove all filters - CLEAR SORT \u2014 remove all sorts - CLEAR GROUP BY \u2014 remove grouping See notion://docs/view-dsl-spec resource for full syntax. <example description=\"Rename\">{\"view_id\": \"abc123\", \"name\": \"Sprint Board\"}</example> <example description=\"Update filter\">{\"view_id\": \"abc123\", \"configure\": \"FILTER \"Status\" = \"Done\"\"}</example> <example description=\"Clear filter, add sort\">{\"view_id\": \"abc123\", \"configure\": \"CLEAR FILTER; SORT BY \"Created\" DESC\"}</example> <example description=\"Update grouping\">{\"view_id\": \"abc123\", \"configure\": \"GROUP BY \"Priority\"; SHOW \"Name\", \"Status\"\"}</example>"
        arguments:
          view_id:
            type: "string"
            required: true
            description: "The view to update. Accepts a view:// URI, a Notion URL with ?v= parameter, or a bare UUID."
          name:
            type: "string"
            required: false
            description: "New name for the view."
          configure:
            type: "string"
            required: false
            description: "View configuration DSL string. Supports FILTER, SORT BY, GROUP BY, CALENDAR BY, TIMELINE BY, MAP BY, CHART, FORM, SHOW, HIDE, COVER, WRAP CELLS, FREEZE COLUMNS, and CLEAR directives."
