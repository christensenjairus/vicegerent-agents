            type: "string"
            required: true
            description: "Silence UUID"
      getAlertGroups:
        description: "Get alerts grouped by routing labels. Shows how alerts are batched for notifications."
        arguments: {}
      getAlertHistory:
        description: "Get alert history for a specific alert. Shows current/recent instances and guidance for historical analysis."
        arguments:
          alertName:
            type: "string"
            required: true
