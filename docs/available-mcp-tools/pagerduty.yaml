      create_schedule:
        description: "Create a new schedule. All new schedules use PagerDuty's next-gen shift-based (v3) system. Args: schedule_data: Name, time_zone, and rotations for the new shift-based schedule. Returns: The created schedule."
        arguments:
          schedule_data:
            type: ""
            required: true
      update_schedule:
        description: "Update an existing shift-based (v3) schedule. Classic layer-based (v2) schedules cannot be edited through this tool; attempting to update one surfaces the PagerDuty API's guidance message rather than failing silently. Args: schedule_id: The ID of the shift-based (v3) schedule to update. schedule_data: Fields to change (only provided fields are updated). Returns: The updated schedule."
        arguments:
          schedule_data:
            type: ""
            required: true
          schedule_id:
            type: "string"
            required: true
      create_schedule_override:
        description: "Create an override for a schedule. The override_request contains an 'overrides' array. Each override requires 'start' (ISO datetime), 'end' (ISO datetime), and 'user_id' (the user's PagerDuty ID). Args: schedule_id: The ID of the schedule to override override_request: Data for the schedule override Returns: The created schedule override"
        arguments:
          override_request:
            type: ""
            required: true
          schedule_id:
            type: "string"
            required: true
      delete_schedule_v3:
        description: "Delete a v3 schedule. Args: schedule_id: The ID of the v3 schedule to delete Returns: Confirmation message"
        arguments:
          schedule_id:
            type: "string"
            required: true
      create_schedule_v3_rotation:
        description: "Create a new rotation within a v3 schedule. Rotations are containers for events. After creating a rotation, add events to it using create_schedule_v3_rotation_event to define on-call coverage windows and members. Args: schedule_id: The ID of the v3 schedule to add the rotation to Returns: The created rotation"
        arguments:
          schedule_id:
            type: "string"
            required: true
      delete_schedule_v3_rotation:
        description: "Delete a rotation from a v3 schedule. Args: schedule_id: The ID of the v3 schedule rotation_id: The ID of the rotation to delete Returns: Confirmation message"
        arguments:
          rotation_id:
            type: "string"
            required: true
          schedule_id:
            type: "string"
            required: true
      create_schedule_v3_rotation_event:
        description: "Create a new event within a v3 schedule rotation. An event defines when and how users are on-call: the recurring time window (start_time/end_time), a recurrence rule (RRULE), and an assignment strategy (rotating or every-member). Example for a weekly rotating on-call: name: \"Weekly On-Call\" start_time: {date_time: \"2025-03-03T09:00:00Z\", time_zone: \"America/New_York\"} end_time: {date_time: \"2025-03-10T09:00:00Z\", time_zone: \"America/New_York\"} effective_since: \"2025-03-03T09:00:00Z\" recurrence: [\"RRULE:FREQ=WEEKLY\"] assignment_strategy: type: \"rotating_member_assignment_strategy\" shifts_per_member: 1 members: - {type: \"user_member\", user_id: \"PUSER123\"} - {type: \"user_member\", user_id: \"PUSER456\"} Args: schedule_id: The ID of the v3 schedule rotation_id: The ID of the rotation to add this event to event_data: Event configuration including name, time window, recurrence, and assignment strategy Returns: The created rotation event"
        arguments:
          event_data:
            type: ""
            required: true
          rotation_id:
            type: "string"
            required: true
          schedule_id:
            type: "string"
            required: true
      update_schedule_v3_rotation_event:
        description: "Update an existing rotation event in a v3 schedule. Update rules: - Active events (already started): only effective_until can be changed - Future events: all fields can be changed - Past events: cannot be changed (returns 400) Args: schedule_id: The ID of the v3 schedule rotation_id: The ID of the rotation event_id: The ID of the event to update event_data: Fields to update (only provided fields are changed) Returns: The updated rotation event"
        arguments:
          event_data:
            type: ""
            required: true
          event_id:
            type: "string"
            required: true
          rotation_id:
            type: "string"
            required: true
          schedule_id:
            type: "string"
            required: true
      delete_schedule_v3_rotation_event:
        description: "Delete an event from a v3 schedule rotation. Args: schedule_id: The ID of the v3 schedule rotation_id: The ID of the rotation event_id: The ID of the event to delete Returns: Confirmation message"
        arguments:
          event_id:
            type: "string"
            required: true
          rotation_id:
            type: "string"
            required: true
          schedule_id:
            type: "string"
            required: true
      create_schedule_v3_custom_shifts:
        description: "Create one or more custom shifts for a v3 schedule. Custom shifts are ad-hoc one-off shifts that sit outside of rotation events, useful for covering specific dates without modifying the rotation. Example: custom_shifts: - type: \"custom_shift\" start_time: \"2025-03-15T09:00:00Z\" end_time: \"2025-03-15T17:00:00Z\" assignments: - type: \"shift_assignment\" member: {type: \"user_member\", user_id: \"PUSER123\"} Args: schedule_id: The ID of the v3 schedule custom_shifts: List of custom shifts to create Returns: The created custom shifts"
        arguments:
          custom_shifts:
            type: "array"
            required: true
          schedule_id:
            type: "string"
            required: true
      update_schedule_v3_custom_shift:
        description: "Update an existing custom shift in a v3 schedule. Args: schedule_id: The ID of the v3 schedule custom_shift_id: The ID of the custom shift to update shift_data: Fields to update Returns: The updated custom shift"
        arguments:
          custom_shift_id:
            type: "string"
            required: true
          schedule_id:
            type: "string"
            required: true
          shift_data:
            type: ""
            required: true
      delete_schedule_v3_custom_shift:
        description: "Delete a custom shift from a v3 schedule. Args: schedule_id: The ID of the v3 schedule custom_shift_id: The ID of the custom shift to delete Returns: Confirmation message"
        arguments:
          custom_shift_id:
            type: "string"
            required: true
          schedule_id:
            type: "string"
            required: true
      create_schedule_v3_overrides:
        description: "Create one or more overrides for a v3 schedule. An override temporarily replaces a scheduled on-call member with a different member for a specific time period. Each override must reference either a rotation_id or a custom_shift_id (not both). Example: overrides: - type: \"override_shift\" rotation_id: \"ROTATION_ID\" start_time: \"2025-03-15T09:00:00Z\" end_time: \"2025-03-15T17:00:00Z\" overridden_member: {type: \"user_member\", user_id: \"PUSER123\"} overriding_member: {type: \"user_member\", user_id: \"PUSER456\"} Args: schedule_id: The ID of the v3 schedule overrides: List of overrides to create Returns: The created overrides"
        arguments:
          overrides:
            type: "array"
            required: true
          schedule_id:
            type: "string"
            required: true
      update_schedule_v3_override:
        description: "Update an existing override in a v3 schedule. Args: schedule_id: The ID of the v3 schedule override_id: The ID of the override to update start_time: ISO 8601 start datetime of the override end_time: ISO 8601 end datetime of the override overridden_member_type: Type of the member being replaced \u2014 'user_member' or 'empty_member' overriding_member_type: Type of the member taking over \u2014 'user_member' or 'empty_member' overridden_member_user_id: PagerDuty user ID of the member being replaced (required when type is 'user_member') overriding_member_user_id: PagerDuty user ID of the member taking over (required when type is 'user_member') Returns: The updated override"
        arguments:
          end_time:
            type: "string"
            required: true
          overridden_member_type:
            type: "string"
            required: true
          overridden_member_user_id:
            type: "string|null"
            required: false
          override_id:
            type: "string"
            required: true
          overriding_member_type:
            type: "string"
            required: true
          overriding_member_user_id:
            type: "string|null"
            required: false
          schedule_id:
            type: "string"
            required: true
          start_time:
            type: "string"
            required: true
      delete_schedule_v3_override:
        description: "Delete an override from a v3 schedule. Args: schedule_id: The ID of the v3 schedule override_id: The ID of the override to delete Returns: Confirmation message"
        arguments:
          override_id:
            type: "string"
            required: true
          schedule_id:
            type: "string"
            required: true
      update_event_orchestration_router:
        description: "Update the router configuration for a specific event orchestration. Args: orchestration_id: The ID of the event orchestration to update router for router_update: The updated router configuration Returns: The updated event orchestration router configuration"
