      create_status_page_post:
        description: "Create a Post for a Status Page by Status Page ID. This tool creates a new post (incident or maintenance) on a status page. According to the PagerDuty API, all posts require starts_at, ends_at, and at least one update. Args: status_page_id: The ID of the Status Page create_model: The post creation request. Must include: - post.title: The title of the post - post.post_type: Either \"incident\" or \"maintenance\" - post.starts_at: When the post becomes effective (required) - post.ends_at: When the post is concluded (required) - post.updates: List of at least one post update with message, status, severity, etc. Returns: The created StatusPagePost"
