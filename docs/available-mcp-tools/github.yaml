      projects_get:
        description: "Get details about specific GitHub Projects resources. Use this tool to get details about individual projects, project fields, and project items by their unique IDs."
        arguments:
          field_id:
            type: "number"
            required: false
            description: "The field's ID. Required for 'get_project_field' method."
          fields:
            type: "array"
            required: false
            description: "Specific list of field IDs to include in the response when getting a project item (e.g. [\"102589\", \"985201\", \"169875\"]). If not provided, only the title field is included. Only used for 'get_project_item' method."
          item_id:
            type: "number"
            required: false
            description: "The item's ID. Required for 'get_project_item' method."
          method:
            type: "string"
            required: true
            description: "The method to execute"
            enum: ["get_project", "get_project_field", "get_project_item", "get_project_status_update"]
          owner:
            type: "string"
            required: false
            description: "The owner (user or organization login). The name is not case sensitive."
          owner_type:
            type: "string"
            required: false
            description: "Owner type (user or org). If not provided, will be automatically detected."
            enum: ["user", "org"]
          project_number:
            type: "number"
            required: false
            description: "The project's number."
          status_update_id:
            type: "string"
            required: false
            description: "The node ID of the project status update. Required for 'get_project_status_update' method."
      projects_list:
        description: "Tools for listing GitHub Projects resources. Use this tool to list projects for a user or organization, or list project fields and items for a specific project."
        arguments:
          after:
            type: "string"
            required: false
            description: "Forward pagination cursor from previous pageInfo.nextCursor."
          before:
            type: "string"
            required: false
            description: "Backward pagination cursor from previous pageInfo.prevCursor (rare)."
          fields:
            type: "array"
            required: false
            description: "Field IDs to include when listing project items (e.g. [\"102589\", \"985201\"]). CRITICAL: Always provide to get field values. Without this, only titles returned. Only used for 'list_project_items' method."
          method:
            type: "string"
            required: true
            description: "The action to perform"
            enum: ["list_projects", "list_project_fields", "list_project_items", "list_project_status_updates"]
          owner:
            type: "string"
            required: true
            description: "The owner (user or organization login). The name is not case sensitive."
          owner_type:
            type: "string"
            required: false
            description: "Owner type (user or org). If not provided, will automatically try both."
            enum: ["user", "org"]
          per_page:
            type: "number"
            required: false
            description: "Results per page (max 50)"
          project_number:
            type: "number"
            required: false
            description: "The project's number. Required for 'list_project_fields', 'list_project_items', and 'list_project_status_updates' methods."
          query:
            type: "string"
            required: false
            description: "Filter/query string. For list_projects: filter by title text and state (e.g. \"roadmap is:open\"). For list_project_items: advanced filtering using GitHub's project filtering syntax."
      projects_write:
        description: "Create and manage GitHub Projects: create projects, add/update/delete items, create status updates, and add iteration fields."
        arguments:
          body:
            type: "string"
            required: false
            description: "The body of the status update (markdown). Used for 'create_project_status_update' method."
          field_name:
            type: "string"
            required: false
            description: "The name of the iteration field (e.g. 'Sprint'). Required for 'create_iteration_field' method."
          issue_number:
            type: "number"
            required: false
            description: "The issue number (use when item_type is 'issue' for 'add_project_item' method). Provide either issue_number or pull_request_number."
          item_id:
            type: "number"
            required: false
            description: "The project item ID. Required for 'update_project_item' and 'delete_project_item' methods."
          item_owner:
            type: "string"
            required: false
            description: "The owner (user or organization) of the repository containing the issue or pull request. Required for 'add_project_item' method."
          item_repo:
            type: "string"
            required: false
            description: "The name of the repository containing the issue or pull request. Required for 'add_project_item' method."
          item_type:
            type: "string"
            required: false
            description: "The item's type, either issue or pull_request. Required for 'add_project_item' method."
            enum: ["issue", "pull_request"]
          iteration_duration:
            type: "number"
            required: false
            description: "Duration in days for iterations of the field (e.g. 7 for weekly, 14 for bi-weekly). Required for 'create_iteration_field' method."
          iterations:
            type: "array"
            required: false
            description: "Custom iterations for 'create_iteration_field' method. Only set this when you need iterations with varying durations, breaks between them, or specific titles. Otherwise omit it: GitHub auto-creates three iterations of 'iteration_duration' days starting on 'start_date', which is the right choice for most cases."
          method:
            type: "string"
            required: true
            description: "The method to execute"
            enum: ["add_project_item", "update_project_item", "delete_project_item", "create_project_status_update", "create_project", "create_iteration_field"]
          owner:
            type: "string"
            required: true
            description: "The project owner (user or organization login). The name is not case sensitive."
          owner_type:
            type: "string"
            required: false
            description: "Owner type (user or org). Required for 'create_project' method. If not provided for other methods, will be automatically detected."
            enum: ["user", "org"]
          project_number:
            type: "number"
            required: false
            description: "The project's number. Required for all methods except 'create_project'."
          pull_request_number:
            type: "number"
            required: false
            description: "The pull request number (use when item_type is 'pull_request' for 'add_project_item' method). Provide either issue_number or pull_request_number."
          start_date:
            type: "string"
            required: false
            description: "Start date in YYYY-MM-DD format. Used for 'create_project_status_update' and 'create_iteration_field' methods."
          status:
            type: "string"
            required: false
            description: "The status of the project. Used for 'create_project_status_update' method."
            enum: ["INACTIVE", "ON_TRACK", "AT_RISK", "OFF_TRACK", "COMPLETE"]
          target_date:
            type: "string"
            required: false
            description: "The target date of the status update in YYYY-MM-DD format. Used for 'create_project_status_update' method."
          title:
            type: "string"
            required: false
            description: "The project title. Required for 'create_project' method."
          updated_field:
            type: "object"
            required: false
            description: "Object consisting of the ID of the project field to update and the new value for the field. To clear the field, set value to null. Example: {\"id\": 123456, \"value\": \"New Value\"}. Required for 'update_project_item' method."
      pull_request_read:
        description: "Get information on a specific pull request in GitHub repository."
        arguments:
          after:
            type: "string"
            required: false
            description: "Cursor for pagination, used only by the get_review_comments method. Pass the endCursor from the previous page's PageInfo to fetch the next page."
          method:
            type: "string"
            required: true
            description: "Action to specify what pull request data needs to be retrieved from GitHub. Possible options: 1. get - Get details of a specific pull request. 2. get_diff - Get the diff of a pull request. 3. get_status - Get combined commit status of a head commit in a pull request. 4. get_files - Get the list of files changed in a pull request. Use with pagination parameters to control the number of results returned. 5. get_commits - Get the list of commits on a pull request. Use with pagination parameters to control the number of results returned. 6. get_review_comments - Get review threads on a pull request. Each thread contains logically grouped review comments made on the same code location during pull request reviews. Returns threads with metadata (isResolved, isOutdated, isCollapsed) and their associated comments. Use cursor-based pagination (perPage, after) to control results. 7. get_reviews - Get the reviews on a pull request. When asked for review comments, use get_review_comments method. Use with pagination parameters to control the number of results returned. 8. get_comments - Get comments on a pull request. Use this if user doesn't specifically want review comments. Use with pagination parameters to control the number of results returned. 9. get_check_runs - Get check runs for the head commit of a pull request. Check runs are the individual CI/CD jobs and checks that run on the PR."
            enum: ["get", "get_diff", "get_status", "get_files", "get_commits", "get_review_comments", "get_reviews", "get_comments", "get_check_runs"]
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          page:
            type: "number"
            required: false
            description: "Page number for pagination (min 1)"
          perPage:
            type: "number"
            required: false
            description: "Results per page for pagination (min 1, max 100)"
          pullNumber:
            type: "number"
            required: true
            description: "Pull request number"
          repo:
            type: "string"
            required: true
            description: "Repository name"
      pull_request_review_write:
        description: "Create and/or submit, delete review of a pull request. Available methods: - create: Create a new review of a pull request. If \"event\" parameter is provided, the review is submitted. If \"event\" is omitted, a pending review is created. - submit_pending: Submit an existing pending review of a pull request. This requires that a pending review exists for the current user on the specified pull request. The \"body\" and \"event\" parameters are used when submitting the review. - delete_pending: Delete an existing pending review of a pull request. This requires that a pending review exists for the current user on the specified pull request. - resolve_thread: Resolve a review thread. Requires only \"threadId\" parameter with the thread's node ID (e.g., PRRT_kwDOxxx). The owner, repo, and pullNumber parameters are not used for this method. Resolving an already-resolved thread is a no-op. - unresolve_thread: Unresolve a previously resolved review thread. Requires only \"threadId\" parameter. The owner, repo, and pullNumber parameters are not used for this method. Unresolving an already-unresolved thread is a no-op."
        arguments:
          body:
            type: "string"
            required: false
            description: "Review comment text"
          commitID:
            type: "string"
            required: false
            description: "SHA of commit to review"
          event:
            type: "string"
            required: false
            description: "Review action to perform."
            enum: ["APPROVE", "REQUEST_CHANGES", "COMMENT"]
          method:
            type: "string"
            required: true
            description: "The write operation to perform on pull request review."
            enum: ["create", "submit_pending", "delete_pending", "resolve_thread", "unresolve_thread"]
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          pullNumber:
            type: "number"
            required: true
            description: "Pull request number"
          repo:
            type: "string"
            required: true
            description: "Repository name"
          threadId:
            type: "string"
            required: false
            description: "The node ID of the review thread (e.g., PRRT_kwDOxxx). Required for resolve_thread and unresolve_thread methods. Get thread IDs from pull_request_read with method get_review_comments."
      push_files:
