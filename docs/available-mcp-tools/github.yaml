# available-tools.yaml — catalog of every tool exposed by the running
# vicegerent MCP backends, with each tool's arguments (type, required,
# description, enum). Reference for spotting missing tools and for writing
# cerbos argument-level policies. GENERATED — do not edit by hand.
# Regenerate: scripts/probe-mcp-tools.py --format yaml -o host/mcp/available-tools.yaml
group: vicegerent
tool_count: 23
servers:
  github:
    tool_count: 23
    tools:
      add_comment_to_pending_review:
        description: "Add review comment to the requester's latest pending pull request review. A pending review needs to already exist to call this (check with the user if not sure)."
        arguments:
          body:
            type: "string"
            required: true
            description: "The text of the review comment"
          line:
            type: "number"
            required: false
            description: "The line of the blob in the pull request diff that the comment applies to. For multi-line comments, the last line of the range"
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          path:
            type: "string"
            required: true
            description: "The relative path to the file that necessitates a comment"
          pullNumber:
            type: "number"
            required: true
            description: "Pull request number"
          repo:
            type: "string"
            required: true
            description: "Repository name"
          side:
            type: "string"
            required: false
            description: "The side of the diff to comment on. LEFT indicates the previous state, RIGHT indicates the new state"
            enum: ["LEFT", "RIGHT"]
          startLine:
            type: "number"
            required: false
            description: "For multi-line comments, the first line of the range that the comment applies to"
          startSide:
            type: "string"
            required: false
            description: "For multi-line comments, the starting side of the diff that the comment applies to. LEFT indicates the previous state, RIGHT indicates the new state"
            enum: ["LEFT", "RIGHT"]
          subjectType:
            type: "string"
            required: true
            description: "The level at which the comment is targeted"
            enum: ["FILE", "LINE"]
      add_issue_comment:
        description: "Add a comment to a specific issue in a GitHub repository. Use this tool to add comments to pull requests as well (in this case pass pull request number as issue_number), but only if user is not asking specifically to add review comments."
        arguments:
          body:
            type: "string"
            required: true
            description: "Comment content"
          issue_number:
            type: "number"
            required: true
            description: "Issue number to comment on"
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          repo:
            type: "string"
            required: true
            description: "Repository name"
      add_reply_to_pull_request_comment:
        description: "Add a reply to an existing pull request comment. This creates a new comment that is linked as a reply to the specified comment."
        arguments:
          body:
            type: "string"
            required: true
            description: "The text of the reply"
          commentId:
            type: "number"
            required: true
            description: "The ID of the comment to reply to"
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          pullNumber:
            type: "number"
            required: true
            description: "Pull request number"
          repo:
            type: "string"
            required: true
            description: "Repository name"
      assign_copilot_to_issue:
        description: "Assign Copilot to a specific issue in a GitHub repository. This tool can help with the following outcomes: - a Pull Request created with source code changes to resolve the issue More information can be found at: - https://docs.github.com/en/copilot/using-github-copilot/using-copilot-coding-agent-to-work-on-tasks/about-assigning-tasks-to-copilot"
        arguments:
          base_ref:
            type: "string"
            required: false
            description: "Git reference (e.g., branch) that the agent will start its work from. If not specified, defaults to the repository's default branch"
          custom_instructions:
            type: "string"
            required: false
            description: "Optional custom instructions to guide the agent beyond the issue body. Use this to provide additional context, constraints, or guidance that is not captured in the issue description"
          issue_number:
            type: "number"
            required: true
            description: "Issue number"
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          repo:
            type: "string"
            required: true
            description: "Repository name"
      create_branch:
        description: "Create a new branch in a GitHub repository"
        arguments:
          branch:
            type: "string"
            required: true
            description: "Name for new branch"
          from_branch:
            type: "string"
            required: false
            description: "Source branch (defaults to repo default)"
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          repo:
            type: "string"
            required: true
            description: "Repository name"
      create_or_update_file:
        description: "Create or update a single file in a GitHub repository. If updating, you should provide the SHA of the file you want to update. Use this tool to create or update a file in a GitHub repository remotely; do not use it for local file operations. In order to obtain the SHA of original file version before updating, use the following git command: git rev-parse <branch>:<path to file> SHA MUST be provided for existing file updates."
        arguments:
          branch:
            type: "string"
            required: true
            description: "Branch to create/update the file in"
          content:
            type: "string"
            required: true
            description: "Content of the file"
          message:
            type: "string"
            required: true
            description: "Commit message"
          owner:
            type: "string"
            required: true
            description: "Repository owner (username or organization)"
          path:
            type: "string"
            required: true
            description: "Path where to create/update the file"
          repo:
            type: "string"
            required: true
            description: "Repository name"
          sha:
            type: "string"
            required: false
            description: "The blob SHA of the file being replaced. Required if the file already exists."
      create_pull_request:
        description: "Create a new pull request in a GitHub repository."
        arguments:
          base:
            type: "string"
            required: true
            description: "Branch to merge into"
          body:
            type: "string"
            required: false
            description: "PR description"
          draft:
            type: "boolean"
            required: false
            description: "Create as draft PR"
          head:
            type: "string"
            required: true
            description: "Branch containing changes"
          maintainer_can_modify:
            type: "boolean"
            required: false
            description: "Allow maintainer edits"
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          repo:
            type: "string"
            required: true
            description: "Repository name"
          reviewers:
            type: "array"
            required: false
            description: "GitHub usernames or ORG/team-slug team reviewers to request reviews from"
          title:
            type: "string"
            required: true
            description: "PR title"
      get_label:
        description: "Get a specific label from a repository."
        arguments:
          name:
            type: "string"
            required: true
            description: "Label name."
          owner:
            type: "string"
            required: true
            description: "Repository owner (username or organization name)"
          repo:
            type: "string"
            required: true
            description: "Repository name"
      get_me:
        description: "Get details of the authenticated GitHub user. Use this when a request is about the user's own profile for GitHub. Or when information is missing to build other tool calls."
        arguments: {}
      issue_read:
        description: "Get information about a specific issue in a GitHub repository."
        arguments:
          issue_number:
            type: "number"
            required: true
            description: "The number of the issue"
          method:
            type: "string"
            required: true
            description: "The read operation to perform on a single issue. Options are: 1. get - Get details of a specific issue. 2. get_comments - Get issue comments. 3. get_sub_issues - Get sub-issues of the issue. 4. get_labels - Get labels assigned to the issue."
            enum: ["get", "get_comments", "get_sub_issues", "get_labels"]
          owner:
            type: "string"
            required: true
            description: "The owner of the repository"
          page:
            type: "number"
            required: false
            description: "Page number for pagination (min 1)"
          perPage:
            type: "number"
            required: false
            description: "Results per page for pagination (min 1, max 100)"
          repo:
            type: "string"
            required: true
            description: "The name of the repository"
      issue_write:
        description: "Create a new or update an existing issue in a GitHub repository."
        arguments:
          assignees:
            type: "array"
            required: false
            description: "Usernames to assign to this issue"
          body:
            type: "string"
            required: false
            description: "Issue body content"
          duplicate_of:
            type: "number"
            required: false
            description: "Issue number that this issue is a duplicate of. Only used when state_reason is 'duplicate'."
          issue_number:
            type: "number"
            required: false
            description: "Issue number to update"
          labels:
            type: "array"
            required: false
            description: "Labels to apply to this issue"
          method:
            type: "string"
            required: true
            description: "Write operation to perform on a single issue. Options are: - 'create' - creates a new issue. - 'update' - updates an existing issue."
            enum: ["create", "update"]
          milestone:
            type: "number"
            required: false
            description: "Milestone number"
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          repo:
            type: "string"
            required: true
            description: "Repository name"
          state:
            type: "string"
            required: false
            description: "New state"
            enum: ["open", "closed"]
          state_reason:
            type: "string"
            required: false
            description: "Reason for the state change. Ignored unless state is changed."
            enum: ["completed", "not_planned", "duplicate"]
          title:
            type: "string"
            required: false
            description: "Issue title"
          type:
            type: "string"
            required: false
            description: "Type of this issue. Only use if issue types are enabled for this repository. Use list_issue_types tool to get valid type values for this repository or its owner organization. If the repository doesn't support issue types, omit this parameter."
      list_issue_types:
        description: "List supported issue types for a repository or its owner organization. When repo is omitted, returns org-level issue types directly."
        arguments:
          owner:
            type: "string"
            required: true
            description: "The account owner of the repository or organization."
          repo:
            type: "string"
            required: false
            description: "The name of the repository. When provided, returns issue types for this specific repository. When omitted, returns org-level issue types directly."
      list_issues:
        description: "List issues in a GitHub repository. For pagination, use the 'endCursor' from the previous response's 'pageInfo' in the 'after' parameter."
        arguments:
          after:
            type: "string"
            required: false
            description: "Cursor for pagination. Use the cursor from the previous response."
          direction:
            type: "string"
            required: false
            description: "Order direction. If provided, the 'orderBy' also needs to be provided."
            enum: ["ASC", "DESC"]
          labels:
            type: "array"
            required: false
            description: "Filter by labels"
          orderBy:
            type: "string"
            required: false
            description: "Order issues by field. If provided, the 'direction' also needs to be provided."
            enum: ["CREATED_AT", "UPDATED_AT", "COMMENTS"]
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          perPage:
            type: "number"
            required: false
            description: "Results per page for pagination (min 1, max 100)"
          repo:
            type: "string"
            required: true
            description: "Repository name"
          since:
            type: "string"
            required: false
            description: "Filter by date (ISO 8601 timestamp)"
          state:
            type: "string"
            required: false
            description: "Filter by state, by default both open and closed issues are returned when not provided"
            enum: ["OPEN", "CLOSED"]
      list_pull_requests:
        description: "List pull requests in a GitHub repository. If the user specifies an author, then DO NOT use this tool and use the search_pull_requests tool instead."
        arguments:
          base:
            type: "string"
            required: false
            description: "Filter by base branch"
          direction:
            type: "string"
            required: false
            description: "Sort direction"
            enum: ["asc", "desc"]
          head:
            type: "string"
            required: false
            description: "Filter by head user/org and branch"
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          page:
            type: "number"
            required: false
            description: "Page number for pagination (min 1)"
          perPage:
            type: "number"
            required: false
            description: "Results per page for pagination (min 1, max 100)"
          repo:
            type: "string"
            required: true
            description: "Repository name"
          sort:
            type: "string"
            required: false
            description: "Sort by"
            enum: ["created", "updated", "popularity", "long-running"]
          state:
            type: "string"
            required: false
            description: "Filter by state"
            enum: ["open", "closed", "all"]
      pull_request_read:
        description: "Get information on a specific pull request in GitHub repository."
        arguments:
          after:
            type: "string"
            required: false
            description: "Cursor for pagination, used only by the get_review_comments method. Pass the endCursor from the previous page's PageInfo to fetch the next page."
          method:
            type: "string"
            required: true
            description: "Action to specify what pull request data needs to be retrieved from GitHub. Possible options: 1. get - Get details of a specific pull request. 2. get_diff - Get the diff of a pull request. 3. get_status - Get combined commit status of a head commit in a pull request. 4. get_files - Get the list of files changed in a pull request. Use with pagination parameters to control the number of results returned. 5. get_commits - Get the list of commits on a pull request. Use with pagination parameters to control the number of results returned. 6. get_review_comments - Get review threads on a pull request. Each thread contains logically grouped review comments made on the same code location during pull request reviews. Returns threads with metadata (isResolved, isOutdated, isCollapsed) and their associated comments. Use cursor-based pagination (perPage, after) to control results. 7. get_reviews - Get the reviews on a pull request. When asked for review comments, use get_review_comments method. Use with pagination parameters to control the number of results returned. 8. get_comments - Get comments on a pull request. Use this if user doesn't specifically want review comments. Use with pagination parameters to control the number of results returned. 9. get_check_runs - Get check runs for the head commit of a pull request. Check runs are the individual CI/CD jobs and checks that run on the PR."
            enum: ["get", "get_diff", "get_status", "get_files", "get_commits", "get_review_comments", "get_reviews", "get_comments", "get_check_runs"]
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          page:
            type: "number"
            required: false
            description: "Page number for pagination (min 1)"
          perPage:
            type: "number"
            required: false
            description: "Results per page for pagination (min 1, max 100)"
          pullNumber:
            type: "number"
            required: true
            description: "Pull request number"
          repo:
            type: "string"
            required: true
            description: "Repository name"
      pull_request_review_write:
        description: "Create and/or submit, delete review of a pull request. Available methods: - create: Create a new review of a pull request. If \"event\" parameter is provided, the review is submitted. If \"event\" is omitted, a pending review is created. - submit_pending: Submit an existing pending review of a pull request. This requires that a pending review exists for the current user on the specified pull request. The \"body\" and \"event\" parameters are used when submitting the review. - delete_pending: Delete an existing pending review of a pull request. This requires that a pending review exists for the current user on the specified pull request. - resolve_thread: Resolve a review thread. Requires only \"threadId\" parameter with the thread's node ID (e.g., PRRT_kwDOxxx). The owner, repo, and pullNumber parameters are not used for this method. Resolving an already-resolved thread is a no-op. - unresolve_thread: Unresolve a previously resolved review thread. Requires only \"threadId\" parameter. The owner, repo, and pullNumber parameters are not used for this method. Unresolving an already-unresolved thread is a no-op."
        arguments:
          body:
            type: "string"
            required: false
            description: "Review comment text"
          commitID:
            type: "string"
            required: false
            description: "SHA of commit to review"
          event:
            type: "string"
            required: false
            description: "Review action to perform."
            enum: ["APPROVE", "REQUEST_CHANGES", "COMMENT"]
          method:
            type: "string"
            required: true
            description: "The write operation to perform on pull request review."
            enum: ["create", "submit_pending", "delete_pending", "resolve_thread", "unresolve_thread"]
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          pullNumber:
            type: "number"
            required: true
            description: "Pull request number"
          repo:
            type: "string"
            required: true
            description: "Repository name"
          threadId:
            type: "string"
            required: false
            description: "The node ID of the review thread (e.g., PRRT_kwDOxxx). Required for resolve_thread and unresolve_thread methods. Get thread IDs from pull_request_read with method get_review_comments."
      push_files:
        description: "Push multiple files to a GitHub repository in a single commit"
        arguments:
          branch:
            type: "string"
            required: true
            description: "Branch to push to"
          files:
            type: "array"
            required: true
            description: "Array of file objects to push, each object with path (string) and content (string)"
          message:
            type: "string"
            required: true
            description: "Commit message"
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          repo:
            type: "string"
            required: true
            description: "Repository name"
      request_copilot_review:
        description: "Request a GitHub Copilot code review for a pull request. Use this for automated feedback on pull requests, usually before requesting a human reviewer."
        arguments:
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          pullNumber:
            type: "number"
            required: true
            description: "Pull request number"
          repo:
            type: "string"
            required: true
            description: "Repository name"
      search_issues:
        description: "Search for issues in GitHub repositories using issues search syntax already scoped to is:issue"
        arguments:
          order:
            type: "string"
            required: false
            description: "Sort order"
            enum: ["asc", "desc"]
          owner:
            type: "string"
            required: false
            description: "Optional repository owner. If provided with repo, only issues for this repository are listed."
          page:
            type: "number"
            required: false
            description: "Page number for pagination (min 1)"
          perPage:
            type: "number"
            required: false
            description: "Results per page for pagination (min 1, max 100)"
          query:
            type: "string"
            required: true
            description: "Search query using GitHub issues search syntax"
          repo:
            type: "string"
            required: false
            description: "Optional repository name. If provided with owner, only issues for this repository are listed."
          sort:
            type: "string"
            required: false
            description: "Sort field by number of matches of categories, defaults to best match"
            enum: ["comments", "reactions", "reactions-+1", "reactions--1", "reactions-smile", "reactions-thinking_face", "reactions-heart", "reactions-tada", "interactions", "created", "updated"]
      search_pull_requests:
        description: "Search for pull requests in GitHub repositories using issues search syntax already scoped to is:pr"
        arguments:
          order:
            type: "string"
            required: false
            description: "Sort order"
            enum: ["asc", "desc"]
          owner:
            type: "string"
            required: false
            description: "Optional repository owner. If provided with repo, only pull requests for this repository are listed."
          page:
            type: "number"
            required: false
            description: "Page number for pagination (min 1)"
          perPage:
            type: "number"
            required: false
            description: "Results per page for pagination (min 1, max 100)"
          query:
            type: "string"
            required: true
            description: "Search query using GitHub pull request search syntax"
          repo:
            type: "string"
            required: false
            description: "Optional repository name. If provided with owner, only pull requests for this repository are listed."
          sort:
            type: "string"
            required: false
            description: "Sort field by number of matches of categories, defaults to best match"
            enum: ["comments", "reactions", "reactions-+1", "reactions--1", "reactions-smile", "reactions-thinking_face", "reactions-heart", "reactions-tada", "interactions", "created", "updated"]
      sub_issue_write:
        description: "Add a sub-issue to a parent issue in a GitHub repository."
        arguments:
          after_id:
            type: "number"
            required: false
            description: "The ID of the sub-issue to be prioritized after (either after_id OR before_id should be specified)"
          before_id:
            type: "number"
            required: false
            description: "The ID of the sub-issue to be prioritized before (either after_id OR before_id should be specified)"
          issue_number:
            type: "number"
            required: true
            description: "The number of the parent issue"
          method:
            type: "string"
            required: true
            description: "The action to perform on a single sub-issue Options are: - 'add' - add a sub-issue to a parent issue in a GitHub repository. - 'remove' - remove a sub-issue from a parent issue in a GitHub repository. - 'reprioritize' - change the order of sub-issues within a parent issue in a GitHub repository. Use either 'after_id' or 'before_id' to specify the new position."
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          replace_parent:
            type: "boolean"
            required: false
            description: "When true, replaces the sub-issue's current parent issue. Use with 'add' method only."
          repo:
            type: "string"
            required: true
            description: "Repository name"
          sub_issue_id:
            type: "number"
            required: true
            description: "The ID of the sub-issue to add. ID is not the same as issue number"
      update_pull_request:
        description: "Update an existing pull request in a GitHub repository."
        arguments:
          base:
            type: "string"
            required: false
            description: "New base branch name"
          body:
            type: "string"
            required: false
            description: "New description"
          draft:
            type: "boolean"
            required: false
            description: "Mark pull request as draft (true) or ready for review (false)"
          maintainer_can_modify:
            type: "boolean"
            required: false
            description: "Allow maintainer edits"
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          pullNumber:
            type: "number"
            required: true
            description: "Pull request number to update"
          repo:
            type: "string"
            required: true
            description: "Repository name"
          reviewers:
            type: "array"
            required: false
            description: "GitHub usernames or ORG/team-slug team reviewers to request reviews from"
          state:
            type: "string"
            required: false
            description: "New state"
            enum: ["open", "closed"]
          title:
            type: "string"
            required: false
            description: "New title"
      update_pull_request_branch:
        description: "Update the branch of a pull request with the latest changes from the base branch."
        arguments:
          expectedHeadSha:
            type: "string"
            required: false
            description: "The expected SHA of the pull request's HEAD ref"
          owner:
            type: "string"
            required: true
            description: "Repository owner"
          pullNumber:
            type: "number"
            required: true
            description: "Pull request number"
          repo:
            type: "string"
            required: true
            description: "Repository name"
