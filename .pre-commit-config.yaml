---
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-merge-conflict
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^host/mcp-proxy-server/
      - id: trailing-whitespace
        exclude: ^host/mcp-proxy-server/
      - id: end-of-file-fixer
        exclude: ^host/mcp-proxy-server/
      - id: check-added-large-files
      - id: detect-private-key
        exclude: ^host/mcp-proxy-server/
  - repo: https://github.com/lyz-code/yamlfix/
    rev: 1.19.1
    hooks:
      - id: yamlfix
        exclude: >-
          (?x)^(
            \.gitlab-ci\.yml|
            charts/.+/templates/.+\.ya?ml|
            clusters/[^/]+/flux-system/gotk-(components|sync)\.yaml|
            host/mcp-proxy-server/.+
          )$
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets  # pragma: allowlist secret
        name: detect secrets
        args: [--baseline, .secrets.baseline]
        exclude: ^host/mcp-proxy-server/
  - repo: local
    hooks:
      - id: validate-flux-manifests
        name: validate Flux manifests and kustomize overlays
        language: system
        entry: scripts/validate.sh
        files: \.(ya?ml)$
        pass_filenames: false
